      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
        <div style="font-weight:700;font-size:13.5px;color:var(--coral);">📣 ${pendentes.length} mensage${pendentes.length>1?'ns':'m'} pendente${pendentes.length>1?'s':''}</div>
        <button class="btn ghost" id="btn-clear-pendentes" style="width:auto;padding:4px 10px;font-size:11.5px;">Limpar</button>
      </div>
      <div style="font-size:11.5px;color:var(--muted);margin-bottom:10px;">Telegram já tentou enviar automaticamente para quem ativou. Estes aqui precisam do seu toque no WhatsApp.</div>`;
    pendentes.forEach(p=>{
      const baseMsg = mensagemMataMata(p.faseLabel, p.nome, p.oponente);
      html += `<div style="margin-bottom:10px;">
        <div style="font-size:12.5px;font-weight:600;margin-bottom:4px;">${escapeHtml(p.nome)} <span style="color:var(--muted);font-weight:500;">· ${p.faseLabel} vs ${escapeHtml(p.oponente)}</span></div>
        ${renderContatoBlock(p.i, p.slot, p.tel, baseMsg, p.key)}
      </div>`;
    });
    html += `</div>`;
  }

  if(camp){
    html += `<div class="champion-banner"><div class="eyebrow">Campeão do torneio</div><div class="name">🏆 ${escapeHtml(camp)}</div></div>`;
  }

  for(let r=0; r<rounds; r++){
    const teams = bracketTeamsForRound(r);
    const label = nomeRodada(r, rounds);
    html += `<div class="round-label">${escapeHtml(label)}</div>`;
    state.bracket[r].forEach((m,i)=>{
      const [a,b] = teams[i];
      const tag = teams.length>1 ? `${label.slice(0,2).toUpperCase()}${i+1}` : label.toUpperCase();
      html += bracketMatchHtml(tag, label, r, i, a, b, m.pa, m.pb);
    });
  }

  if(state.terceiroLugar){
    const [la,lb] = semifinalLosers();
    html += `<div class="round-label">Disputa de 3º e 4º lugar</div>`;
    html += bracketMatchHtml("3º LUGAR", "Disputa de 3º Lugar", "terceiro", 0, la, lb, state.terceiro.pa, state.terceiro.pb);
  }

  return html;
}

function renderApito(){
  const matchId = state.apitoMatchId;
  const [a,b] = getMatchTeams(matchId);
  const label = getMatchLabel(matchId);
  const arb = getArb(matchId);
  const statusLabel = {
    nao_iniciada: "Não iniciada",
    andamento: "Em andamento",
    tecnico: "⏸️ Tempo técnico",
    finalizada: "✅ Finalizada"
  }[arb.status] || "";

  let acoes = "";
  if(arb.status==="nao_iniciada"){
    acoes += `<button class="btn" id="btn-ref-iniciar">▶️ Iniciar partida</button>`;
  }
  if(arb.status==="andamento" || arb.status==="tecnico"){
    acoes += `<button class="btn secondary" id="btn-ref-tecnico">${arb.status==="tecnico" ? "▶️ Retomar" : "⏸️ Tempo técnico"}</button>`;
    acoes += `<button class="btn ghost ref-btn-fim" id="btn-ref-finalizar">🏁 Fim de partida</button>`;
  }
  if(arb.status==="finalizada"){
    acoes += `<div class="ref-final-msg">✅ Partida finalizada · duração ${formatTempo(arb.acumuladoMs)}</div>
      <button class="btn ghost" id="btn-ref-reabrir" style="margin-top:8px;">🔓 Reabrir partida</button>`;
  }

  return `
  <div class="ref-screen">
    <div class="ref-top">
      <button class="ref-close" id="btn-ref-fechar">✕</button>
      <div class="ref-label">${escapeHtml(label)}</div>
    </div>
    <div class="ref-timer-box status-${arb.status}">
      <div class="ref-timer" id="ref-timer-txt">${formatTempo(tempoDecorridoMs(arb))}</div>
      <div class="ref-timer-status">${statusLabel}</div>
    </div>
    <div class="ref-board">
      <div class="ref-team-col">
        <button class="ref-score-btn plus" data-ponto="a" data-delta="1" ${arb.status==="finalizada"?"disabled":""}>+</button>
        <div class="ref-score-num">${arb.placarA}</div>
        <button class="ref-score-btn minus" data-ponto="a" data-delta="-1" ${arb.status==="finalizada"?"disabled":""}>−</button>
        <div class="ref-team-nome">${escapeHtml(a||"—")}</div>
      </div>
      <div class="ref-vs">×</div>
      <div class="ref-team-col">
        <button class="ref-score-btn plus" data-ponto="b" data-delta="1" ${arb.status==="finalizada"?"disabled":""}>+</button>
        <div class="ref-score-num">${arb.placarB}</div>
        <button class="ref-score-btn minus" data-ponto="b" data-delta="-1" ${arb.status==="finalizada"?"disabled":""}>−</button>
        <div class="ref-team-nome">${escapeHtml(b||"—")}</div>
      </div>
    </div>
    <div class="ref-actions">${acoes}</div>
    <button class="ref-tv-link" id="btn-ref-abrir-tv">📺 Abrir placar para TV</button>
  </div>
  <div class="popup-troca" id="popup-troca">
    <div class="popup-troca-inner">
      <div class="popup-troca-icon">🔄</div>
      <div class="popup-troca-msg">Troca de lado das equipes.</div>
      <button class="popup-troca-ok" id="btn-fechar-popup-troca">OK</button>
    </div>
  </div>`;
}

function bracketMatchHtml(label, faseLabel, round, idx, a, b, pa, pb){
  const win = (a || b) ? winner(a,b,pa,pb) : null;
  const teamBlock = (nome, oponente, side, isWin)=>{
    if(!nome) return `<div class="bracket-row"><span class="team tbd">${oponente ? "— Folga —" : "Aguardando resultados"}</span></div>`;
    if(!oponente) return `<div class="bracket-row"><span class="team win">${escapeHtml(nome)}</span><span class="tg-status ok" style="flex-shrink:0;">🎟️ Folga</span></div>`;
    const scoreVal = side==="a" ? (pa??"") : (pb??"");
    const di = duplaIndexByName(nome);
    let contatos = "";
    if(di>=0 && oponente){
      const d = state.duplas[di];
      const baseMsg = mensagemMataMata(faseLabel, nome, oponente);
      const trackKey = `${round}-${idx}-${side}`;
      contatos = `<div class="msg-grid" style="margin-top:6px;margin-bottom:10px;">
        ${renderContatoBlock(di, 1, d.tel1, baseMsg, trackKey)}
        ${renderContatoBlock(di, 2, d.tel2, baseMsg, trackKey)}
      </div>`;
    }
    return `<div class="bracket-row">
      <span class="team ${isWin?'win':''}">${escapeHtml(nome)}</span>
      <input class="score-input" type="number" min="0" inputmode="numeric" data-round="${round}" data-idx="${idx}" data-side="${side}" value="${scoreVal}">
    </div>${contatos}`;
  };
  const matchId = makeMatchId(round, idx);
  const acoes = (a && b) ? `<div class="ref-actions-row">
      <button class="ref-mini-btn" data-apitar="${matchId}">🏁 Apitar jogo</button>
      <button class="ref-mini-btn ghost" data-placartv="${matchId}">📺 Placar do jogo</button>
    </div>` : "";
  return `<div class="bracket-match">
    <div class="lbl">${label}</div>
    ${teamBlock(a, b, "a", win===a)}
    ${teamBlock(b, a, "b", win===b)}
    ${acoes}
  </div>`;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove("show"), 2200);
}

let __tvUltimoArb = null;
function iniciarPlacarTV(torneioId, matchId){
  document.body.innerHTML = `<div class="tv-screen" id="tv-screen"><div class="tv-loading">🏐 Carregando placar...</div></div>`;

  async function atualizar(){
    try{
      const res = await fetch(`/api/torneios-get?id=${encodeURIComponent(torneioId)}`, { cache:"no-store" });
      if(!res.ok) throw new Error("resposta não-ok");
      const data = await res.json();
      if(data && data.state){
        state = Object.assign(defaultState(), data.state);
        renderTV(matchId);
      }
    }catch(e){
      const el = document.getElementById("tv-screen");
      if(el && !el.dataset.loaded) el.innerHTML = `<div class="tv-loading">⚠️ Sem conexão com o servidor. Tentando novamente...</div>`;
    }
  }

  setInterval(()=>{
    if(!__tvUltimoArb || __tvUltimoArb.status!=="andamento") return;
    const el = document.querySelector(".tv-timer");
    if(el) el.textContent = formatTempo(tempoDecorridoMs(__tvUltimoArb));
  }, 1000);

  atualizar();
  setInterval(atualizar, 2500);
}

function renderTV(matchId){
  const screen = document.getElementById("tv-screen");
  if(!screen) return;
  const [a,b] = getMatchTeams(matchId);
  const label = getMatchLabel(matchId);
  const arb = getArb(matchId);
  __tvUltimoArb = arb;
  const tempoMs = tempoDecorridoMs(arb);
  const statusLabel = {
    nao_iniciada: "Aguardando início",
    andamento: "🔴 Em andamento",
    tecnico: "⏸️ Tempo técnico",
    finalizada: "✅ Finalizada"
  }[arb.status] || "";

  screen.dataset.loaded = "1";
  screen.innerHTML = `
    <div class="tv-label">${escapeHtml(label)}</div>
    <div class="tv-board">
      <div class="tv-team">
        <div class="tv-team-nome">${escapeHtml(a||"—")}</div>
        <div class="tv-score">${arb.placarA}</div>
      </div>
      <div class="tv-x">×</div>
      <div class="tv-team">
        <div class="tv-team-nome">${escapeHtml(b||"—")}</div>
        <div class="tv-score">${arb.placarB}</div>
      </div>
    </div>
    <div class="tv-footer">
      <div class="tv-timer">${formatTempo(tempoMs)}</div>
      <div class="tv-status">${statusLabel}</div>
    </div>`;
}

const __urlParams = new URLSearchParams(location.search);
const __tvMatchId = __urlParams.get("placarTV");
const __tvTorneioId = __urlParams.get("torneio");

if(__tvMatchId && __tvTorneioId){
  iniciarPlacarTV(__tvTorneioId, __tvMatchId);
} else {
  document.querySelectorAll("nav.tabbar button").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      state.tab = btn.dataset.tab;
      save();
      render();
      if(state.tab==="sorteio" && state.drawn) refreshTelegramStatus();
      if(state.tab==="matamata" && state.drawn) checkElimNotifications();
    });
  });

  render();
  if(auth && state.cloudId){
    refreshTorneioAtual();
    if(state.tab==="sorteio" && state.drawn) refreshTelegramStatus();
    if(state.drawn) checkElimNotifications();
  }

  if("serviceWorker" in navigator){
    window.addEventListener("load", ()=>{
      navigator.serviceWorker.register("./service-worker.js").catch(()=>{});
    });
  }
}
