<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Futevôlei — Campeonato</title>
<meta name="theme-color" content="#205527" id="meta-theme-color">
<script>
// Aplica o tema (claro/escuro) o mais cedo possível, antes do CSS pintar a tela, pra evitar
// o "flash" de tema errado. Preferência salva localmente (não é por torneio, é do aparelho).
(function(){
  try{
    var t = localStorage.getItem("futevolei_tema_v1");
    if(!t) t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", t);
  }catch(e){}
})();
</script>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="icon" href="./icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@500&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Paleta inspirada nas cores oficiais da Heineken (verde PMS 7739 C / PMS 7483 C,
       vermelho e prata) — ver comentário completo mais abaixo, junto do modo escuro. */
    --sand:#F1F3EF;
    --sand-dark:#C9D2C6;
    --ocean:#008200;
    --ocean-deep:#205527;
    --coral:#FF2B00;
    --grass:#1AA31A;
    --white:#FFFFFF;
    --ink:#16241A;
    --muted:#5C6B60;
    --heading:#205527; /* usada em títulos/labels — mesma cor de sempre no modo claro */
    --radius:16px;
    --shadow: 0 10px 24px -12px rgba(22,36,26,.35);
  }
  /* Modo escuro: mesmas variáveis, valores adaptados pra contraste em fundo escuro. Como o app
     inteiro já usa var(--sand)/var(--white)/var(--ink) etc. em vez de cores fixas, só trocar
     esses valores já re-pinta o app inteiro — sem precisar editar cada componente. */
  [data-theme="dark"]{
    --sand:#000000;
    --sand-dark:#3A3A3A;
    --ocean:#2ECC58;
    --ocean-deep:#0F3D1D;
    --coral:#FF7A5C;
    --grass:#3AD65A;
    --white:#121212;
    --ink:#F5F5F5;
    --muted:#B5B5B5;
    --heading:#4DFF7E; /* verde neon — as versões antigas (mesmo tom do fundo) ficavam ilegíveis no escuro */
    --shadow: 0 10px 24px -12px rgba(0,0,0,.8);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Work Sans',sans-serif;
    background: var(--sand);
    color: var(--ink);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .stage{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
  }
  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--white);
    position:relative;
    box-shadow: var(--shadow);
    display:flex;
    flex-direction:column;
  }
  @media (min-width:481px){
    body{padding:24px 0;}
    /* Sem overflow:hidden aqui: isso quebrava o "position:sticky" do menu inferior nessa
       largura, porque vira um ancestral com scroll próprio (mesmo sem scrollbar) e o app
       real rola no body/html, não dentro do .app. Os cantos arredondados agora são feitos
       diretamente no header (topo) e no nav.tabbar (base), que são os únicos filhos com
       fundo próprio que encostam nas bordas do card. */
    .app{min-height:calc(100vh - 48px); border-radius:28px;}
    header{border-radius:28px 28px 0 0;}
    nav.tabbar{border-radius:0 0 28px 28px;}
  }

  /* ---------- Header ---------- */
  header{
    background: linear-gradient(160deg, var(--ocean) 0%, var(--ocean-deep) 100%);
    background-size: cover;
    background-position: center;
    color:var(--white);
    padding:22px 20px 26px;
    position:relative;
    overflow:hidden;
  }
  header.has-bg-image{
    background-blend-mode: multiply;
  }
  header h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:34px;
    letter-spacing:.03em;
    margin:2px 0 0;
    line-height:1;
    position:relative;
    z-index:1;
    text-shadow: 0 2px 10px rgba(0,0,0,.35);
  }
  .theme-toggle-icon{
    position:absolute;top:16px;right:16px;z-index:2;
    width:38px;height:38px;border-radius:50%;
    background:rgba(255,255,255,.18);border:none;
    font-size:18px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .theme-toggle-icon:active{background:rgba(255,255,255,.3);}

  /* ---------- Content ---------- */
  main{
    flex:1;
    padding:18px 18px 90px;
  }
  .section-title{
    font-family:'Bebas Neue',sans-serif;
    font-size:20px;
    letter-spacing:.02em;
    color:var(--heading);
    margin:0 0 4px;
  }
  .section-sub{
    font-size:12.5px;
    color:var(--muted);
    margin:0 0 14px;
    line-height:1.4;
  }

  /* ---------- Cards ---------- */
  .card{
    background:var(--white);
    border:1px solid #EDE7D8;
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:12px;
  }
  .stat-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:14px;
  }
  .stat{
    border-radius:var(--radius);
    padding:14px;
    color:var(--white);
    position:relative;
    overflow:hidden;
  }
  .stat.ocean{background:linear-gradient(150deg,var(--ocean),var(--ocean-deep));}
  .stat.coral{background:linear-gradient(150deg,var(--coral),#B31F00);}
  .stat.grass{background:linear-gradient(150deg,var(--grass),#205527);}
  .stat.ink{background:linear-gradient(150deg,#2A3A2C,var(--ocean-deep));}
  .stat .num{
    font-family:'DM Mono',monospace;
    font-size:22px;
    font-weight:500;
    display:block;
  }
  .stat .lbl{
    font-size:10.5px;
    letter-spacing:.06em;
    text-transform:uppercase;
    opacity:.85;
  }

  /* ---------- Duplas / Sorteio ---------- */
  .dupla-row{
    display:flex;align-items:center;gap:10px;margin-bottom:8px;
  }
  .dupla-row .num{
    font-family:'DM Mono',monospace;
    width:22px;text-align:center;color:var(--muted);font-size:13px;
  }
  .dupla-card{
    border:1.5px solid var(--sand-dark);border-radius:12px;
    padding:10px 12px;margin-bottom:10px;background:var(--white);
  }
  .dupla-card .top-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .tel-row{display:flex;gap:8px;}
  .tel-row input{font-family:'DM Mono',monospace;font-size:12.5px;}
  .tel-row input::placeholder{font-family:'Work Sans',sans-serif;}
  .jogador-group{margin-bottom:10px;}
  .jogador-group label{font-size:11px;font-weight:700;color:var(--heading);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.02em;}
  .jogador-group input{width:100%;margin-bottom:6px;}
  .jogador-group input:last-child{margin-bottom:0;}
  .jogador-group input[type=tel],.jogador-group input[type=email]{font-family:'DM Mono',monospace;font-size:12.5px;}
  .whats-list .dupla-card{padding:12px 14px;}
  .whats-list .g-name{font-weight:700;font-size:14px;margin-bottom:2px;}
  .whats-list .g-matches{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;}
  .msg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .msg-block{display:flex;flex-direction:column;gap:6px;}
  .btn-send{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    background:var(--coral);color:#fff;border:none;border-radius:10px;
    font-family:'Work Sans',sans-serif;font-weight:600;font-size:12.5px;
    padding:10px 8px;text-decoration:none;cursor:pointer;text-align:center;
  }
  .btn-send.disabled{background:var(--sand-dark);color:var(--muted);pointer-events:none;}
  .tg-status{
    font-size:10.5px;font-weight:700;text-align:center;border-radius:8px;padding:5px 6px;
  }
  .tg-status.ok{background:#E3F4FC;color:#0E7FB8;}
  .tg-status.pending{background:#FDF1E7;color:var(--coral);}
  .tg-settings{margin-bottom:14px;}
  .tg-settings label{font-size:12px;font-weight:600;color:var(--heading);display:block;margin-bottom:6px;}
  .tg-settings .hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4;}
  .bulk-row{display:flex;gap:8px;margin-bottom:14px;}
  .copy-note{
    font-size:11px;color:var(--muted);text-align:center;margin-top:2px;opacity:0;transition:opacity .2s;
  }
  .copy-note.show{opacity:1;}
  input[type=text]{
    flex:1;
    border:1.5px solid var(--sand-dark);
    border-radius:10px;
    padding:9px 12px;
    font-size:14px;
    font-family:'Work Sans',sans-serif;
    color:var(--ink);
    background:var(--white);
  }
  input[type=text]:focus{outline:none;border-color:var(--ocean);}
  /* Base pra qualquer outro campo (número, data, textarea, select) que não tenha estilo próprio —
     sem isso, esses campos ficavam com o branco/preto padrão do navegador, sem acompanhar o tema. */
  input, textarea, select{
    color:var(--ink);
    background:var(--white);
    font-family:'Work Sans',sans-serif;
    accent-color:var(--ocean);
  }
  input::placeholder, textarea::placeholder{color:var(--muted);opacity:1;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--coral);color:var(--white);border:none;
    font-family:'Work Sans',sans-serif;font-weight:600;font-size:14px;
    padding:13px 18px;border-radius:12px;width:100%;cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 8px 18px -8px rgba(242,101,42,.6);
  }
  .btn:active{transform:scale(.97);}
  .btn.secondary{
    background:transparent;color:var(--heading);
    border:1.5px solid var(--sand-dark);box-shadow:none;
  }
  .btn.ghost{background:transparent;color:var(--muted);box-shadow:none;font-weight:500;}

  .group-card{
    border-radius:var(--radius);
    border:1px solid #EDE7D8;
    margin-bottom:10px;
    overflow:hidden;
  }
  .group-head{
    background:var(--ocean-deep);color:var(--white);
    font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.04em;
    padding:8px 14px;
  }
  .group-body{padding:10px 14px;}
  .group-body .name{
    display:flex;align-items:center;gap:8px;padding:6px 0;font-size:14px;font-weight:500;
  }
  .group-body .name .dot{width:7px;height:7px;border-radius:50%;background:var(--coral);flex-shrink:0;}

  /* ---------- Tabs filter ---------- */
  .chip-row{display:flex;gap:8px;margin-bottom:14px;}
  .chip{
    font-size:12px;font-weight:600;padding:7px 13px;border-radius:20px;
    border:1.5px solid var(--sand-dark);color:var(--muted);cursor:pointer;
    font-family:'Work Sans',sans-serif;
  }
  .chip.active{background:var(--ocean-deep);color:var(--white);border-color:var(--heading);}

  /* ---------- Match rows ---------- */
  .match{
    display:flex;align-items:center;gap:8px;
    padding:10px 0;border-bottom:1px solid var(--sand-dark);
  }
  .match:last-child{border-bottom:none;}
  .match .team{
    flex:1;font-size:13.5px;font-weight:500;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .match .team.win{color:var(--grass);font-weight:700;}
  .score-input{
    width:40px;text-align:center;border:1.5px solid var(--sand-dark);
    border-radius:8px;padding:7px 2px;font-family:'DM Mono',monospace;font-size:14px;
    color:var(--ink);background:var(--sand);
  }
  .score-input:focus{outline:none;border-color:var(--coral);background:var(--white);}
  .match .x{font-family:'DM Mono',monospace;color:var(--muted);font-size:12px;}
  .group-tag{
    font-family:'DM Mono',monospace;font-size:10px;color:var(--white);
    background:var(--ocean);border-radius:6px;padding:2px 6px;flex-shrink:0;
  }

  /* ---------- Standings table ---------- */
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{
    font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;
    color:var(--muted);text-align:center;padding:6px 3px;letter-spacing:.03em;
  }
  th.name-col, td.name-col{text-align:left;}
  td{padding:7px 3px;text-align:center;border-top:1px solid var(--sand-dark);}
  tr.qualified td{background:var(--sand);font-weight:600;}
  tr.qualified td.pos{color:var(--grass);}
  td.pos{font-family:'DM Mono',monospace;font-weight:700;}

  /* ---------- Bracket ---------- */
  .round-label{
    font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.08em;color:var(--ocean);margin:18px 0 8px;
  }
  .round-label:first-child{margin-top:0;}
  .bracket-match{
    background:var(--white);border:1px solid #EDE7D8;border-radius:12px;
    padding:10px 12px;margin-bottom:10px;
  }
  .bracket-match .lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:6px;}
  .bracket-row{display:flex;align-items:center;gap:8px;padding:4px 0;}
  .bracket-row .team{flex:1;font-size:13.5px;font-weight:500;}
  .bracket-row .team.win{color:var(--grass);font-weight:700;}
  .bracket-row .team.tbd{color:var(--muted);font-style:italic;font-weight:400;}

  .champion-banner{
    background:linear-gradient(150deg,var(--coral),#C94A16);
    color:var(--white);border-radius:var(--radius);
    padding:22px 16px;text-align:center;margin-bottom:16px;
  }
  .champion-banner .eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.85;}
  .champion-banner .name{font-family:'Bebas Neue',sans-serif;font-size:30px;margin-top:4px;}

  .empty{
    text-align:center;padding:30px 10px;color:var(--muted);font-size:13.5px;
  }
  .empty .ball-icon{font-size:30px;display:block;margin-bottom:8px;}

  /* ---------- Bottom nav ---------- */
  nav.tabbar{
    position:sticky;bottom:0;left:0;right:0;
    background:var(--white);border-top:1px solid #EDE7D8;
    display:flex;justify-content:flex-start;
    overflow-x:auto;-webkit-overflow-scrolling:touch;
    padding:8px 4px calc(8px + env(safe-area-inset-bottom));
    z-index:10;
    scrollbar-width:thin;
    scrollbar-color:var(--sand-dark) transparent;
  }
  nav.tabbar::-webkit-scrollbar{height:5px;}
  nav.tabbar::-webkit-scrollbar-track{background:transparent;}
  nav.tabbar::-webkit-scrollbar-thumb{background:var(--sand-dark);border-radius:4px;}
  nav.tabbar button{
    flex:0 0 auto;min-width:64px;background:none;border:none;display:flex;flex-direction:column;
    align-items:center;gap:3px;padding:6px 6px;cursor:pointer;color:var(--muted);
    font-family:'Work Sans',sans-serif;
  }
  nav.tabbar button svg{width:20px;height:20px;}
  nav.tabbar button .lbl{font-size:10px;font-weight:600;white-space:nowrap;}
  nav.tabbar button.active{color:var(--coral);}
  nav.tabbar button{position:relative;}
  nav.tabbar button.tab-bloqueada{opacity:.35;}
  .nav-badge{
    position:absolute;top:2px;right:calc(50% - 22px);
    background:var(--coral);color:#fff;font-family:'DM Mono',monospace;
    font-size:9.5px;font-weight:700;min-width:16px;height:16px;border-radius:8px;
    display:none;align-items:center;justify-content:center;padding:0 3px;
    box-shadow:0 0 0 2px var(--white);
  }
  .nav-badge.show{display:flex;}

  /* Campeonato expirado: mostra tudo normalmente, mas trava qualquer interação que altere
     dados (botões/inputs do conteúdo). Fica de fora do menu inferior e da barra do torneio
     de propósito, pra navegação entre abas e "Trocar torneio" continuarem funcionando. */
  .readonly-banner{
    background:var(--sand);color:var(--heading);border-top:1px solid var(--sand-dark);
    font-size:12px;font-weight:600;text-align:center;padding:8px 14px;
  }
  .app.somente-leitura main button:not(#btn-story-download),
  .app.somente-leitura main input,
  .app.somente-leitura main select,
  .app.somente-leitura main textarea,
  .app.somente-leitura main label.btn,
  .app.somente-leitura main a.btn-send{
    pointer-events:none;opacity:.5;
  }
  /* Qualquer <label> (mesmo sem classe "btn") pode estar embrulhando um checkbox/radio — o
     navegador ativa o input associado ao clicar no label inteiro, mesmo com o input tendo
     pointer-events:none. Sem essa regra à parte, esses toggles (ex: "Disputar 3º/4º lugar")
     continuavam mudando de estado clicando no texto ao lado da caixinha. */
  .app.somente-leitura main label{
    pointer-events:none;
  }

  .toast{
    position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(10px);
    background:var(--ocean-deep);color:var(--white);padding:10px 16px;border-radius:10px;
    font-size:13px;opacity:0;transition:opacity .25s, transform .25s;pointer-events:none;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .tiebreak-note{
    font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4;
  }
  .live-score-badge{
    display:inline-block;font-size:11px;font-weight:700;color:var(--coral);
    background:#FDF1E7;padding:3px 10px;border-radius:20px;margin:6px 0 2px;
  }

  /* ---------- Fluxo de Jogos (auditoria) ---------- */
  .flow-connector{width:2px;height:16px;background:var(--sand-dark);margin:0 auto;position:relative;}
  .flow-connector::after{
    content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
    border:5px solid transparent;border-top-color:var(--sand-dark);
  }
  .flow-card{
    background:var(--white);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);
    border-left:4px solid var(--ocean);
  }
  .flow-card .flow-title{font-weight:700;font-size:13px;color:var(--heading);margin-bottom:5px;}
  .flow-card .flow-detail{font-size:12px;color:var(--muted);line-height:1.6;}
  .flow-badge{
    display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;
    border-radius:20px;margin-left:4px;letter-spacing:.02em;
  }

  /* ---------- Login / Torneios ---------- */
  .login-wrap{
    min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:20px 10px;
  }
  .login-wrap .ball-big{font-size:56px;margin-bottom:10px;}
  .login-wrap h2{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--heading);margin:0 0 8px;}
  .login-wrap p{font-size:13px;color:var(--muted);margin:0 0 22px;max-width:320px;line-height:1.5;}
  #google-signin-btn{display:flex;justify-content:center;}
  .gcid-box{width:100%;max-width:320px;text-align:left;}
  .gcid-box label{font-size:12px;font-weight:600;color:var(--heading);display:block;margin-bottom:6px;}
  .gcid-box .hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.4;text-align:left;}

  .torneio-bar{
    display:flex;align-items:center;gap:8px;margin-top:8px;
    font-size:12px;color:rgba(255,255,255,.85);
  }
  .torneio-bar .voltar{
    background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;
    padding:5px 10px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:'Work Sans',sans-serif;
  }
  .user-chip{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .user-chip img{width:42px;height:42px;border-radius:50%;}
  .user-chip .name{font-weight:700;font-size:14px;color:var(--heading);}
  .user-chip .email{font-size:11px;color:var(--muted);}
  .torneio-item{
    border:1.5px solid var(--sand-dark);border-radius:12px;padding:12px 14px;margin-bottom:10px;
    cursor:pointer;background:var(--white);
  }
  .torneio-item .row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .torneio-item .nome{font-weight:700;font-size:14.5px;color:var(--heading);}
  .torneio-item .sub{font-size:11px;color:var(--muted);margin-top:4px;}
  .status-pill{
    font-size:10.5px;font-weight:700;border-radius:20px;padding:4px 10px;white-space:nowrap;flex-shrink:0;
  }
  .status-pill.criado{background:#E3F4FC;color:#0E7FB8;}
  .status-pill.andamento{background:#FDF1E7;color:var(--coral);}
  .status-pill.finalizado{background:#E2EFDA;color:var(--grass);}
  .btn-excluir{
    background:none;border:none;color:#C0392B;font-size:11px;font-weight:600;
    font-family:'Work Sans',sans-serif;cursor:pointer;padding:4px 6px;flex-shrink:0;
  }

  /* ---------- Ações de arbitragem (mini botões sob cada jogo) ---------- */
  .ref-actions-row{display:flex;gap:8px;padding:0 2px 10px;margin-top:10px;}
  .ref-mini-btn{
    flex:1;border:none;border-radius:9px;padding:7px 6px;font-size:11.5px;font-weight:700;
    font-family:'Work Sans',sans-serif;cursor:pointer;background:var(--ocean-deep);color:var(--white);
  }
  .ref-mini-btn.ghost{background:var(--sand);color:var(--heading);border:1px solid var(--sand-dark);}
  .ref-mini-btn:active{transform:scale(.96);}

  /* ---------- Tela do juiz (Apitar jogo) ---------- */
  .ref-screen{
    position:fixed;inset:0;background:var(--ocean-deep);color:var(--white);z-index:200;
    display:flex;flex-direction:column;align-items:center;padding:18px 18px 30px;
    font-family:'Work Sans',sans-serif;overflow-y:auto;
  }
  .ref-top{width:100%;max-width:420px;display:flex;align-items:center;gap:12px;margin-bottom:6px;}
  .ref-close{
    width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,.12);
    color:var(--white);font-size:16px;cursor:pointer;flex-shrink:0;
  }
  .ref-label{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.02em;opacity:.9;}
  .ref-timer-box{text-align:center;margin:14px 0 6px;}
  .ref-timer{font-family:'DM Mono',monospace;font-size:46px;font-weight:600;letter-spacing:.02em;}
  .status-tecnico .ref-timer{color:var(--coral);}
  .status-finalizada .ref-timer{color:var(--grass);}
  .ref-timer-status{font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;opacity:.75;margin-top:2px;}
  .ref-board{
    display:flex;align-items:center;justify-content:center;gap:14px;
    width:100%;max-width:420px;margin:14px 0 6px;
  }
  .ref-team-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;background:rgba(255,255,255,.06);border-radius:20px;padding:14px 8px 16px;}
  .ref-vs{font-family:'Bebas Neue',sans-serif;font-size:20px;opacity:.6;}
  .ref-score-btn{
    width:56px;height:44px;border-radius:12px;border:none;font-size:24px;font-weight:700;
    cursor:pointer;color:var(--heading);
  }
  .ref-score-btn.plus{background:var(--grass);color:var(--white);}
  .ref-score-btn.minus{background:rgba(255,255,255,.85);}
  .ref-score-btn:active{transform:scale(.94);}
  .ref-score-btn:disabled{opacity:.35;pointer-events:none;}
  .ref-score-num{font-family:'DM Mono',monospace;font-size:52px;font-weight:600;line-height:1;}
  .ref-team-nome{font-size:13px;font-weight:600;text-align:center;max-width:110px;}
  .ref-actions{width:100%;max-width:420px;display:flex;flex-direction:column;gap:10px;margin-top:16px;}
  .ref-actions .btn{margin:0;}
  .ref-btn-fim{border:1.5px solid var(--coral)!important;color:var(--coral)!important;}
  .ref-final-msg{
    background:rgba(255,255,255,.1);border-radius:12px;padding:12px;text-align:center;
    font-size:13.5px;font-weight:600;
  }
  .ref-tv-link{
    margin-top:18px;background:none;border:none;color:rgba(255,255,255,.75);font-size:12.5px;
    text-decoration:underline;cursor:pointer;font-family:'Work Sans',sans-serif;
  }

  /* ---------- Popup de troca de lado ---------- */
  .popup-troca{
    position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;
    background:rgba(11,60,73,.55);opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .popup-troca.show{opacity:1;pointer-events:auto;}
  .popup-troca-inner{
    background:var(--white);color:var(--ink);border-radius:20px;padding:26px 24px;text-align:center;
    max-width:280px;box-shadow:var(--shadow);
  }
  .popup-troca-icon{font-size:38px;margin-bottom:8px;}
  .popup-troca-msg{font-family:'Bebas Neue',sans-serif;font-size:20px;margin-bottom:16px;}
  .popup-troca-ok{
    background:var(--coral);color:var(--white);border:none;border-radius:10px;
    padding:9px 26px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:'Work Sans',sans-serif;
  }

  /* ---------- Placar para TV ---------- */
  .tv-screen{
    position:fixed;inset:0;background:var(--ocean-deep);color:var(--white);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Work Sans',sans-serif;text-align:center;padding:30px;
  }
  .tv-loading{font-size:22px;opacity:.8;}
  .tv-label{
    font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,4vw,44px);letter-spacing:.03em;
    opacity:.85;margin-bottom:4vh;
  }
  .tv-board{display:flex;align-items:center;justify-content:center;gap:6vw;width:100%;}
  .tv-team{flex:1;max-width:38%;}
  .tv-team-nome{
    font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,3.4vw,40px);letter-spacing:.02em;
    margin-bottom:2vh;word-break:break-word;
  }
  .tv-score{font-family:'DM Mono',monospace;font-weight:700;font-size:clamp(70px,14vw,180px);line-height:1;}
  .tv-x{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,4vw,50px);opacity:.5;}
  .tv-footer{margin-top:6vh;}
  .tv-timer{font-family:'DM Mono',monospace;font-size:clamp(30px,5vw,60px);font-weight:600;}
  .tv-status{font-size:clamp(14px,2vw,20px);letter-spacing:.08em;text-transform:uppercase;opacity:.75;margin-top:6px;}

  /* ---------- Placar para TV — múltiplos jogos numa grade ---------- */
  .tv-multi-grid{position:absolute;inset:16px;display:grid;gap:12px;}
  .tv-multi-cell{
    background:rgba(255,255,255,.06);border-radius:14px;min-width:0;min-height:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:6px;overflow:hidden;
    /* Cada célula vira seu próprio "container" de medida — assim as unidades cq* abaixo
       escalam com o tamanho REAL da célula (largura e altura, já divididas pela grade),
       em vez de um px fixo calculado só a partir do nº de colunas (que ignorava as linhas
       e não aproveitava a altura sobrando quando há poucas linhas). */
    container-type:size;
  }
  .tv-multi-label{font-family:'Bebas Neue',sans-serif;opacity:.85;letter-spacing:.02em;text-align:center;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;font-size:clamp(10px,9cqmin,32px);}
  .tv-multi-board{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-width:0;}
  .tv-multi-team{flex:1;text-align:center;min-width:0;}
  .tv-multi-nome{font-family:'Bebas Neue',sans-serif;letter-spacing:.02em;word-break:break-word;margin-bottom:2px;font-size:clamp(10px,9cqmin,34px);}
  .tv-multi-score{font-family:'DM Mono',monospace;font-weight:700;line-height:1;font-size:clamp(28px,32cqmin,160px);}
  .tv-multi-x{opacity:.5;font-family:'Bebas Neue',sans-serif;flex-shrink:0;font-size:clamp(14px,10cqmin,40px);}
  .tv-multi-footer{margin-top:4px;text-align:center;}
  .tv-multi-timer{font-family:'DM Mono',monospace;font-weight:600;display:block;font-size:clamp(12px,8cqmin,32px);}
  .tv-multi-status{text-transform:uppercase;letter-spacing:.06em;opacity:.75;display:block;margin-top:2px;font-size:clamp(9px,4cqmin,16px);}

  /* ---------- Loading (spinner) ---------- */
  @keyframes girar{to{transform:rotate(360deg);}}
  .spinner{
    width:38px;height:38px;border-radius:50%;
    border:4px solid rgba(255,255,255,.25);
    border-top-color:var(--white);
    animation:girar .7s linear infinite;
  }
  .spinner.inline{
    width:16px;height:16px;border-width:2.5px;
    border:2.5px solid rgba(0,0,0,.15);
    border-top-color:currentColor;
    display:inline-block;vertical-align:-3px;margin-right:7px;
  }
  .loading-overlay{
    position:fixed;inset:0;z-index:9999;
    background:rgba(11,25,15,.55);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    opacity:0;transition:opacity .15s;
  }
  .loading-overlay.show{display:flex;opacity:1;}
  .loading-overlay .loading-msg{color:var(--white);font-size:13px;font-weight:600;text-align:center;padding:0 30px;}

</style>
</head>
<body>

<script>
/* ============================================================
   ESTADO
============================================================ */
const STORAGE_KEY = "futevolei_state_v1";
// Marca (persistida, sobrevive a reload/fechar o app) que uma alteração local ainda não foi
// confirmada como salva no servidor — ver marcarSyncPendente/limparSyncPendente/haSyncPendente,
// usados por refreshTorneioAtual pra nunca puxar um estado do servidor mais velho que o daqui.
const SYNC_PENDENTE_KEY = "futevolei_sync_pendente_v1";
function marcarSyncPendente(){ try{ localStorage.setItem(SYNC_PENDENTE_KEY, "1"); }catch(e){} }
function limparSyncPendente(){ try{ localStorage.removeItem(SYNC_PENDENTE_KEY); }catch(e){} }
function haSyncPendente(){ try{ return localStorage.getItem(SYNC_PENDENTE_KEY)==="1"; }catch(e){ return false; } }

// Uma dupla cadastrada manualmente pelo organizador nasce "ativa" (sem inscrição/pagamento
// pra confirmar) — só duplas vindas do link público de inscrição nascem "pendente" (ver
// /api/inscricao no worker). O "id" existe em toda dupla (inclusive manuais) porque o botão
// Aprovar/Bloquear, o merge defensivo do servidor e os códigos do Telegram (ver codigoDupla)
// precisam de uma referência estável — o índice dentro do array não serve mais pra isso
// assim que duplas podem chegar de forma assíncrona por um formulário público.
function criarDuplaVazia(nome){
  return {
    id: crypto.randomUUID(),
    nome, tel1:"", tel2:"", nomeDefault:true,
    // Nasce "pendente" mesmo sendo cadastro manual — o organizador precisa aprovar
    // explicitamente (botão Aprovar) antes dela entrar no sorteio, igual a uma inscrição
    // pública ainda não paga. "ativacaoVia" registra COMO ela foi ativada depois
    // ("manual" pelo botão Aprovar, ou "pix" quando o pagamento da inscrição é confirmado
    // sozinho) — é independente de "origem" (que registra só COMO ela foi cadastrada).
    origem:"manual", status:"pendente", ativacaoVia:null,
    jogador1:null, jogador2:null,
    inscricao:null,
    cabecaDeChave:false,
    atualizadoEm: Date.now()
  };
}

function defaultState(){
  return {
    tab: "resumo",
    duplas: [], // torneio novo começa sem nenhuma dupla — o organizador adiciona manualmente ou via link de inscrição
    formato: "grupos", // "grupos" | "eliminacao" — escolhido antes do sorteio
    numGrupos: 4, // (formato "grupos") quantidade de grupos, deve dividir a qtde de duplas igualmente
    elimTarget: 4, // (formato "eliminacao") quantidade de duplas que avançam pro mata-mata (potência de 2)
    drawn: false,
    groups: [], // [[nomes do grupo 0], [grupo 1], ...] — quantidade e tamanho dinâmicos
    groupMatches: [], // {group,jogo,a,b,pa,pb}
    elimRodadas: [], // (formato "eliminacao") [{matches:[{a,b,pa,pb}], bye:nome|null}, ...]
    bracketSeed: null, // (formato "eliminacao") lista fixa de classificados que abre a 1ª rodada do mata-mata (sempre uma potência de 2, sem folgas)
    bracket: [], // [[{pa,pb}, ...], [...], ...] — cada posição é uma rodada do mata-mata (tamanho = log2(qualificados))
    terceiro: {pa:null,pb:null,finalizado:false,wo:null},
    terceiroLugar: false,
    filter: "todos",
    tournamentId: null,
    telegramBot: "",
    elimNotified: {},
    elimRepescagemEscolha: null, // (formato "eliminacao") nomes escolhidos pelo organizador pra repescagem, só quando há empate real (ver elimRepescagemInfo)
    grupoDesempateEscolha: null, // (formato "grupos") nomes escolhidos pelo organizador pra decidir empate técnico na última vaga de classificação de cada grupo, só quando há empate real (ver gruposDesempateInfo)
    mataMataConfirmado: false, // (formato "grupos") true depois que o organizador confirma a geração dos jogos do mata-mata pelo botão "Gerar jogos" — só é exigido quando existe empate técnico pendente (ver gruposDesempateInfo); sem empate, o mata-mata é liberado normalmente sem essa confirmação extra
    resetadoEm: null, // timestamp (Date.now()) do último "Reiniciar torneio" — usado só pelo worker (torneiosSave) pra saber que a arbitragem antiga do servidor pode ser descartada de vez em vez de resgatada de volta (ver merge defensivo de arbitragem)
    cloudId: null,
    cloudNome: "",
    ownerEmail: null, // dono de verdade do torneio — usado só pra decidir se ESTE usuário logado pode gerenciar a lista de usuários com acesso (usuariosPermitidos) abaixo
    usuariosPermitidos: [], // e-mails com acesso compartilhado a este torneio (além do dono) — gerenciado só por dono/admin, ver /api/torneios-usuario-adicionar
    codigo: null, // identificador sequencial de 10 posições (ex: 0000012026), definido pelo servidor na criação
    aprovacaoStatus: "pendente", // "pendente" | "aprovado" | "recusado" — definido pelo admin
    dataInicio: null, // validade do campeonato (yyyy-mm-dd), definida na criação
    dataFim: null,
    pagamento: null, // {status:"pendente"|"pago", valor, dias, paymentId, copiaCola, qrCodeBase64, criadoEm, pagoEm} — null até o Pix ser gerado
    valorOverride: null, // valor do Pix definido manualmente pelo admin na aprovação (sobrescreve o cálculo automático de dias × R$ 70)
    cupomAplicado: null, // {nome, percentual} — travado no momento da criação, nunca muda depois mesmo que o cupom seja editado/bloqueado
    headerImage: null, // data URL da imagem de topo customizada para este campeonato (opcional)
    arbitragem: {}, // {[matchId]: {status, placarA, placarB, acumuladoMs, inicioMs, ultimoMultiploTroca, duracaoFinalSegundos}}
    apitoMatchId: null,
    valorInscricao: null, // valor da inscrição por dupla, definido pelo organizador (aba Configurações) — null até ser configurado
    inscricaoLink: null // {token, ativo, vagas} — token do link público de inscrição, gerado sob demanda (ver /api/inscricao-link)
  };
}

/* Compatibilidade: torneios salvos antes desta versão tinham "elim.qf/sf/final" fixos
   (sempre 4 grupos -> 8 qualificados). Se detectarmos esse formato antigo e ainda
   não existir um "bracket" novo, convertemos automaticamente, sem perder resultados. */
function migrarBracketAntigo(s){
  if(s && s.elim && (!s.bracket || !s.bracket.length) && Array.isArray(s.elim.qf)){
    s.numGrupos = s.numGrupos || 4;
    s.bracket = [
      s.elim.qf.map(m=>({pa:m.pa, pb:m.pb})),
      s.elim.sf.map(m=>({pa:m.pa, pb:m.pb})),
      [{pa:s.elim.final.pa, pb:s.elim.final.pb}]
    ];
    if(!s.terceiro || (s.terceiro.pa==null && s.terceiro.pb==null)){
      s.terceiro = { pa: s.elim.terceiro?.pa ?? null, pb: s.elim.terceiro?.pb ?? null };
    }
  }
  // Duplas salvas antes da inscrição pública existir não têm id/origem/status/etc — completa
  // com os valores equivalentes a "cadastrada manualmente e já ativa", sem regressão nenhuma
  // pra torneios já em andamento.
  if(s && Array.isArray(s.duplas)){

      if(d.jogador1===undefined) d.jogador1 = null;
      if(d.jogador2===undefined) d.jogador2 = null;
      if(d.inscricao===undefined) d.inscricao = null;
      if(d.cabecaDeChave===undefined) d.cabecaDeChave = false;
      if(!d.atualizadoEm) d.atualizadoEm = Date.now();
    });
  }
  return s;
}

// Admin agora é decidido pelo servidor (lista de e-mails Google reais em ADMIN_EMAILS no
// Worker), nunca pelo e-mail em si aqui no cliente. auth.isAdmin é preenchido pelo servidor
// logo após o login (ver fetchAndCacheClientId) e cacheado localmente.
function ehAdmin(){
  return !!auth && !!auth.isAdmin;
}
// Header pra toda chamada às rotas de dono/admin — o servidor agora exige esse token assinado
// (emitido no login) em vez de confiar num e-mail solto no corpo/query da requisição, senão
// qualquer requisição direta podia se passar por qualquer e-mail (ver CLAUDE.md, correção da
// brecha de autenticação). Sem token (ex: sessão antiga de antes dessa mudança, ou o raro
// fallback de popup do Google, que não emite token), a requisição chega sem esse header e o
// servidor responde 401 — quem chama trata isso pedindo login de novo.
function authHeaders(){
  return auth?.sessionToken ? { "Authorization": `Bearer ${auth.sessionToken}` } : {};
}
// Sessão inválida/expirada (ou o raro caso de login via popup, que não emite token nenhum):
// desloga só a CONTA (preserva o torneio/estado local, ao contrário de logout()) e pede pra
// entrar de novo — nunca perde dado nenhum, só a "credencial" de quem está mexendo.
function sessaoExpirada(){
  auth = null;
  saveAuth(null);
  showToast("Sessão expirada — faça login novamente.");
  render();
}
// Wrapper fino sobre fetch() só pras rotas de dono/admin: grudam o header Authorization
// automaticamente e tratam 401 (sessão inválida/expirada) num lugar só, em vez de repetir essa
// checagem em cada chamador. Rotas públicas (apito, inscrição, placar de TV) continuam usando
// fetch() puro — não têm noção de sessão nenhuma, são protegidas por token de recurso à parte.
async function apiFetch(url, options){
  options = options || {};
  options.headers = Object.assign({}, options.headers, authHeaders());
  const res = await fetch(url, options);
  if(res.status === 401) sessaoExpirada();
  return res;
}

const GCID_KEY = "futevolei_gclientid_v1";

function loadClientId(){ return localStorage.getItem(GCID_KEY) || ""; }
function cacheClientId(v){ localStorage.setItem(GCID_KEY, (v||"").trim()); }

// O Client ID agora é uma configuração global do app, guardada no servidor e definida só
// pelo admin (aba Torneios → Configurações do app). Aqui só buscamos o valor atual pra usar
// no botão de login; se estiver offline, seguimos com o último valor já guardado neste navegador.
async function fetchAndCacheClientId(){
  try{
    const url = auth ? `/api/config-get?email=${encodeURIComponent(auth.email)}` : "/api/config-get";
    const res = await apiFetch(url, { cache:"no-store" });
    if(!res.ok) throw new Error("resposta não-ok");
    const data = await res.json();
    const novo = (data.googleClientId||"").trim();
    const atual = loadClientId();
    if(typeof data.adminNotificationEmail === "string"){
      adminNotificationEmailCache = data.adminNotificationEmail;
    }
    if(typeof data.valorDiaria === "number" && data.valorDiaria > 0){
      valorDiariaCache = data.valorDiaria;
    }
    // O servidor é a única fonte de verdade sobre quem é admin (lista ADMIN_EMAILS no Worker).
    // Atualiza e persiste isso sempre que confirmamos com o servidor, pra não ficar "preso"
    // com um valor antigo se a lista mudar.
    if(auth && !!auth.isAdmin !== !!data.isAdmin){
      auth = { ...auth, isAdmin: !!data.isAdmin };
      saveAuth(auth);
      render();
    }
    if(novo !== atual){
      cacheClientId(novo);
      if(!auth){ render(); }
      setTimeout(initGoogleSignIn, 50);
    }
  }catch(e){ /* sem conexão — segue com o valor já salvo localmente, se houver */ }
}

// Só o admin pode alterar essas configurações (ficam salvas no servidor, valem pra todo mundo).
async function salvarConfigAdmin({googleClientId, adminNotificationEmail, valorDiaria}){
  try{

    if(googleClientId !== undefined) body.googleClientId = googleClientId;
    if(adminNotificationEmail !== undefined) body.adminNotificationEmail = adminNotificationEmail;
    if(valorDiaria !== undefined) body.valorDiaria = valorDiaria;
    const res = await apiFetch("/api/config-set", {

      body: JSON.stringify(body)
    });
    if(res.status===403){ showToast("Só o admin pode alterar essa configuração."); return false; }
    if(!res.ok) throw new Error("resposta não-ok");
    if(googleClientId !== undefined) cacheClientId(googleClientId);
    if(adminNotificationEmail !== undefined) adminNotificationEmailCache = adminNotificationEmail;
    if(valorDiaria !== undefined) valorDiariaCache = valorDiaria;
    return true;
  }catch(e){
    showToast("Sem conexão com o servidor — não foi possível salvar.");
    return false;
  }
}

function decodeJwt(token){
  try{
    const payload = token.split(".")[1];
    const b64 = payload.replace(/-/g,"+").replace(/_/g,"/");
    const json = decodeURIComponent(
      atob(b64).split("").map(c => "%" + ("00"+c.charCodeAt(0).toString(16)).slice(-2)).join("")
    );
    return JSON.parse(json);
  }catch(e){ return null; }
}

// Melhor esforço pra saber se o acesso foi via wifi/celular/etc, só informativo pro log de
// atividade — a Network Information API é não-padrão e o Safari/iOS não implementa (então fica
// null pra boa parte dos acessos; é esperado, não indica erro nenhum).
function detectarTipoConexao(){
  try{
    const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if(!c) return null;
    return c.type || c.effectiveType || null;
  }catch(e){ return null; }
}

// mesmo depois de trocar de conta, o que gerava confusão (e até duplicidade de torneios,
// já que qualquer ação ali passava a salvar com o e-mail da conta nova).

function handleGoogleCredential(response){
  const payload = decodeJwt(response.credential);
  if(!payload) return;
  // Esse caminho (fallback popup) nunca emite sessionToken — só o login via redirect
  // (googleLoginCallback, protegido por CSRF) faz isso. Sem token, as ações autenticadas
  // (salvar torneio, gerar Pix etc.) vão responder 401 e pedir login de novo — o usuário só
  // segue de fato autenticado se cair no fluxo padrão (redirect), o que resolve sozinho no
  // próximo carregamento normal da página. Ver bloco "SESSÃO DE LOGIN" em worker.ts.
  auth = { email: payload.email, name: payload.name, picture: payload.picture };
  saveAuth(auth);
  render();
  fetchAndCacheClientId();
  // Fallback do fluxo popup — o fluxo redirect (padrão hoje) já loga o acesso direto no servidor
  // em googleLoginCallback, sem precisar dessa chamada extra.
  fetch("/api/log-acesso", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ email: auth.email, name: auth.name, conexao: detectarTipoConexao() })
  }).catch(()=>{});
}

function initGoogleSignIn(tentativa){
  tentativa = tentativa || 0;
  const clientId = loadClientId();
  const btnDiv = document.getElementById("google-signin-btn");
  if(!clientId || !btnDiv) return;
  if(!window.google || !google.accounts || !google.accounts.id){
    // accounts.google.com/gsi/client é carregado com async/defer — na primeira visita (sem nada
    // em cache do navegador ainda) ele pode não estar pronto nos 50ms que os chamadores de
    // initGoogleSignIn esperam por padrão. Sem essa nova tentativa, o botão simplesmente nunca
    // aparecia até um refresh (quando o script já carregava rápido o bastante). Tenta de novo por
    // até ~6s antes de desistir de vez.
    if(tentativa < 30) setTimeout(()=>initGoogleSignIn(tentativa+1), 200);
    return;
  }
  try{
    // itp_support: navegadores com Intelligent Tracking Prevention (Safari é o principal) bloqueiam
    // o cookie de terceiro que o Google usaria por padrão pra lembrar a sessão.
    // ux_mode:"redirect": no popup padrão, "Usar outra conta" fica preso dentro do próprio popup em
    // alguns Safaris (o ITP isola o popup de um jeito que a navegação interna não avança). No modo
    // redirect a aba inteira navega pro Google e volta via POST pro back-end (rota
    // /api/google-login-callback, que grava o auth no localStorage e redireciona de volta), o que é
    // mais robusto nesses navegadores.
    google.accounts.id.initialize({
      client_id: clientId,
      callback: handleGoogleCredential, // só entra em jogo se o navegador cair num fallback popup
      itp_support: true,
      ux_mode: "redirect",
      login_uri: `${location.origin}/api/google-login-callback`
    });
    google.accounts.id.renderButton(btnDiv, { theme:"outline", size:"large", width: 280 });
  }catch(e){ /* client id inválido ou domínio não autorizado */ }
}

function logout(){
  const emailAnterior = auth?.email;
  auth = null;
  saveAuth(null);
  limparTorneioLocal(); // sem isso, a próxima conta que logar neste navegador "herdava" este torneio
  try{
    if(window.google && google.accounts && google.accounts.id){
      google.accounts.id.disableAutoSelect();
      // Revoga o consentimento desse app pra essa conta (não desloga do Google em si) — sem isso,
      // ao tentar entrar com outra conta logo em seguida, o Google às vezes reoferece só a conta
      // anterior em vez de mostrar o seletor de contas.
      if(emailAnterior) google.accounts.id.revoke(emailAnterior, ()=>{});
    }
  }catch(e){}
  render();
}

function saveTorneioLocalFallback(payload){

    nome: payload.nome, status: payload.status,
    ownerEmail: payload.ownerEmail, ownerName: payload.ownerName,
    createdAt: existing?.createdAt || now, updatedAt: now,
    aprovacaoStatus: existing ? existing.aprovacaoStatus : "pendente",
    dataInicio: existing ? existing.dataInicio : (payload.dataInicio || null),
    dataFim: existing ? existing.dataFim : (payload.dataFim || null)
  };
  db[id] = { ...meta, state: payload.state };
  setLocalTorneiosDB(db);
  return meta;
}

// Anota .a/.b (nomes das duplas) nos jogos do mata-mata/3º lugar antes de enviar pro servidor.
// state.bracket nunca guarda nome nos próprios objetos — só o cliente resolve dinamicamente quem
// joga cada confronto (bracketTeamsForRound/gruposClassificadosFinal), já que isso depende de
// standings e de uma eventual decisão de empate técnico ainda podendo mudar. Sem isso, o worker
// não tem como saber quem jogou ao gerar o log de atividade (registrarLogs em torneiosSave),
// e "Jogo finalizado: ? 18 x 14 ?" saía com "?" no lugar dos nomes. Nada no cliente lê .a/.b
// direto do objeto do bracket (sempre recebe os nomes já resolvidos como parâmetro à parte),
// então anotar aqui é só um espelho pro servidor, sem risco de conflitar com nada.
function anotarNomesBracket(){
  if(!state.bracket || !state.bracket.length) return;
  const rounds = totalRoundsBracket();
  for(let r=0; r<rounds; r++){
    const teams = bracketTeamsForRound(r);
    (state.bracket[r]||[]).forEach((m,i)=>{
      const [a,b] = teams[i] || [null,null];
      m.a = a || null;
      m.b = b || null;
    });
  }
  if(state.terceiroLugar && state.terceiro){
    const [la,lb] = semifinalLosers();
    state.terceiro.a = la || null;
    state.terceiro.b = lb || null;
  }
}

function montarPayloadTorneio(){

    ownerEmail: auth.email,
    ownerName: auth.name,

async function enviarTorneioAgora(payload, keepalive){
  enviosPendentes++;
  try{
    const res = await apiFetch("/api/torneios-save", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload),
      keepalive: !!keepalive
    });
    if(!res.ok){
      let detalhe = `HTTP ${res.status}`;
      try{
        const errJson = await res.json();
        if(errJson && errJson.error) detalhe += `: ${errJson.error}`;
      }catch(e){}
      throw new Error(detalhe);
    }
    const data = await res.json();
    // Só aplica a resposta se o torneio aberto neste aparelho ainda for o mesmo que originou
    // esse envio — sem essa checagem, sair do torneio (via "Trocar torneio", que reseta state
    // pra defaultState()) enquanto um envio ainda estava em voo fazia essa resposta "reatar" o
    // cloudId do torneio real de volta num state em branco (sem nome, sem pagamento). Esse state
    // corrompido, se sincronizado depois, salvava "Torneio sem nome" por cima do torneio de
    // verdade e fazia parecer que o Pix tinha sumido.
    if(data.id && state.cloudId===payload.id){
      state.cloudId = data.id;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    limparSyncPendente();
    return {ok:true, erro:null};
  }catch(e){
    // Sem servidor de functions disponível (ex: hospedagem local simples) — usa reserva local
    const meta = saveTorneioLocalFallback(payload);
    if(state.cloudId===payload.id){
      state.cloudId = meta.id;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    // Fica marcado como pendente (ver marcarSyncPendente em save()) — o servidor ainda está com
    // um estado mais velho que o daqui. Persistido (não só em memória) porque esse "mais velho"
    // continua verdadeiro mesmo que a página seja recarregada antes da rede voltar.
    return {ok:false, erro: (e && e.message) ? e.message : String(e)};
  }finally{
    enviosPendentes = Math.max(0, enviosPendentes-1);
  }
}

function syncTorneio(){
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>{
    if(!auth || !state.cloudId) return; // nunca cria torneio novo por aqui — só sincroniza um que já está aberto
    enviarTorneioAgora(montarPayloadTorneio(), false);
  }, 800);
}

// Envio de emergência: garante que a última alteração não fique só no aparelho
// se a página for fechada/minimizada antes do envio programado (800ms) terminar.
function flushSyncTorneio(keepalive){
  clearTimeout(syncTimer);
  syncTimer = null;
  if(!auth || !state.cloudId) return Promise.resolve(true);
  return enviarTorneioAgora(montarPayloadTorneio(), !!keepalive);
}

function linhasRelatorioCupons(){
  const cupons = cuponsList || [];
  const cupomPorNome = {};
  cupons.forEach(c=> cupomPorNome[c.nomeNormalizado] = c);
  return (torneiosList || [])
    .filter(t=> !!t.cupomAplicado)
    .map(t=>{
      const cupomAtual = cupomPorNome[(t.cupomAplicado.nome||"").trim().toUpperCase()] || null;
      const dias = calcularDiasLocal(t.dataInicio, t.dataFim);
      const valorFinal = typeof t.valorOverride==="number" ? t.valorOverride : calcularValorComCupomLocal(dias, t.cupomAplicado);
      const comissaoPercentual = cupomAtual ? (cupomAtual.comissaoPercentual ?? null) : null;
      const comissaoValor = comissaoPercentual!=null ? valorFinal*(comissaoPercentual/100) : null;
      return { t, valorFinal, comissaoPercentual, comissaoValor };
    })
    .sort((a,b)=> (b.t.createdAt||"").localeCompare(a.t.createdAt||""));
}

// Só existe comissão "a repassar" de verdade quando o cupom tem % de comissão configurado E o
// torneio pagou algo (cupom de 100%/torneio grátis dá comissaoValor 0 mesmo com % configurado —
// não faz sentido pedir repasse de R$0). Usada tanto pra decidir o que mostrar/filtrar no
// relatório quanto pra travar o botão "Marcar como repassada" nesses casos.
function temComissaoARepassar(comissaoValor){
  return comissaoValor!=null && comissaoValor > 0;
}

// Aplica os filtros atuais (cupom + status de repasse) sobre linhasRelatorioCupons() — usada
// tanto pra desenhar a tela (com paginação por cima) quanto pela exportação CSV, que precisa do
// mesmo recorte só que sem paginar, pra não exportar página por página.
function linhasRelatorioCuponsFiltradas(){
  let linhas = linhasRelatorioCupons();
  if(relatorioFiltroCupom!=="todos") linhas = linhas.filter(l=> l.t.cupomAplicado.nome===relatorioFiltroCupom);
  if(relatorioFiltroRepasse==="pendente") linhas = linhas.filter(l=> temComissaoARepassar(l.comissaoValor) && !l.t.comissaoRepassada);
  if(relatorioFiltroRepasse==="repassado") linhas = linhas.filter(l=> temComissaoARepassar(l.comissaoValor) && l.t.comissaoRepassada);
  return linhas;
}

function baixarArquivo(nome, conteudo, tipo){
  const blob = new Blob([conteudo], { type: tipo });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = nome;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportarRelatorioCuponsCSV(linhas){

  const linhasCSV = linhas.map(({t, valorFinal, comissaoPercentual, comissaoValor})=> [
    t.codigo||"", t.nome||"", t.cupomAplicado.nome||"", t.cupomAplicado.percentual,
    t.ownerName||"", t.ownerEmail||"", formatarDataBR((t.createdAt||"").slice(0,10)),
    t.pagamentoStatus||"", valorFinal.toFixed(2).replace(".",","),

// Checagem "ao vivo" do cupom digitado na criação de um torneio — cacheada por nome digitado
// pra não bater na API a cada tecla de novo com o mesmo valor.
async function validarCupomDigitado(nome){
  const chave = (nome||"").trim().toUpperCase();
  if(!chave) return null;
  if(cupomValidacaoCache[chave]) return cupomValidacaoCache[chave];
  try{
    const res = await fetch(`/api/cupons-validar?nome=${encodeURIComponent(chave)}`, { cache:"no-store" });
    const data = await res.json();
    cupomValidacaoCache[chave] = data;
    return data;
  }catch(e){
    return { valido:false, motivo:"Não foi possível checar o cupom agora." };
  }
}

// Máscara de moeda estilo "caixa eletrônico": os dígitos digitados sempre entram pela direita
// (representam centavos), então o valor cresce da direita pra esquerda — sem precisar digitar
// vírgula nem se preocupar com posição do cursor. Ex: digitar 1,2,3,4 vira R$ 12,34.
function formatarCentavosBRL(digitosStr){
  let digits = (digitosStr || "").replace(/\D/g,"");
  digits = digits.replace(/^0+(?=\d)/, "");
  if(digits==="") digits = "0";
  while(digits.length<3) digits = "0"+digits;
  const centavos = digits.slice(-2);
  let reais = digits.slice(0,-2).replace(/^0+(?=\d)/, "") || "0";
  reais = reais.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  return `R$ ${reais},${centavos}`;
}
// Converte o texto mascarado (ex: "R$ 1.234,56") de volta pro número puro (1234.56).
function valorMascaradoParaNumero(texto){
  const digits = (texto || "").replace(/\D/g,"");
  if(!digits) return 0;
  return Number(digits) / 100;
}

// Máscara padrão de telefone celular brasileiro, digitada da esquerda pra direita, no formato
// "(11) 90000-0000" (9º dígito) — ou "(11) 0000-0000" (fixo, 10 dígitos) enquanto o usuário
// ainda não completou o 11º dígito. Limita em 11 dígitos (DDD + 9 dígitos).
function formatarTelefoneBR(digitosStr){
  const digits = (digitosStr || "").replace(/\D/g,"").slice(0,11);
  if(digits.length===0) return "";
  if(digits.length<=2) return `(${digits}`;
  const ddd = digits.slice(0,2);
  const resto = digits.slice(2);
  if(resto.length<=4) return `(${ddd}) ${resto}`;
  if(digits.length<=10) return `(${ddd}) ${resto.slice(0,4)}-${resto.slice(4)}`;
  return `(${ddd}) ${resto.slice(0,5)}-${resto.slice(5)}`;
}

// cupomInfo é opcional — só é usado na tela de criação de torneio (a de Aprovações passa só
// as datas, sem cupom, já que ali o cupom já foi decidido lá atrás, na criação).
function textoPreviewValorDiarias(dataInicio, dataFim, cupomInfo){
  const dias = calcularDiasLocal(dataInicio, dataFim);
  if(!dias) return "";
  const subtotal = dias*valorDiariaCache;
  let html = `💰 ${dias} diária${dias>1?"s":""} × R$ ${valorDiariaCache.toFixed(2).replace(".", ",")} = R$ ${subtotal.toFixed(2).replace(".", ",")}`;
  if(cupomInfo && cupomInfo.valido){
    const desconto = subtotal*(cupomInfo.percentual/100);
    const total = subtotal-desconto;
    html += `<br>🎟️ Desconto do cupom (-${cupomInfo.percentual}%): -R$ ${desconto.toFixed(2).replace(".", ",")}`;
    html += `<br><b>Total: R$ ${total.toFixed(2).replace(".", ",")}</b>`;
  }
  return html;
}

let cupomInfoNovoTorneio = null; // {valido, percentual, motivo} da última checagem do cupom digitado
let cupomNovoTorneioTimer = null;

function atualizarPreviewValorDiarias(){
  const el = document.getElementById("preview-valor-diarias");
  const iEl = document.getElementById("input-novo-inicio");
  const fEl = document.getElementById("input-novo-fim");
  if(!el || !iEl || !fEl) return;
  el.innerHTML = textoPreviewValorDiarias(iEl.value, fEl.value, cupomInfoNovoTorneio);
}

// Checa o cupom digitado na criação do torneio (com debounce) e atualiza tanto a mensagem de
// aceito/recusado quanto o subtotal — sem precisar de um render() completo (não perde o foco/
// os outros campos já preenchidos).
function atualizarCupomNovoTorneio(){
  const inputCupom = document.getElementById("input-novo-cupom");
  const feedback = document.getElementById("feedback-cupom-novo-torneio");
  if(!inputCupom || !feedback) return;
  const nome = inputCupom.value.trim();
  clearTimeout(cupomNovoTorneioTimer);
  if(!nome){
    cupomInfoNovoTorneio = null;
    feedback.textContent = "";
    atualizarPreviewValorDiarias();
    return;
  }
  feedback.textContent = "Checando cupom...";
  feedback.style.color = "var(--muted)";
  cupomNovoTorneioTimer = setTimeout(async ()=>{
    const resultado = await validarCupomDigitado(nome);
    cupomInfoNovoTorneio = resultado;
    if(resultado.valido){
      feedback.textContent = `✅ Cupom aceito: ${resultado.percentual}% de desconto.`;
      feedback.style.color = "var(--grass)";
    } else {
      feedback.textContent = `⚠️ ${resultado.motivo || "Cupom inválido."}`;
      feedback.style.color = "var(--coral)";
    }
    atualizarPreviewValorDiarias();
  }, 500);
}

async function criarNovoTorneio(nome, dataInicio, dataFim, cupomNome){
  state = defaultState();
  state.tournamentId = Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-4);
  state.cloudNome = nome;
  state.aprovacaoStatus = "pendente";
  state.dataInicio = dataInicio;
  state.dataFim = dataFim;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  showLoading("Enviando solicitação...");
  try{
    const res = await apiFetch("/api/torneios-save", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ id:null, nome, status:"Criado", ownerEmail:auth.email, ownerName:auth.name, dataInicio, dataFim, cupomNome: cupomNome||null, state })
    });
    if(!res.ok) throw new Error("resposta não-ok");
    const data = await res.json();
    if(data.id){
      state.cloudId = data.id;
      state.codigo = data.codigo || null;
      state.cupomAplicado = data.cupomAplicado || null;
      state.ownerEmail = data.ownerEmail || auth.email || null;
      state.usuariosPermitidos = data.usuariosPermitidos || [];
      // O Pix já vem gerado automaticamente (ou o campeonato já sai isento, se o cupom zerar o
      // valor) — não precisa esperar a aprovação do admin pra mostrar a tela de pagamento. Se o
      // cupom já liberou como isento, o servidor também já aprova sozinho (data.aprovacaoStatus).
      state.pagamento = data.pagamento || null;
      state.aprovacaoStatus = data.aprovacaoStatus || state.aprovacaoStatus;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    if(state.pagamento?.status==="isento"){
      showToast("Torneio criado e liberado sem custo! Já está disponível para uso.");
    } else if(state.pagamento?.status==="pendente" && state.pagamento?.copiaCola){
      showToast("Torneio criado! Pix gerado — finalize o pagamento para liberar o uso.");
    } else {
      showToast("Torneio criado! Não foi possível gerar o Pix automaticamente — abra o campeonato para gerar o código.");
    }
  }catch(e){
    const meta = saveTorneioLocalFallback({ id:null, nome, status:"Criado", ownerEmail:auth.email, ownerName:auth.name, dataInicio, dataFim, state });
    state.cloudId = meta.id;
    state.codigo = meta.codigo || null;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    showToast("Sem conexão com a nuvem — torneio salvo só neste navegador.");
  }finally{
    hideLoading();
  }
  mostrarFormNovoTorneio = false;
  torneiosList = null;
  render();
}

async function verificarPagamentoPix(silencioso){
  if(!state.cloudId) return;
  if(!silencioso) showLoading("Verificando pagamento direto com o Mercado Pago...");
  try{
    const res = await apiFetch("/api/pix-verificar", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ id: state.cloudId, email: auth.email })
    });
    const data = await res.json();
    if(!res.ok){ if(!silencioso) showToast(data.error || "Não foi possível verificar o pagamento."); return; }
    const jaEstavaPago = state.pagamento?.status==="pago";
    state.pagamento = data.pagamento;
    // Pagamento confirmado libera o campeonato na hora — não depende mais de uma aprovação
    // manual separada do admin (o servidor já aprova sozinho junto com o pagamento).
    state.aprovacaoStatus = data.aprovacaoStatus || state.aprovacaoStatus;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    if(state.pagamento?.status==="pago"){
      if(!jaEstavaPago) showToast("Pagamento confirmado! 🎉");
    } else if(!silencioso){
      const statusMP = data.statusMercadoPago;
      const rotulos = { pending:"ainda pendente no Mercado Pago", in_process:"em análise pelo Mercado Pago", rejected:"recusado pelo Mercado Pago", cancelled:"cancelado" };
      showToast(statusMP && rotulos[statusMP] ? `Pagamento ${rotulos[statusMP]}.` : "Ainda não identificamos o pagamento.");
    }
    render();
  }catch(e){
    if(!silencioso) showToast("Sem conexão com o servidor — não foi possível verificar o pagamento.");
  }finally{
    if(!silencioso) hideLoading();
  }
}

// Chamado só nos momentos reais de "abrir" o torneio (clique na lista, ou reload de página
// direto nele) — nunca pelas atualizações automáticas de 5s, pra não ficar martelando a API
// do Mercado Pago sem necessidade. As atualizações de 5s (refreshTorneioAtual) continuam só
// lendo o banco, sem custo de chamada externa — é assim que o status "pago" fica salvo e
// reaproveitado depois, sem precisar reconsultar o Mercado Pago toda hora.
function verificarPixAoAbrir(){
  if(state.pagamento?.status==="pendente") verificarPagamentoPix(true);
}

async function decidirAprovacaoTorneio(id, decisao, dataInicio, dataFim, valor){
  const rotulo = decisao==="aprovado" ? "Aprovando" : (decisao==="recusado" ? "Recusando" : "Bloqueando");
  showLoading(rotulo + "...");
  try{
    const res = await apiFetch("/api/torneios-aprovar", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ id, adminEmail: auth.email, decisao, dataInicio, dataFim, valor })
    });
    if(res.status===403){ showToast("Só o admin pode fazer isso."); return; }
    if(!res.ok) throw new Error("resposta não-ok");
    const data = await res.json();
    const pixGeradoAuto = decisao==="aprovado" && valor>0 && data?.pagamento?.status==="pendente" && !!data.pagamento.copiaCola;
    const msgFinal = decisao!=="aprovado" ? (decisao==="recusado" ? "Torneio recusado. E-mail enviado ao organizador." : "Torneio bloqueado. E-mail enviado ao organizador.")
      : (valor===0 ? "Torneio aprovado e liberado de graça! E-mail enviado ao organizador."
        : pixGeradoAuto ? "Torneio aprovado! Pix gerado automaticamente e enviado por e-mail ao organizador."
        : "Torneio aprovado! E-mail enviado ao organizador.");
    showToast(msgFinal);
    torneiosList = null;
    if(state.cloudId===id){
      state.aprovacaoStatus = decisao;
      state.dataInicio = dataInicio || state.dataInicio;
      state.dataFim = dataFim || state.dataFim;
      // A resposta já traz o pagamento atualizado (isento, Pix gerado automaticamente na
      // aprovação, ou recuperado por referência) — usa direto em vez de reconstruir na mão.
      if(data && data.pagamento !== undefined){
        state.pagamento = data.pagamento;
      } else if(typeof valor === "number" && valor>=0){
        if(valor===0){
          state.pagamento = { status:"isento", valor:0, dias: calcularDiasLocal(state.dataInicio, state.dataFim), paymentId:null, copiaCola:null, qrCodeBase64:null, criadoEm:new Date().toISOString(), pagoEm:new Date().toISOString() };
        } else if(state.pagamento?.status==="isento"){
          state.pagamento = null; // deixou de ser grátis — precisa gerar o Pix de novo
        }
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    render();
  }catch(e){
    showToast("Sem conexão com o servidor — não foi possível salvar a decisão.");
  }finally{
    hideLoading();
  }
}

async function abrirTorneio(id){
  showLoading("Carregando torneio...");
  try{
    const res = await apiFetch(`/api/torneios-get?id=${encodeURIComponent(id)}&email=${encodeURIComponent(auth.email)}`, { cache: "no-store" });
    if(res.status===403){ showToast("Esse torneio pertence a outra conta."); return; }
    if(!res.ok) throw new Error("resposta não-ok");
    const data = await res.json();
    if(!data || !data.state) throw new Error("sem dados");
    abrirTorneioComDados(data);
  }catch(e){
    const db = getLocalTorneiosDB();
    const local = db[id];
    const meuEmail = (auth.email||"").trim().toLowerCase();
    if(local && local.state && (ehAdmin() || (local.ownerEmail||"").trim().toLowerCase()===meuEmail)){
      abrirTorneioComDados(local);
    } else {
      showToast("Não foi possível carregar esse torneio.");
    }
  }finally{
    hideLoading();
  }
}

function abrirTorneioComDados(data){
  state = migrarBracketAntigo(Object.assign(defaultState(), data.state));
  state.cloudId = data.id;
  state.cloudNome = data.nome;
  state.codigo = data.codigo || null;
  state.aprovacaoStatus = data.aprovacaoStatus || "pendente";
  state.dataInicio = data.dataInicio || null;
  state.dataFim = data.dataFim || null;
  state.pagamento = data.pagamento || null;
  state.valorOverride = (typeof data.valorOverride === "number") ? data.valorOverride : null;
  state.cupomAplicado = data.cupomAplicado || null;
  state.ownerEmail = data.ownerEmail || null;
  state.usuariosPermitidos = data.usuariosPermitidos || [];
  state.tab = "resumo";
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  telegramStatus = {};
  render();
  verificarPixAoAbrir();
  if(state.drawn) refreshTelegramStatus();
  checkElimNotifications();
  if(ehAdmin() || torneioEstaAtivo().ok) showToast(`"${data.nome}" carregado!`);
}

// Data de "hoje" no fuso horário local do aparelho — não usar toISOString() aqui, porque ela
// converte pra UTC e, no fuso do Brasil (UTC-3), isso corta a validade ~3h mais cedo que o
// esperado perto da meia-noite (ex: às 21h já mostraria o dia seguinte).
function hojeLocalISO(){
  const d = new Date();
  const ano = d.getFullYear();
  const mes = String(d.getMonth()+1).padStart(2,"0");
  const dia = String(d.getDate()).padStart(2,"0");
  return `${ano}-${mes}-${dia}`;
}

// Um torneio só fica liberado pra uso (fora do modo admin) depois de PAGO, aprovado e dentro
// do período de validade definido — antes ou depois disso, o app mostra uma tela de status em
// vez das abas normais. O pagamento não depende mais da aprovação (o Pix já é gerado sozinho na
// criação, com as datas e o cupom que o organizador escolheu no formulário) — por isso a
// checagem de pagamento vem antes da de aprovação, pra mostrar a tela de Pix assim que o
// campeonato é criado, mesmo ainda "pendente". Recusado/bloqueado sempre tem prioridade. O
// período vale o dia inteiro, de 00:00:00 do início até 23:59:59 do fim (comparação por data,
// no fuso local, não por hora exata).
function torneioEstaAtivo(){
  if(state.aprovacaoStatus==="recusado" || state.aprovacaoStatus==="bloqueado") return {ok:false, motivo:"aprovacao"};
  if(state.pagamento?.status!=="pago" && state.pagamento?.status!=="isento") return {ok:false, motivo:"pagamento"};
  if(state.aprovacaoStatus!=="aprovado") return {ok:false, motivo:"aprovacao"};
  const hoje = hojeLocalISO();
  if(state.dataInicio && hoje < state.dataInicio) return {ok:false, motivo:"antes"};
  if(state.dataFim && hoje > state.dataFim) return {ok:false, motivo:"depois"};
  return {ok:true, motivo:null};
}

// Campeonato expirado (passou da dataFim, mas já foi aprovado/pago normalmente): não fica mais
// bloqueado como "aprovacao"/"pagamento"/"antes" ficam — continua totalmente visível, só que
// somente leitura (ninguém além do admin do app pode mais alterar nenhum dado dele).
function campeonatoExpirado(){
  return torneioEstaAtivo().motivo==="depois";
}
function somenteLeitura(){
  return !ehAdmin() && campeonatoExpirado();
}

// Torneio já aprovado/pago, só esperando a data de início chegar: libera a aba Duplas
// (cadastro de duplas, link de inscrição, sortear e reiniciar torneio moram todas nela), a aba
// Resumo (só informativa, sem nenhuma ação que grave dado) e a aba Configurações (é lá que o
// organizador define o valor da inscrição, precisa poder ajustar antes do início pra já
// divulgar o link com o valor certo) antes da hora, pra dar tempo de organizar tudo com
// antecedência — as outras abas (Jogos, Tabela, Mata-mata etc.) só liberam no dia. Não se aplica
// a recusado/bloqueado/pagamento pendente: aí o torneio inteiro continua bloqueado como antes,
// já que nem chegou a ser validado.
const ABAS_LIBERADAS_ANTES_DO_INICIO = ["resumo", "sorteio", "configuracoes"];
function torneioPreLiberado(){
  return !ehAdmin() && torneioEstaAtivo().motivo==="antes";
}
// Usada tanto pra desenhar a nav (esmaecer as abas ainda bloqueadas) quanto pro clique nelas.
function abaBloqueadaAntesDoInicio(tab){
  return !ABAS_LIBERADAS_ANTES_DO_INICIO.includes(tab) && torneioPreLiberado();
}

// Busca a versão mais recente do torneio já aberto (usado ao carregar/recarregar a página,
// já que um F5 sozinho não ia até a nuvem — só reaproveitava o que já estava salvo neste navegador).
let liveRefreshInterval = null;
// Mantém qualquer dispositivo com o app aberto (não só quem está apitando) atualizado com
// o que foi salvo por outros — sem interromper quem estiver digitando/apitando neste aparelho.
function iniciarLiveRefresh(){
  if(liveRefreshInterval) return;
  liveRefreshInterval = setInterval(()=>{
    if(!auth || !state.cloudId) return;
    if(state.tab==="apito") return; // quem está apitando neste aparelho é a fonte da verdade local
    const ativo = document.activeElement;
    if(ativo && (ativo.tagName==="INPUT" || ativo.tagName==="TEXTAREA")) return; // não interrompe edição em andamento
    if(enviosPendentes>0) return; // ainda tem salvamento nosso em voo — não busca por cima
    if(Date.now()-ultimoSaveLocalEm < 4000) return; // acabamos de salvar algo aqui — dá tempo de propagar antes de confiar no que vier de volta
    refreshTorneioAtual();
  }, 5000);
}

// Verificação de pagamento Pix em background: enquanto o torneio aberto tiver um Pix pendente,
// reconsulta o Mercado Pago de tempos em tempos (modo silencioso) — assim quem pagou não precisa
// voltar no app e clicar em "Já paguei, verificar" pra destravar o campeonato.
let pixVerifyInterval = null;
function iniciarVerificacaoPixBackground(){
  if(pixVerifyInterval) return;
  pixVerifyInterval = setInterval(()=>{
    if(!auth || !state.cloudId) return;
    if(state.pagamento?.status!=="pendente") return;
    verificarPagamentoPix(true);
  }, 20000);
}

async function refreshTorneioAtual(chamadaInicial){
  if(!auth || !state.cloudId) return;
  if(haSyncPendente()){
    // Uma alteração local daqui (ex: "Reiniciar torneio") ainda não foi confirmada como salva no
    // servidor — puxar de lá agora traria de volta um estado mais velho que o daqui (o placar de
    // um jogo antigo reaparecendo, por exemplo). Isso vale tanto pro polling periódico quanto
    // pra esta chamada inicial no boot: a marca é persistida (ver marcarSyncPendente em save()),
    // então sobrevive a um reload/reabrir o app antes da rede voltar. Tenta reenviar em vez de
    // buscar; a próxima chamada (poll seguinte ou próximo reload) volta a buscar normalmente
    // assim que a confirmação do servidor chegar.
    flushSyncTorneio();
    return;
  }
  try{
    const res = await apiFetch(`/api/torneios-get?id=${encodeURIComponent(state.cloudId)}&email=${encodeURIComponent(auth.email)}`, { cache:"no-store" });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if(data && data.state){
      const tabAtual = state.tab;
      state = migrarBracketAntigo(Object.assign(defaultState(), data.state));
      state.cloudId = data.id;
      state.cloudNome = data.nome;
      state.codigo = data.codigo || null;
      state.aprovacaoStatus = data.aprovacaoStatus || "pendente";
      state.dataInicio = data.dataInicio || null;
      state.dataFim = data.dataFim || null;
      state.pagamento = data.pagamento || null;
      state.valorOverride = (typeof data.valorOverride === "number") ? data.valorOverride : null;
      state.cupomAplicado = data.cupomAplicado || null;
      state.ownerEmail = data.ownerEmail || null;
      state.usuariosPermitidos = data.usuariosPermitidos || [];
      state.tab = tabAtual;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      telegramStatus = {};
      render();
      if(chamadaInicial) verificarPixAoAbrir();
      if(state.drawn) refreshTelegramStatus();
      checkElimNotifications();
    }
  }catch(e){
    console.error("refreshTorneioAtual falhou:", e && e.message ? e.message : e); // mantém os dados locais que já tinha
  }
}

async function excluirTorneio(id, nome){
  if(!confirm(`Excluir o torneio "${nome}"? Essa ação não pode ser desfeita.`)) return;
  showToast("Excluindo torneio...");
  try{
    const res = await apiFetch("/api/torneios-delete", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ id, ownerEmail: auth.email })
    });
    if(res.status===403){ showToast("Esse torneio pertence a outra conta."); return; }
    if(!res.ok) throw new Error("resposta não-ok");
  }catch(e){
    // sem servidor de functions disponível — remove também da reserva local
  }
  const db = getLocalTorneiosDB();
  const meuEmail = (auth.email||"").trim().toLowerCase();
  if(db[id] && (ehAdmin() || (db[id].ownerEmail||"").trim().toLowerCase()===meuEmail)){ delete db[id]; setLocalTorneiosDB(db); }

  if(state.cloudId === id){
    state.cloudId = null;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
  torneiosList = null;
  showToast("Torneio excluído.");
  render();
}

  if(!novoEmail || !novoEmail.includes("@")){ showToast("Informe um e-mail válido."); return; }
  showLoading("Adicionando usuário...");
  try{
    const res = await apiFetch("/api/torneios-usuario-adicionar", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ id: state.cloudId, email: auth.email, nome: auth.name, novoEmail })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || "Falha ao adicionar usuário");
    state.usuariosPermitidos = data.usuariosPermitidos || [];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    showToast("Usuário adicionado.");
    render();
  }catch(e){
    showToast(e.message || "Falha ao adicionar usuário.");
