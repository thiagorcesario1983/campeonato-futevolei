function voltarParaTorneios(){
  limparTorneioLocal();
  torneiosList = null;
  render();
}

async function migrarTorneioLocal(){
  const nome = (prompt("Nome para este torneio:", "Meu torneio") || "").trim();
  if(!nome) return;
  state.cloudNome = nome;
  showToast("Enviando torneio para a nuvem...");
  const payload = { id:null, nome, status: statusTorneio(), ownerEmail:auth.email, ownerName:auth.name, state };
  try{
    const res = await apiFetch("/api/torneios-save", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error("resposta não-ok");
    const data = await res.json();
    if(data.id){
      state.cloudId = data.id;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      torneiosList = null;
      showToast("Torneio adicionado!");
      render();
    }
  }catch(e){
    const meta = saveTorneioLocalFallback(payload);
    state.cloudId = meta.id;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    torneiosList = null;
    showToast("Sem conexão com a nuvem — torneio salvo só neste navegador.");
    render();
  }
}

/* ============================================================
   LÓGICA DO TORNEIO
============================================================ */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// Redimensiona/comprime a imagem escolhida pra não inflar o estado do torneio (que é
// sincronizado com a nuvem). Devolve um data URL JPEG já pronto pra usar como fundo do cabeçalho.
function processarImagemTopo(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error("Falha ao ler o arquivo"));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error("Arquivo não é uma imagem válida"));
      img.onload = ()=>{
        const maxW = 960;
        const scale = Math.min(1, maxW/img.width);
        const w = Math.round(img.width*scale);
        const h = Math.round(img.height*scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.78));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function groupLetters(n){
  const L = [];
  for(let i=0;i<n;i++) L.push(String.fromCharCode(65+i));
  return L;
}
function groupLettersState(){
  return groupLetters(state.numGrupos || 4);
}
// Quantidade de duplas que se qualificam pro mata-mata (1º e 2º de cada grupo)
function qualificadosCount(){
  return (state.numGrupos || 4) * 2;
}
// Só duplas com status "ativa" (cadastradas manualmente, ou com o Pix da inscrição
// confirmado/aprovadas pelo organizador) entram no sorteio — "pendente" (aguardando
// pagamento/aprovação) e "bloqueada" ficam de fora até o organizador resolver, pra não
// sortear grupo com gente que pode nem confirmar a inscrição.
function duplasAtivas(){
  return state.duplas.filter(d => (d.status||"ativa")==="ativa");
}
function sortear(){
  state.grupoDesempateEscolha = null;
  state.mataMataConfirmado = false;
  if(state.formato==="eliminacao"){
    state.groups = [];
    state.groupMatches = [];
    state.elimRodadas = [];
    state.bracketSeed = null;
    state.bracket = [];
    state.terceiro = {pa:null, pb:null, finalizado:false, wo:null};
    state.drawn = true;
    sortearRodadaEliminacao();
    save();
    return;
  }
  const ativas = duplasAtivas();
  const numGrupos = state.numGrupos || 4;
  const letters = groupLetters(numGrupos);
  const nomeDe = d => (d.nome||"").trim() || "Dupla sem nome";
  const nomesCabecas = shuffle(ativas.filter(d=>d.cabecaDeChave).map(nomeDe));
  const groups = Array.from({length:numGrupos}, ()=>[]);
  if(nomesCabecas.length===numGrupos){
    // 1 cabeça de chave por grupo (garantido por configuracaoValida — só sorteia com essa
    // função se a quantidade bater certinho com o nº de grupos), sorteada aleatoriamente entre
    // eles. As demais duplas são distribuídas em partes iguais, também aleatoriamente.
    nomesCabecas.forEach((nome,i)=> groups[i].push(nome));
    const nomesResto = shuffle(ativas.filter(d=>!d.cabecaDeChave).map(nomeDe));
    const tamanhoResto = nomesResto.length / numGrupos;
    for(let g=0; g<numGrupos; g++){
      groups[g].push(...nomesResto.slice(g*tamanhoResto, (g+1)*tamanhoResto));
    }
  } else {
    // Nenhuma cabeça de chave marcada — sorteio 100% aleatório, como sempre foi.
    const nomes = ativas.map(nomeDe);
    const tamanhoGrupo = nomes.length / numGrupos;
    const embaralhado = shuffle(nomes);
    for(let g=0; g<numGrupos; g++){
      groups[g].push(...embaralhado.slice(g*tamanhoGrupo, (g+1)*tamanhoGrupo));
    }
  }
  const groupMatchesPorGrupo = groups.map((g, gi)=>{
    const jogos = [];
    let jogoNum = 1;
    for(let x=0; x<g.length; x++){
      for(let y=x+1; y<g.length; y++){
        jogos.push({group:letters[gi], jogo:jogoNum++, a:g[x], b:g[y], pa:null, pb:null, finalizado:false, wo:null});
      }
    }
    return jogos;
  });
  // Intercala: 1º jogo de cada grupo, depois o 2º de cada grupo, e assim por diante — em vez
  // de jogar todos os confrontos de um grupo pra só depois passar pro próximo.
  const maxJogosPorGrupo = Math.max(0, ...groupMatchesPorGrupo.map(j=>j.length));
  const groupMatches = [];
  for(let rodada=0; rodada<maxJogosPorGrupo; rodada++){
    groupMatchesPorGrupo.forEach(jogos=>{
      if(jogos[rodada]) groupMatches.push(jogos[rodada]);
    });
  }
  state.groups = groups;
  state.groupMatches = groupMatches;
  state.drawn = true;
  state.bracket = criarBracketVazio(qualificadosCount());
  state.terceiro = {pa:null, pb:null, finalizado:false, wo:null};
  save();
}
// Configuração de duplas/grupos (formato "grupos") é válida quando: nº de grupos é potência de 2
// (1,2,4,8,16...) — assim 2x essa quantidade de qualificados também é potência de 2, o que permite
// montar um chaveamento normal (mata-mata) — e a qtde de duplas é múltipla do nº de grupos, com
// pelo menos 3 duplas por grupo (para a fase de grupos fazer sentido).
// Já no formato "eliminacao", só validamos a quantidade de duplas que avançam pro mata-mata.
function configuracaoValida(){
  const n = duplasAtivas().length;
  // Se tiver dupla pendente/bloqueada, todas as mensagens abaixo precisam deixar claro que a
  // conta é só das ativas — senão o organizador não entende por que "8 duplas cadastradas"
  // não libera o sorteio pra 4 grupos.
  const sufixoPendentes = n < state.duplas.length
    ? ` (${n} ativa${n!==1?"s":""} de ${state.duplas.length} cadastrada${state.duplas.length!==1?"s":""} — as demais estão pendentes ou bloqueadas)`
    : "";
  if(state.formato==="eliminacao"){
    const t = state.elimTarget || 4;
    if(n < 3) return {ok:false, msg:`São necessárias pelo menos 3 duplas ativas.${sufixoPendentes}`};
    if(t<2 || (t & (t-1))!==0) return {ok:false, msg:"A quantidade de duplas que avançam pro mata-mata precisa ser uma potência de 2 (2, 4, 8...)."};
    if(t >= n) return {ok:false, msg:`Escolha um número de qualificados menor que o total de duplas ativas (${n}).${sufixoPendentes}`};
    return {ok:true, msg:""};
  }
  const g = state.numGrupos || 4;
  if(g<1 || (g & (g-1))!==0) return {ok:false, msg:"A quantidade de grupos precisa ser uma potência de 2 (1, 2, 4, 8...)."};
  if(n % g !== 0) return {ok:false, msg:`${n} duplas ativas não dividem igualmente em ${g} grupos.${sufixoPendentes} Ajuste a quantidade de duplas ou de grupos.`};
  const tamanho = n/g;
  if(tamanho < 3) return {ok:false, msg:`Cada grupo ficaria com só ${tamanho} dupla(s) ativa(s). São necessárias pelo menos 3 duplas por grupo.${sufixoPendentes}`};
  // Cabeça de chave é opcional (0 marcada = sorteio 100% aleatório, como sempre foi) — mas se
  // usar, precisa ser uma exatamente por grupo, senão não dá pra garantir 1 em cada um sem
  // deixar sobrando ou faltando cabeça pra algum grupo.
  const numCabecas = duplasAtivas().filter(d=>d.cabecaDeChave).length;
  if(numCabecas > 0 && numCabecas !== g){
    return {ok:false, msg:`${numCabecas} dupla(s) marcada(s) como cabeça de chave, mas são ${g} grupos — marque exatamente ${g} (uma por grupo), ou nenhuma, pra sorteio totalmente aleatório.`};
  }
  return {ok:true, msg:""};
}

/* ---------- Modo Eliminação: sorteio por rodadas, 2 derrotas = eliminada ---------- */
function duplasNomes(){
  return duplasAtivas().map(d => (d.nome||"").trim() || "Dupla sem nome");
}
// Nº de derrotas de cada dupla, somando todas as rodadas já sorteadas (derivado, sempre recalculado —
// se um placar for corrigido depois, a contagem se ajusta sozinha).
function elimPerdasPorDupla(){
  const perdas = {};
  state.elimRodadas.forEach(r=>{
    r.matches.forEach(m=>{
      const w = winnerFinal(m.a, m.b, m);
      if(!w) return;
      const loser = w===m.a ? m.b : m.a;
      perdas[loser] = (perdas[loser]||0) + 1;
    });
  });
  return perdas;
}
function elimPerdasDe(nome){ return elimPerdasPorDupla()[nome] || 0; }
function elimEliminada(nome){ return elimPerdasDe(nome) >= 2; }
// Nº de vitórias de cada dupla, somando todas as rodadas já sorteadas (mesmo princípio de elimPerdasPorDupla).
function elimVitoriasPorDupla(){
  const vitorias = {};
  state.elimRodadas.forEach(r=>{
    r.matches.forEach(m=>{
      const w = winnerFinal(m.a, m.b, m);
      if(w) vitorias[w] = (vitorias[w]||0) + 1;
    });
  });
  return vitorias;
}
// Duplas ainda vivas (0 ou 1 derrota) — são elas que entram no sorteio da próxima rodada
// e, quando atingirem a meta de qualificados, avançam direto pro mata-mata.
function elimVivas(){
  return duplasNomes().filter(n => !elimEliminada(n));
}
// Vitórias/pontos pró/pontos contra de cada dupla, somando todas as partidas finalizadas da fase
// de eliminação — usado só pra ranquear repescagem (ver elimRepescagemInfo), não pra decidir vivas/eliminadas.
function elimEstatisticasPorDupla(){
  const stats = {};
  duplasNomes().forEach(n => { stats[n] = {vitorias:0, pp:0, pc:0}; });
  state.elimRodadas.forEach(r=>{
    r.matches.forEach(m=>{
      if(!partidaFinalizada(m)) return;
      const pa = Number(m.pa), pb = Number(m.pb);
      if(stats[m.a]){ stats[m.a].pp += pa; stats[m.a].pc += pb; }
      if(stats[m.b]){ stats[m.b].pp += pb; stats[m.b].pc += pa; }
      const w = winnerFinal(m.a, m.b, m);
      if(w && stats[w]) stats[w].vitorias++;
    });
  });
  return stats;
}
// Compara duas duplas eliminadas pra fins de repescagem: mais vitórias primeiro, depois melhor
// saldo de pontos, depois mais pontos pró. Retorna 0 quando empatam nos 3 critérios — nesse caso
// não dá pra decidir sozinho (ver elimRepescagemInfo).
function compararRepescagem(nomeA, nomeB, stats){
  const a = stats[nomeA] || {vitorias:0, pp:0, pc:0};
  const b = stats[nomeB] || {vitorias:0, pp:0, pc:0};
  const saldoA = a.pp - a.pc, saldoB = b.pp - b.pc;
  return (b.vitorias - a.vitorias) || (saldoB - saldoA) || (b.pp - a.pp);
}
// Quando a fase de eliminação fecha com menos duplas vivas que a meta de qualificados, calcula
// quem entre as eliminadas "sobe" pro mata-mata pra completar a vaga que faltou — pelos critérios
// de compararRepescagem. jaGarantidas = quem entra sem dúvida (melhor que a fronteira do empate);
// grupoEmpatado = quem disputa a(s) vaga(s) restante(s) empatado nos 3 critérios; vagas = quantas
// dessas o organizador precisa escolher (0 = sem ambiguidade, decide sozinho).
function elimRepescagemInfo(){
  const meta = state.elimTarget || 4;
  const necessario = meta - elimVivas().length;
  if(necessario <= 0) return {necessario:0, jaGarantidas:[], grupoEmpatado:[], vagas:0};

  const stats = elimEstatisticasPorDupla();
  const eliminadas = duplasNomes().filter(n => elimEliminada(n));
  eliminadas.sort((a,b)=> compararRepescagem(a,b,stats));

  if(eliminadas.length <= necessario){
    return {necessario, jaGarantidas: eliminadas.slice(), grupoEmpatado:[], vagas:0};
  }
  const fronteira = eliminadas[necessario-1];
  const jaGarantidas = eliminadas.filter(n => compararRepescagem(n, fronteira, stats) < 0);
  const grupoEmpatado = eliminadas.filter(n => compararRepescagem(n, fronteira, stats) === 0);
  return {necessario, jaGarantidas, grupoEmpatado, vagas: necessario - jaGarantidas.length};
}
// true quando existe empate real disputando a(s) última(s) vaga(s) de repescagem e o organizador
// ainda não escolheu (ou escolheu menos do que precisa) quem completa.
function elimRepescagemPrecisaEscolha(){
  const info = elimRepescagemInfo();
  if(info.grupoEmpatado.length <= info.vagas) return false;
  const escolha = (state.elimRepescagemEscolha||[]).filter(n => info.grupoEmpatado.includes(n));
  return escolha.length < info.vagas;
}
// Lista final de duplas eliminadas que vão ser resgatadas pro mata-mata (jaGarantidas + quem foi
// escolhido, automaticamente ou pelo organizador, pra preencher as vagas do empate).
function elimRepescadasFinal(){
  const info = elimRepescagemInfo();
  if(info.necessario <= 0) return [];
  if(info.grupoEmpatado.length <= info.vagas){
    return [...info.jaGarantidas, ...info.grupoEmpatado];
  }
  const escolha = (state.elimRepescagemEscolha||[]).filter(n => info.grupoEmpatado.includes(n));
  return [...info.jaGarantidas, ...escolha.slice(0, info.vagas)];
}
function elimRodadaAtual(){
  return state.elimRodadas[state.elimRodadas.length-1] || null;
}
function elimRodadaCompleta(rodada){
  if(!rodada) return true;
  return rodada.matches.every(m => partidaFinalizada(m));
}
// Chave não-ordenada de um confronto, pra comparar duas partidas ignorando quem é "a" e quem é "b".
function chavePar(a,b){ return [a,b].sort().join("__"); }
// Sorteia uma nova rodada entre as duplas vivas, priorizando confrontos entre quem tem menos
// vitórias (ordena por vitórias, com desempate aleatório, e casa vizinhos dessa ordem). Se o nº
// de vivas for ímpar, a folga vai para quem tem MAIS vitórias entre os vivos — quem está indo
// melhor descansa, em vez de arriscar à toa. Tenta várias vezes (mantendo sempre a melhor
// tentativa) até achar uma combinação que não repita nenhum confronto da rodada imediatamente
// anterior — evita a mesma dupla cair contra o mesmo adversário duas rodadas seguidas.
function sortearRodadaEliminacao(){
  const vitorias = elimVitoriasPorDupla();
  const perdas = elimPerdasPorDupla();
  const rodadaAnterior = elimRodadaAtual();
  const paresAnteriores = new Set((rodadaAnterior?.matches || []).map(m => chavePar(m.a, m.b)));

  let melhorMatches = null, melhorBye = null, melhorRepetidos = Infinity;
  for(let tentativa = 0; tentativa < 200 && melhorRepetidos > 0; tentativa++){
    const vivos = shuffle(elimVivas());
    vivos.sort((a,b)=> (vitorias[a]||0) - (vitorias[b]||0));
    let bye = null;
    if(vivos.length % 2 === 1){
      // Folga vai para quem tem mais vitórias entre os vivos; empatando em vitórias, para quem tem menos derrotas.
      let idxBye = 0;
      for(let i=1;i<vivos.length;i++){
        const cand = vivos[i], atual = vivos[idxBye];
        const vCand = vitorias[cand]||0, vAtual = vitorias[atual]||0;
        const pCand = perdas[cand]||0, pAtual = perdas[atual]||0;
        if(vCand > vAtual || (vCand===vAtual && pCand < pAtual)) idxBye = i;
      }
      bye = vivos.splice(idxBye,1)[0];
    }
    const matches = [];
    for(let i=0;i<vivos.length;i+=2){
      matches.push({a:vivos[i], b:vivos[i+1], pa:null, pb:null, finalizado:false, wo:null});
    }
    const repetidos = matches.filter(m => paresAnteriores.has(chavePar(m.a,m.b))).length;
    if(repetidos < melhorRepetidos){
      melhorMatches = matches; melhorBye = bye; melhorRepetidos = repetidos;
    }
  }
  state.elimRodadas.push({matches: melhorMatches, bye: melhorBye});
  save();
}
function ehPotenciaDeDois(n){
  return n>0 && (n & (n-1))===0;
}
// Libera o mata-mata assim que o nº de vivas cair pra meta configurada (elimTarget) ou menos.
// Como derrotas só fazem esse número diminuir (nunca aumentar), se uma rodada "passar direto"
// da meta (ex: de 5 vivas cair pra 3, pulando o 4), não existe rodada nenhuma que "acerte" o
// valor exato depois disso — então entra no mata-mata com quem sobrou, e iniciarMataMataEliminacao
// preenche a(s) vaga(s) que faltar(em) com folga.
function elimProntoParaMataMata(){
  const r = elimRodadaAtual();
  if(!r || !elimRodadaCompleta(r)) return false;
  return elimVivas().length <= (state.elimTarget || 4);
}
function proximaPotenciaDeDois(n){
  let p = 1;
  while(p < n) p *= 2;
  return Math.max(1,p);
}
// Fecha a fase de eliminação e monta a 1ª rodada do mata-mata com quem sobrou vivo. Se sobrou uma
// quantidade que não é potência de 2 (ex: 3, quando a meta era 4), o chaveamento nasce no próximo
// tamanho "fechado" acima disso e a(s) vaga(s) que faltar(em) vira(m) folga — ver
// primeiraRodadaTeams(), que já trata posições sem dupla (seed[i] undefined) como bye.
function iniciarMataMataEliminacao(){
  const vivas = shuffle([...elimVivas(), ...elimRepescadasFinal()]);
  state.bracketSeed = vivas;
  state.bracket = criarBracketVazio(proximaPotenciaDeDois(Math.max(2, vivas.length)));
  state.terceiro = {pa:null, pb:null, finalizado:false, wo:null};
  state.elimRepescagemEscolha = null;
  save();
}
function matamataPronto(){
  return state.formato==="eliminacao" ? !!(state.bracketSeed && state.bracketSeed.length) : allGroupsFilled();
}

// Reseta só os dados de jogo (duplas, sorteio, grupos/eliminação, mata-mata, arbitragem) e
// preserva os campos de identidade/nuvem — state = defaultState() sozinho zerava cloudId, e
// como syncTorneio() se recusa a sincronizar sem cloudId, o reset nem persistia na nuvem
// (voltava tudo assim que o app recarregasse os dados do servidor).
function resetTudo(){
  const preservar = {
    cloudId: state.cloudId,
    cloudNome: state.cloudNome,
    codigo: state.codigo,
    aprovacaoStatus: state.aprovacaoStatus,
    dataInicio: state.dataInicio,
    dataFim: state.dataFim,
    pagamento: state.pagamento,
    valorOverride: state.valorOverride,
    headerImage: state.headerImage,
    telegramBot: state.telegramBot,
    // "Reiniciar torneio" é pra apagar jogos/grupos/bracket, não a lista de duplas cadastradas
    // (nem o link de inscrição já compartilhado, nem o valor configurado) — sem isso, quem já
    // se inscreveu e pagou teria que se inscrever nas duplas de novo do zero.
    duplas: state.duplas,
    valorInscricao: state.valorInscricao,
    inscricaoLink: state.inscricaoLink
  };
  state = Object.assign(defaultState(), preservar);
  // Marca quando este reset aconteceu — o worker usa isso pra saber que qualquer arbitragem
  // salva no servidor antes desse instante é justamente o que acabamos de zerar de propósito,
  // não um progresso de outro dispositivo que este cliente ainda não viu (ver torneiosSave).
  state.resetadoEm = Date.now();
  save();
}

function standingsFor(letter){
  const idx = groupLettersState().indexOf(letter);
  const nomes = state.groups[idx] || [];
  const rows = nomes.map(nome => ({nome, j:0, v:0, d:0, pp:0, pc:0}));
  state.groupMatches.filter(m=>m.group===letter).forEach(m=>{
    if(!partidaFinalizada(m)) return;
    const pa = Number(m.pa), pb = Number(m.pb);
    const ra = rows.find(r=>r.nome===m.a);
    const rb = rows.find(r=>r.nome===m.b);
    ra.j++; rb.j++;
    ra.pp += pa; ra.pc += pb;
    rb.pp += pb; rb.pc += pa;
    if(pa>pb){ra.v++; rb.d++;} else if(pb>pa){rb.v++; ra.d++;}
  });
  rows.forEach(r=>{ r.saldo = r.pp - r.pc; r.pts = r.v*3; });
  rows.sort((a,b)=> b.pts-a.pts || b.saldo-a.saldo || b.pp-a.pp);
  return rows;
}

function allGroupsFilled(){
  return state.drawn && state.groupMatches.length>0 &&
    state.groupMatches.every(m=> partidaFinalizada(m));
}

/* ---------- Decisão de desempate técnico (formato "grupos") ---------- */
// Mesmos 3 critérios de standingsFor (pontos, saldo, pontos pró), comparados isoladamente pra
// achar exatamente quem empatou de verdade na fronteira da última vaga de classificação.
function compararClassificacao(r1, r2){
  return (r2.pts-r1.pts) || (r2.saldo-r1.saldo) || (r2.pp-r1.pp);
}
// Mesmo raciocínio do elimRepescagemInfo, mas aplicado à classificação de um grupo (1º e 2º
// avançam pro mata-mata). jaGarantidas = quem classifica sem dúvida (melhor que a fronteira);
// grupoEmpatado = quem disputa a(s) vaga(s) empatado com a fronteira nos 3 critérios; vagas =
// quantas dessas o organizador precisa escolher (0 = sem ambiguidade real, grupo com 2 ou menos
// duplas nunca tem decisão pra fazer, já que ninguém fica de fora).
function gruposDesempateInfoPorLetra(letter){
  const rows = standingsFor(letter);
  const vagasTotais = 2;
  if(rows.length <= vagasTotais){
    return {letter, jaGarantidas: rows.map(r=>r.nome), grupoEmpatado:[], vagas:0};
  }
  const fronteira = rows[vagasTotais-1];
  const jaGarantidas = rows.filter(r => compararClassificacao(r, fronteira) < 0).map(r=>r.nome);
  const grupoEmpatado = rows.filter(r => compararClassificacao(r, fronteira) === 0).map(r=>r.nome);
  return {letter, jaGarantidas, grupoEmpatado, vagas: vagasTotais - jaGarantidas.length};
}
// Lista só os grupos que têm empate real disputando a última vaga (grupoEmpatado maior que as
// vagas restantes) — só faz sentido no formato "grupos"; a "eliminacao" já resolve empate de
// repescagem em outro lugar (ver elimRepescagemInfo), antes mesmo de chegar no mata-mata.
function gruposDesempateInfo(){
  if(state.formato!=="grupos" || !allGroupsFilled()) return [];
  return groupLettersState()
    .map(l => gruposDesempateInfoPorLetra(l))
    .filter(info => info.grupoEmpatado.length > info.vagas);
}
// true quando existe pelo menos um grupo com empate real ainda sem escolha suficiente do organizador.
function gruposDesempatePrecisaEscolha(){
  const infos = gruposDesempateInfo();
  if(!infos.length) return false;
  const escolha = state.grupoDesempateEscolha || [];
  return infos.some(info => escolha.filter(n=>info.grupoEmpatado.includes(n)).length < info.vagas);
}
// 1º e 2º colocados finais de um grupo, já considerando a escolha do organizador quando havia
// empate real na última vaga. Sempre retorna 2 nomes (best-effort: usa a ordem padrão de
// standingsFor enquanto a escolha ainda estiver incompleta) — quem trava a exibição/uso real do
// mata-mata é o gate em mataMataLiberadoParaJogar(), não esta função.
function gruposClassificadosFinal(letter){
  const rows = standingsFor(letter);
  const info = gruposDesempateInfoPorLetra(letter);
  if(info.grupoEmpatado.length <= info.vagas){
    return rows.slice(0,2).map(r=>r.nome);
  }
  const escolha = (state.grupoDesempateEscolha||[]).filter(n=>info.grupoEmpatado.includes(n));
  const escolhidos = escolha.slice(0, info.vagas);
  // Enquanto a escolha ainda estiver incompleta, completa o que falta com a ordem padrão dos
  // próprios empatados (melhor esforço) — sem isso, essa função podia devolver só 1 nome (ou
  // nenhum) pra um grupo com 2 vagas, e quem lê o array (ex: primeiraRodadaTeams) tratava a
  // posição vazia como bye, mostrando "avança direto (folga)" sem ter folga nenhuma de verdade.
  const faltam = info.vagas - escolhidos.length;
  const completar = faltam > 0 ? info.grupoEmpatado.filter(n=>!escolhidos.includes(n)).slice(0, faltam) : [];
  const classificados = new Set([...info.jaGarantidas, ...escolhidos, ...completar]);
  return rows.filter(r=>classificados.has(r.nome)).map(r=>r.nome);
}
// Trava central: enquanto houver empate técnico pendente de decisão (ou decidido mas ainda não
// confirmado pelo botão "Gerar jogos"), nenhum consumidor do mata-mata (placar múltiplo,
// notificações automáticas de WhatsApp/Telegram, imagem de Stories, "próximos jogos" do Resumo)
// deve tratar os confrontos da 1ª rodada como reais — evitam mostrar/enviar um confronto que
// ainda pode mudar. Só se aplica ao formato "grupos"; "eliminacao" nunca precisa dessa trava
// (repescagem já resolve tudo antes de liberar o mata-mata).
function mataMataLiberadoParaJogar(){
  if(state.formato!=="grupos") return true;
  if(!gruposDesempateInfo().length) return true;
  if(state.mataMataConfirmado) return true;
  // Torneio de antes desta funcionalidade existir, com mata-mata já em andamento: nunca esconde
  // retroativamente um jogo que já começou só porque o empate técnico virou detectável agora.
  return mataMataIniciado();
}
// true quando algum jogo da 1ª rodada do mata-mata já foi iniciado (placar digitado, apitado ou
// finalizado) — a partir daí a escolha do empate não pode mais ser alterada (ver ressalva no
// card de decisão), pra não invalidar um jogo que já começou.
function mataMataIniciado(){
  const primeiraRodada = state.bracket && state.bracket[0];
  if(!primeiraRodada) return false;
  return primeiraRodada.some((m,i)=>{
    if(m.finalizado || (m.pa!==null && m.pa!=="") || (m.pb!==null && m.pb!=="")) return true;
    const arb = state.arbitragem?.[makeMatchId(0,i)];
    return !!arb && arb.status!=="nao_iniciada";
  });
}
// Limpa a arbitragem específica dos jogos do mata-mata/3º lugar — usado quando a escolha do
// empate muda depois dos jogos já terem sido "gerados", já que o chaveamento inteiro é refeito.
function limparArbitragemMataMata(){
  if(!state.arbitragem) return;
  Object.keys(state.arbitragem).forEach(k=>{
    if(k==="terceiro" || /^b\d+_\d+$/.test(k)) delete state.arbitragem[k];
  });
}

function winner(a,b,pa,pb){
  if(a==null && b==null) return null;
  if(a==null) return b; // folga (bye): b avança automaticamente, sem precisar jogar
  if(b==null) return a;
  if(pa===null||pb===null||pa===""||pb==="") return null;
  const na=Number(pa), nb=Number(pb);
  if(na>nb) return a; if(nb>na) return b; return null;
}
// Uma partida só "vale" pra classificação/chaveamento quando estiver marcada como finalizada —
// enquanto isso não acontece, o placar pode estar sendo atualizado em tempo real (pelo Apitar
// jogo), mas nenhuma decisão de sorteio/eliminação/avanço é recalculada com base nele.
function partidaFinalizada(m){
  return !!m && m.finalizado===true && m.pa!==null && m.pa!=="" && m.pb!==null && m.pb!=="";
}
// Mesma ideia do winner(), mas só resolve de verdade quando a partida está finalizada
// (folgas/byes continuam resolvendo na hora, MAS só quando permitirBye=true — ver abaixo).
function winnerFinal(a,b,m,permitirBye){
  if(a==null || b==null){
    // "Adversário nulo" só é uma folga de verdade na primeira rodada do mata-mata (quando um
    // lado do chaveamento já nasce vazio). Em qualquer rodada seguinte (semifinal → final, por
    // exemplo), um lado nulo significa só "o outro confronto ainda não terminou" — nunca deve
    // ser tratado como vitória automática, senão a equipe que termina primeiro "ganha folga" e
    // seria declarada campeã antes até da final ser jogada.
    return permitirBye ? winner(a,b, m?.pa, m?.pb) : null;
  }
  if(!partidaFinalizada(m)) return null;
  return winner(a,b,m.pa,m.pb);
}

/* ---------- Chaveamento (mata-mata) genérico, com N rodadas dinâmicas ---------- */
function criarBracketVazio(qualificados){
  const rounds = Math.max(1, Math.round(Math.log2(qualificados)));
  const bracket = [];
  for(let r=0; r<rounds; r++){
    const nMatches = qualificados / Math.pow(2, r+1);
    bracket.push(Array.from({length:nMatches}, ()=>({pa:null, pb:null, finalizado:false, wo:null})));
  }
  return bracket;
}
function totalRoundsBracket(){
  return state.bracket.length;
}
// Times da rodada 0 (primeira rodada do mata-mata), a partir da classificação dos grupos,
// cruzando grupos dois a dois (1ºA×2ºB, 1ºB×2ºA, 1ºC×2ºD, 1ºD×2ºC, ...).
function primeiraRodadaTeams(){
  if(state.formato==="eliminacao"){
    const seed = state.bracketSeed || [];
    const teams = [];
    for(let i=0;i<seed.length;i+=2) teams.push([seed[i]??null, seed[i+1]??null]);
    return teams;
  }
  const letters = groupLettersState();
  const nMatches = state.bracket[0] ? state.bracket[0].length : 0;
  if(!allGroupsFilled()) return Array.from({length:nMatches}, ()=>[null,null]);
  // gruposClassificadosFinal já resolve empate técnico decidido pelo organizador (ou usa a ordem
  // padrão como melhor esforço enquanto a decisão ainda estiver pendente — quem trava a exibição
  // real desses confrontos é mataMataLiberadoParaJogar(), não esta função).
  const standings = letters.map(l=>gruposClassificadosFinal(l));
  if(letters.length===1){
    // Um único grupo: o 1º e o 2º colocados já disputam a rodada direto (geralmente a final).
    return [[standings[0][0]??null, standings[0][1]??null]];
  }
  const teams = [];
  for(let i=0; i<letters.length; i+=2){
    const A = standings[i], B = standings[i+1];
    teams.push([A[0]??null, B[1]??null]);
    teams.push([B[0]??null, A[1]??null]);
  }
  return teams;
}
function bracketTeamsForRound(r){
  if(r===0) return primeiraRodadaTeams();
  const prevTeams = bracketTeamsForRound(r-1);
  const prevRound = state.bracket[r-1] || [];
  const prevWinners = prevTeams.map((t,i)=> winnerFinal(t[0], t[1], prevRound[i], r-1===0));
  const teams = [];
  for(let i=0; i<prevWinners.length; i+=2) teams.push([prevWinners[i], prevWinners[i+1]]);
  return teams;
}
function bracketWinnersForRound(r){
  const teams = bracketTeamsForRound(r);
  const round = state.bracket[r] || [];
  return teams.map((t,i)=> winnerFinal(t[0], t[1], round[i], r===0));
}
// Perdedores da semifinal (penúltima rodada) — usados na disputa de 3º/4º lugar
function semifinalLosers(){
  const rounds = totalRoundsBracket();
  if(rounds<2) return [null,null];
  const r = rounds-2;
  const teams = bracketTeamsForRound(r);
  const round = state.bracket[r] || [];
  const losers = teams.map((t,i)=>{
    const [a,b] = t;
    const w = winnerFinal(a,b,round[i]);
    if(!w || !a || !b) return null;
    return w===a ? b : a;
  });
  return [losers[0] ?? null, losers[1] ?? null];
}
function terceiroWinner(){
  const [a,b] = semifinalLosers();
  return winnerFinal(a,b, state.terceiro);
}
function champion(){
  const rounds = totalRoundsBracket();
  if(!rounds) return null;
  const w = bracketWinnersForRound(rounds-1);
  return w[0] || null;
}
function nomeRodada(r, totalRounds){
  const restantes = totalRounds - r; // 1 = final, 2 = semifinal, 3 = quartas...
  if(restantes===1) return "Final";
  if(restantes===2) return "Semifinal";
  if(restantes===3) return "Quartas de Final";
  if(restantes===4) return "Oitavas de Final";
  return `Rodada ${r+1}`;
}
function faseAtual(){
  if(champion()) return "Encerrado";
  if(state.formato==="eliminacao"){
    if(!state.drawn) return "Sorteio pendente";
    if(!matamataPronto()) return `Eliminação · Rodada ${state.elimRodadas.length}`;
  } else {
    if(!allGroupsFilled()) return state.drawn ? "Fase de Grupos" : "Sorteio pendente";
  }
  const rounds = totalRoundsBracket();
  for(let r=0; r<rounds; r++){
    const teams = bracketTeamsForRound(r);
    const round = state.bracket[r] || [];
    const pendente = teams.some((t,i)=> t[0] && t[1] && !partidaFinalizada(round[i]));
    const aguardando = teams.some(t=> !t[0] || !t[1]);
    if(aguardando) return nomeRodada(r, rounds) + " (aguardando classificados)";
    if(pendente) return nomeRodada(r, rounds);
  }
  return "Encerrado";
}

/* ---------- WhatsApp ---------- */
function matchesForDupla(nome){
  return state.groupMatches.filter(m => m.a===nome || m.b===nome);
}
function groupLetterForDupla(nome){
  const m = matchesForDupla(nome)[0];
  return m ? m.group : null;
}
function mensagemWhatsApp(nome){
  const matches = matchesForDupla(nome);
  const letter = groupLetterForDupla(nome);
  if(!matches.length) return "";
  const linhas = matches.map((m,idx)=>{
    const oponente = m.a===nome ? m.b : m.a;
    return `Jogo ${idx+1}: vs ${oponente}`;
  });
  // "do torneio "X"" em vez de "do X" — evita erro de concordância de gênero quando o nome
  // escolhido pelo organizador não é uma palavra masculina (ex: "Copa Verão").
  const nomeTorneio = state.cloudNome || "Supremo FTV";
  return `Olá, dupla ${nome}! 🏐\n\nVocê está no Grupo ${letter} do torneio "${nomeTorneio}".\n\nSeus jogos da fase de grupos:\n${linhas.join("\n")}\n\nBoa sorte! 🏆`;
}
function mensagemMataMata(faseLabel, nome, oponente){
  const nomeTorneio = state.cloudNome || "Supremo FTV";
  return `Olá, dupla ${nome}! 🏐\n\nSeu próximo jogo do torneio "${nomeTorneio}" (${faseLabel}) já está definido:\nvs ${oponente}\n\nBoa sorte! 🏆`;
}
function duplaIndexByName(nome){
  return state.duplas.findIndex(d => ((d.nome||"").trim() || "Dupla sem nome") === nome);
}
// Propaga a troca de nome de uma dupla para todos os jogos já sorteados (grupos, rodadas de
// eliminação e o chaveamento do mata-mata) — assim uma dupla pode ser renomeada (ex: substituição
// por desistência) sem precisar refazer o sorteio.
function propagarRenomeDupla(indice, nomeAntigoBruto){
  const antigo = (nomeAntigoBruto||"").trim() || "Dupla sem nome";
  const novo = (state.duplas[indice].nome||"").trim() || "Dupla sem nome";
  if(antigo === novo) return;
  const trocar = v => v===antigo ? novo : v;

  state.groups = (state.groups||[]).map(g => g.map(trocar));
  state.groupMatches.forEach(m=>{ m.a = trocar(m.a); m.b = trocar(m.b); });
  state.elimRodadas.forEach(r=>{
    r.matches.forEach(m=>{ m.a = trocar(m.a); m.b = trocar(m.b); });
    if(r.bye) r.bye = trocar(r.bye);
  });
  if(state.bracketSeed) state.bracketSeed = state.bracketSeed.map(n => n==null ? n : trocar(n));

  save();
  render();
  showToast(`"${antigo}" foi renomeada para "${novo}" em todos os jogos já sorteados.`);
}
function telefoneParaWa(tel){
  const digits = (tel||"").replace(/\D/g,"");
  if(!digits) return null;
  return digits.length <= 11 ? "55"+digits : digits;
}
function waLink(tel, msg){
  const phone = telefoneParaWa(tel);
  if(!phone) return null;
  return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
}

/* ============================================================
   ARBITRAGEM (JUIZ DE PARTIDA)
============================================================ */
function makeMatchId(round, idx){
  if(round==="terceiro") return "terceiro";
  if(typeof round==="string" && round.startsWith("e")) return `${round}_${idx}`;
  return `b${round}_${idx}`;
}
function matchIdIsElim(matchId){
  return !/^g\d+$/.test(matchId);
}
function getMatchObj(matchId){
  if(/^g\d+$/.test(matchId)) return state.groupMatches[Number(matchId.slice(1))];
  if(matchId==="terceiro") return state.terceiro;
  const me = matchId.match(/^e(\d+)_(\d+)$/);
  if(me) return state.elimRodadas[Number(me[1])].matches[Number(me[2])];
  const m = matchId.match(/^b(\d+)_(\d+)$/);
  if(m) return state.bracket[Number(m[1])][Number(m[2])];
  return null;
}
function getMatchTeams(matchId){
  if(/^g\d+$/.test(matchId)){ const mm = state.groupMatches[Number(matchId.slice(1))]; return [mm.a, mm.b]; }
  if(matchId==="terceiro") return semifinalLosers();
  const me = matchId.match(/^e(\d+)_(\d+)$/);
  if(me){ const mm = state.elimRodadas[Number(me[1])].matches[Number(me[2])]; return [mm.a, mm.b]; }
  const m = matchId.match(/^b(\d+)_(\d+)$/);
  if(m) return bracketTeamsForRound(Number(m[1]))[Number(m[2])];
  return [null,null];
}
function getMatchLabel(matchId){
  if(/^g\d+$/.test(matchId)){ const mm = state.groupMatches[Number(matchId.slice(1))]; return `Grupo ${mm.group} · Jogo ${mm.jogo}`; }
  if(matchId==="terceiro") return "Disputa de 3º e 4º Lugar";
  const me = matchId.match(/^e(\d+)_(\d+)$/);
  if(me) return `Rodada ${Number(me[1])+1} · Jogo ${Number(me[2])+1}`;
  const m = matchId.match(/^b(\d+)_(\d+)$/);
  if(m){
    const r = Number(m[1]), i = Number(m[2]);
    const rounds = totalRoundsBracket();
    const label = nomeRodada(r, rounds);
    const nMatches = state.bracket[r] ? state.bracket[r].length : 1;
    return nMatches>1 ? `${label} · ${i+1}` : label;
  }
  return "";
}
function getArb(matchId){
  if(!state.arbitragem) state.arbitragem = {};
  if(!state.arbitragem[matchId]){
    // Se o placar já foi definido direto (sem passar pelo Apitar jogo), o registro de
    // arbitragem nasce refletindo esse placar e status real em vez de zerado/não iniciada —
    // senão um jogo já finalizado "renascia" como não iniciado ao abrir o placar, e essa
    // inconsistência (placar preenchido + status não_iniciada) fazia o jogo parecer reaberto.
    const m = getMatchObj(matchId);
    const temPlacar = m && m.pa!==null && m.pa!=="" && m.pb!==null && m.pb!=="";
    const jaFinalizado = !!(m && m.finalizado);
    state.arbitragem[matchId] = {
      status: jaFinalizado ? "finalizada" : "nao_iniciada", // nao_iniciada | andamento | tecnico | finalizada
      placarA: temPlacar ? Number(m.pa) : 0,
      placarB: temPlacar ? Number(m.pb) : 0,
      acumuladoMs: 0,
      inicioMs: null,
      ultimoMultiploTroca: 0,
      duracaoFinalSegundos: jaFinalizado ? 0 : null,
      arbitroNome: null, // nome de quem apitou (preenchido pelo link de árbitro convidado)
      tokenApito: null, // token do link de árbitro convidado dessa partida, se já foi gerado
      atualizadoEm: Date.now() // usado pelo merge no worker pra saber qual lado é mais recente
    };
  } else {
    // Auto-corrige um registro salvo antes desse ajuste (jogo finalizado com arbitragem
    // desalinhada em "não iniciada") em vez de propagar o erro pra sempre.
    const arb = state.arbitragem[matchId];
    const m = getMatchObj(matchId);
    if(m && m.finalizado && arb.status!=="finalizada"){
      arb.status = "finalizada";
      arb.placarA = Number(m.pa);
      arb.placarB = Number(m.pb);
      arb.inicioMs = null;
      if(arb.duracaoFinalSegundos==null) arb.duracaoFinalSegundos = Math.floor((arb.acumuladoMs||0)/1000);
      arb.atualizadoEm = Date.now();
    }
  }
  return state.arbitragem[matchId];
}
function tempoDecorridoMs(arb){
  return arb.acumuladoMs + (arb.inicioMs ? (Date.now() - arb.inicioMs) : 0);
}
// Mostra o placar em tempo real (vindo do Apitar jogo) nas telas gerais, sem tocar no placar
// oficial (m.pa/m.pb) — esse só é gravado quando a partida é finalizada, pra não afetar
// classificação/chaveamento no meio do jogo.
function liveScoreBadgeHtml(matchId){
  const arb = state.arbitragem && state.arbitragem[matchId];
  if(!arb) return "";
  let html = "";
  if(arb.status==="andamento" || arb.status==="tecnico"){
    const rotulo = arb.status==="andamento" ? "🔴 Em andamento" : "⏸️ Tempo técnico";
    html += `<div class="live-score-badge">${rotulo} · ${arb.placarA}×${arb.placarB}</div>`;
  }
  if(arb.arbitroNome){

  }
  return html;
}
function woNoteHtml(m, a, b){

}
// Monta a linha de botões de ação (apitar/placar TV/finalizar/reabrir/W.O.) de um jogo, com o
// mesmo critério em todo lugar onde uma partida aparece (grupos, eliminação, mata-mata).
function acoesJogoHtml(matchId, m){

  let html = `<div class="ref-actions-row">

    <button class="ref-mini-btn ghost" data-compartilhar-apito="${matchId}">🔗 Compartilhar</button>
    <button class="ref-mini-btn ghost" data-placartv="${matchId}">📺 Placar do jogo</button>`;
  if(m && !m.finalizado){
    html += `<button class="ref-mini-btn ghost" data-wo="${matchId}" style="border-color:var(--coral);color:var(--coral);">🚫 W.O.</button>`;
  }
  if(podeFinalizar){
    html += `<button class="ref-mini-btn" data-finalizar="${matchId}" style="background:var(--grass);color:#fff;">✅ Finalizar jogo</button>`;
  }
  if(m && m.finalizado){
    html += `<button class="ref-mini-btn ghost" data-reabrir="${matchId}">🔓 Reabrir partida</button>`;
  }
  html += `</div>`;
  return html;
}
function formatTempo(ms){
  const totalSec = Math.max(0, Math.floor(ms/1000));
  const m = Math.floor(totalSec/60), s = totalSec%60;
  return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}
function checkTrocaLado(arb){
  const soma = arb.placarA + arb.placarB;
  const multiploAtual = soma>0 ? Math.floor(soma/6)*6 : 0;
  let deveTrocar = false;
  if(multiploAtual>0 && multiploAtual>(arb.ultimoMultiploTroca||0)){
    arb.ultimoMultiploTroca = multiploAtual;
    deveTrocar = true;
  } else if(soma < (arb.ultimoMultiploTroca||0)){
    arb.ultimoMultiploTroca = multiploAtual;
  }
  return deveTrocar;
}
// Regra de fim de partida: 18 pontos com pelo menos 2 de vantagem — se passar de 18 (ex: 18x17),
// só conta como "atingiu o fim" quando a vantagem chegar a 2 (19x17, 20x18, 21x19...), igual ao
// vôlei. Só sinaliza a condição — quem realmente finaliza é sempre uma confirmação do usuário.
function partidaAtingiuFim(pa, pb){
  return (pa>=18 && pa-pb>=2) || (pb>=18 && pb-pa>=2);
}
function arbSalvarAgora(){
  save();
  flushSyncTorneio();
}
function arbIniciar(matchId){
  const arb = getArb(matchId);
  if(arb.status!=="nao_iniciada") return;
  arb.inicioMs = Date.now();
  arb.status = "andamento";
  arb.atualizadoEm = Date.now();
  arbSalvarAgora();
  render();
}
function arbTempoTecnico(matchId){
  const arb = getArb(matchId);
  if(arb.status==="andamento"){
    arb.acumuladoMs += Date.now() - arb.inicioMs;
    arb.inicioMs = null;
    arb.status = "tecnico";
  } else if(arb.status==="tecnico"){
    arb.inicioMs = Date.now();
    arb.status = "andamento";
  } else {
    return;
  }
  arb.atualizadoEm = Date.now();
  arbSalvarAgora();
  render();
}
async function arbFinalizar(matchId){
  const arb = getArb(matchId);
  if(arb.status!=="andamento" && arb.status!=="tecnico") return;
  if(arb.status==="andamento" && arb.inicioMs){
    arb.acumuladoMs += Date.now() - arb.inicioMs;
    arb.inicioMs = null;
  }
  arb.status = "finalizada";
  arb.duracaoFinalSegundos = Math.floor(arb.acumuladoMs/1000);
  arb.atualizadoEm = Date.now();
  const m = getMatchObj(matchId);
  if(m){ m.pa = arb.placarA; m.pb = arb.placarB; m.finalizado = true; }
  save();
  render();
  checkElimNotifications();
  showToast("Salvando...");
  const {ok, erro} = await flushSyncTorneio();
  showToast(ok ? "Partida finalizada e placar salvo!" : `⚠️ Finalizada aqui, mas não sincronizou: ${erro||"erro desconhecido"}`);
}
function arbReabrir(matchId){
  const arb = getArb(matchId);
  if(arb.status!=="finalizada") return;
  arb.status = "tecnico";
  arb.atualizadoEm = Date.now();
  const m = getMatchObj(matchId);
  if(m) m.finalizado = false; // volta a valer só depois de finalizar de novo
  arbSalvarAgora();
  render();
}
function arbPonto(matchId, lado, delta){
  const arb = getArb(matchId);
  if(arb.status==="finalizada") return;
  const campo = lado==="a" ? "placarA" : "placarB";
  arb[campo] = Math.max(0, arb[campo]+delta);
  arb.atualizadoEm = Date.now();
  const trocar = checkTrocaLado(arb);
  // placar oficial acompanha em tempo real (pra aparecer na aba Jogos/mata-mata/placar de TV),
  // mas como a partida ainda não está "finalizada", nada de classificação/chaveamento é recalculado.
  const m = getMatchObj(matchId);
  if(m){ m.pa = arb.placarA; m.pb = arb.placarB; }
  arbSalvarAgora();
  render();
  if(trocar) mostrarPopupTroca();
  // Só verifica em quem soma ponto (delta>0) — uma correção pra baixo nunca deve disparar o
  // convite pra finalizar. A finalização em si só acontece se o usuário confirmar aqui.
  if(delta>0 && partidaAtingiuFim(arb.placarA, arb.placarB)){
    if(confirm(`Placar ${arb.placarA} x ${arb.placarB}. Finalizar a partida?`)) arbFinalizar(matchId);
  }
}
// Permite finalizar uma partida direto pela lista de jogos (sem precisar abrir o Apitar jogo),
// pra quem preferir só digitar o placar nos campos e confirmar.
async function finalizarJogoManual(matchId){
  const m = getMatchObj(matchId);
  if(!m) return;
  if(m.pa===null || m.pa==="" || m.pb===null || m.pb===""){
    showToast("Preencha os dois placares antes de finalizar.");
    return;
  }
  m.finalizado = true;
  if(state.arbitragem && state.arbitragem[matchId]){
    const arb = state.arbitragem[matchId];
    if(arb.status==="andamento" && arb.inicioMs){
      arb.acumuladoMs += Date.now() - arb.inicioMs;
      arb.inicioMs = null;
    }
    if(arb.status!=="finalizada"){
      arb.status = "finalizada";
      arb.placarA = Number(m.pa);
      arb.placarB = Number(m.pb);
      arb.duracaoFinalSegundos = Math.floor(arb.acumuladoMs/1000);
    }
  }
  save();
  render();
  checkElimNotifications();
  showToast("Salvando...");
  const {ok, erro} = await flushSyncTorneio();
  showToast(ok ? "Jogo finalizado e salvo!" : `⚠️ Finalizado aqui, mas não sincronizou: ${erro||"erro desconhecido"}`);
}
// Libera de novo os campos de placar de uma partida já finalizada (por qualquer via: Apitar
// jogo, botão Finalizar ou W.O.) — quem organiza pode corrigir e finalizar de novo depois.
async function reabrirJogoManual(matchId){
  const m = getMatchObj(matchId);
  if(!m) return;
  m.finalizado = false;
  m.wo = null;
  if(state.arbitragem && state.arbitragem[matchId] && state.arbitragem[matchId].status==="finalizada"){
    // Volta pra "não iniciada" (não "tempo técnico"), porque "tempo técnico"/"andamento" são
    // justamente os status que deixam os campos de placar desabilitados — o objetivo aqui é
    // liberar a edição direta pelos campos, sem precisar passar pelo Apitar jogo de novo.
    state.arbitragem[matchId].status = "nao_iniciada";
    state.arbitragem[matchId].inicioMs = null;
    state.arbitragem[matchId].atualizadoEm = Date.now();
  }
  save();
  render();
  showToast("Salvando...");
  const {ok, erro} = await flushSyncTorneio();
  showToast(ok ? "Partida reaberta — ajuste o placar e finalize de novo." : `⚠️ Reaberta aqui, mas não sincronizou: ${erro||"erro desconhecido"}`);
}

      </div>

  document.body.appendChild(overlay);

  const btnCancelar = overlay.querySelector("#btn-wo-cancelar");

// Gera (ou reaproveita) um link isolado, só para essa partida, que outra pessoa pode abrir sem
// login pra apitar. Protegido por um token aleatório — quem não tem o link não acessa nada.
async function compartilharLinkApito(matchId){
  if(!state.cloudId){ showToast("Salve o torneio na nuvem antes de compartilhar o link."); return; }
  showLoading("Gerando link...");
  try{
    const res = await apiFetch("/api/apito-link", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ id: state.cloudId, match: matchId, email: auth.email })
    });
    const data = await res.json();
    if(!res.ok){ showToast(data.error || "Não foi possível gerar o link."); return; }

    const [a,b] = getMatchTeams(matchId);
    const label = getMatchLabel(matchId);
    const params = new URLSearchParams({
      apitar: "1",
      torneio: state.cloudId,
      match: matchId,
      token: data.token,
      a: a || "",
      b: b || "",
      label: label || ""
    });
    const url = `${location.origin}${location.pathname}?${params.toString()}`;

    if(navigator.share){
      try{ await navigator.share({ title:"Apitar jogo", text:`Apite o jogo ${label}: ${a} × ${b}`, url }); return; }catch(e){ /* cancelou o share nativo — cai pro clipboard abaixo */ }
    }
    try{
      await navigator.clipboard.writeText(url);
      showToast("Link copiado! Envie para quem vai apitar.");
    }catch(e){
      prompt("Copie o link abaixo:", url);
    }
  }catch(e){
    showToast("Sem conexão com o servidor — não foi possível gerar o link.");
  }finally{
    hideLoading();
  }
}

  const params = new URLSearchParams({ inscrever:"1", torneio: state.cloudId, token: state.inscricaoLink.token });
  return `${location.origin}${location.pathname}?${params.toString()}`;
}
async function compartilharLinkInscricao(){
  const url = urlInscricao();
  if(!url) return;
  const titulo = `Inscrição — ${state.cloudNome||"Supremo FTV"}`;
  // O texto combina título+link numa linha só — vários apps (WhatsApp incluso) ignoram o
  // campo "title" do Web Share API e mostram só "text"/"url" separados; e no fallback de
  // clipboard/prompt não existe campo de título nenhum. Sem isso, quem recebe o link colado
  // não sabe de qual campeonato se trata até abrir.
  const mensagem = `${titulo}\n${url}`;
  if(navigator.share){
    try{ await navigator.share({ title:titulo, text:titulo, url }); return; }catch(e){ /* cancelou o share nativo — cai pro clipboard abaixo */ }
  }
  try{
    await navigator.clipboard.writeText(mensagem);
    showToast("Link copiado! Envie para as duplas se inscreverem.");
  }catch(e){
    prompt("Copie o texto abaixo:", mensagem);
  }
}

/* ---------- Notificações automáticas do mata-mata ---------- */
function elimMatchList(){
  const list = [];
  if(state.formato==="eliminacao"){
    state.elimRodadas.forEach((r, ri)=>{
      const label = `Rodada ${ri+1}`;
      r.matches.forEach((m, idx)=>{
        list.push({round:`e${ri}`, idx, side:"a", faseLabel:label, nome:m.a, oponente:m.b});
        list.push({round:`e${ri}`, idx, side:"b", faseLabel:label, nome:m.b, oponente:m.a});
      });
    });
  }
  if(matamataPronto() && mataMataLiberadoParaJogar()){
    const rounds = totalRoundsBracket();
    for(let r=0; r<rounds; r++){
      const teams = bracketTeamsForRound(r);
      const label = nomeRodada(r, rounds);
      teams.forEach(([a,b],idx)=>{
        list.push({round:r, idx, side:"a", faseLabel:label, nome:a, oponente:b});
        list.push({round:r, idx, side:"b", faseLabel:label, nome:b, oponente:a});
      });
    }
    if(state.terceiroLugar){
      const [la,lb] = semifinalLosers();
      list.push({round:"terceiro", idx:0, side:"a", faseLabel:"Disputa de 3º Lugar", nome:la, oponente:lb});
      list.push({round:"terceiro", idx:0, side:"b", faseLabel:"Disputa de 3º Lugar", nome:lb, oponente:la});
    }
  }
  return list;
}
function checkElimNotifications(){
  let changed = false;
  elimMatchList().forEach(({round, idx, side, faseLabel, nome, oponente})=>{
    if(!nome || !oponente) return;
    const key = `${round}-${idx}-${side}`;
    const rec = (state.elimNotified[key] && state.elimNotified[key].nome===nome)
      ? state.elimNotified[key]
      : {nome, slot1:false, slot2:false};
    const i = duplaIndexByName(nome);
    if(i<0){ return; }
    const d = state.duplas[i];
    const msg = mensagemMataMata(faseLabel, nome, oponente);
    const pendentes = [];
    if(d.tel1 && telegramStatus[codigoDupla(i,1)] && !rec.slot1) pendentes.push({slot:1, code:codigoDupla(i,1), message:msg});
    if(d.tel2 && telegramStatus[codigoDupla(i,2)] && !rec.slot2) pendentes.push({slot:2, code:codigoDupla(i,2), message:msg});
    if(pendentes.length){
      enviarNotificacaoElim(key, rec, pendentes);
    } else if(!state.elimNotified[key] || state.elimNotified[key].nome!==nome){
      state.elimNotified[key] = rec;
      changed = true;
    }
  });
  if(changed) save();
}
async function enviarNotificacaoElim(key, rec, pendentes){
  try{
    const res = await fetch("/api/telegram-send", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({items: pendentes.map(p=>({code:p.code, message:p.message}))})
    });
    const data = await res.json();
    (data.results||[]).forEach((r,idx)=>{
      if(r.ok){
        const slot = pendentes[idx].slot;
        if(slot===1) rec.slot1 = true; else rec.slot2 = true;
      }
    });
  }catch(e){ /* tenta de novo na próxima checagem */ }
  state.elimNotified[key] = rec;
  save();
  render();
}
function limparPendenciasElim(){
  const pend = pendingElimMessages();
  pend.forEach(p=>{
    const rec = (state.elimNotified[p.key] && state.elimNotified[p.key].nome===p.nome)
      ? state.elimNotified[p.key]
      : {nome:p.nome, slot1:false, slot2:false};
    if(p.slot===1) rec.slot1 = true; else rec.slot2 = true;
    state.elimNotified[p.key] = rec;
  });
  save();
  render();
}

const main = document.getElementById("main");

/* ---------- Story (imagem para compartilhar) ---------- */
let __storyHeaderImgCache = { src: null, img: null };
// Carrega (com cache) a imagem do topo configurada para este torneio, pra usar de fundo no Story.
// Como carregar uma imagem é assíncrono, na primeira chamada ainda não há nada pra desenhar —
// quando ela terminar de carregar, o próprio onload manda redesenhar o canvas.
function getStoryHeaderImage(){
  if(!state.headerImage) return null;
  if(__storyHeaderImgCache.src === state.headerImage) return __storyHeaderImgCache.img;
  const img = new Image();
  __storyHeaderImgCache = { src: state.headerImage, img: null };
  img.onload = ()=>{ __storyHeaderImgCache.img = img; drawStoryCanvas(); };
  img.src = state.headerImage;
  return null;
}
// Desenha "cobrindo" o retângulo de destino (mesmo efeito do CSS background-size:cover),
// cortando o excesso da imagem em vez de distorcer.
// Desenha a imagem inteira dentro do retângulo, sem cortar nada (equivalente a
// background-size:contain) — encaixa e centraliza, deixando sobra dos lados ou de
// cima/baixo quando a proporção da imagem não bate com a do retângulo.
function drawImageContain(ctx, img, dx, dy, dw, dh){
  const ir = img.width/img.height, dr = dw/dh;
  let w, h;
  if(ir > dr){ w = dw; h = w/ir; } else { h = dh; w = h*ir; }
  const x = dx + (dw-w)/2, y = dy + (dh-h)/2;
  ctx.drawImage(img, 0, 0, img.width, img.height, x, y, w, h);
}

function drawStoryCanvas(){
  const canvas = document.getElementById("story-canvas");
  if(!canvas) return;
  const neededH = renderStory(canvas, 1920);
  if(neededH > 1920){
    renderStory(canvas, Math.ceil(neededH/20)*20 + 20);
  }
}

function renderStory(canvas, H){
  canvas.height = H;
  const ctx = canvas.getContext("2d");
  const W = canvas.width;
  const GREEN = "#008200", GREEN_DEEP = "#0F3D1D", WHITE = "#FFFFFF", MUTED_ON_GREEN = "rgba(255,255,255,0.8)";

  ctx.clearRect(0,0,W,H);
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, GREEN);
  bg.addColorStop(1, GREEN_DEEP);
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  const headerH = 260;
  const headerImg = getStoryHeaderImage();
  if(headerImg){
    drawImageContain(ctx, headerImg, 0, 0, W, headerH);
  } else {
    ctx.textAlign = "center";
    ctx.fillStyle = WHITE;
    ctx.font = "bold 50px Arial, sans-serif";
    ctx.fillText(truncate(ctx, "🏐 " + (state.cloudNome || "Supremo FTV"), W-100), W/2, headerH/2+16);
  }

  let cursorY;
  if(!state.drawn){
    ctx.textAlign = "center";
    ctx.fillStyle = WHITE;
    ctx.font = "600 42px Arial, sans-serif";
    ctx.fillText("Sorteie as duplas para", W/2, headerH+180);
    ctx.fillText("gerar a imagem do campeonato", W/2, headerH+240);
    cursorY = headerH+300;
  } else if(state.formato==="eliminacao" && !matamataPronto()){
    ctx.textAlign = "center";
    ctx.fillStyle = WHITE;
    ctx.font = "600 42px Arial, sans-serif";
    ctx.fillText("Fase de eliminação", W/2, headerH+120);
    ctx.fillText(`Rodada ${state.elimRodadas.length} em andamento`, W/2, headerH+180);
    ctx.font = "600 30px Arial, sans-serif";
    ctx.fillStyle = MUTED_ON_GREEN;
    ctx.fillText(`${elimVivas().length} duplas seguem vivas`, W/2, headerH+240);
    cursorY = drawElimRodadaAtualSection(ctx, W, headerH+300);
  } else if(state.formato==="eliminacao"){
    cursorY = drawBracket(ctx, W, headerH+60);
  } else {
    // Enquanto os grupos não terminam (ou há empate técnico ainda sem decisão/confirmação, ver
    // mataMataLiberadoParaJogar), o chaveamento do mata-mata ainda não tem ninguém definido de
    // verdade — mostra os jogos da fase de grupos no lugar dele.
    const groupsBottom = drawGroupsSection(ctx, W, headerH+60);
    cursorY = (allGroupsFilled() && mataMataLiberadoParaJogar())
      ? drawBracket(ctx, W, groupsBottom+50)
      : drawGroupMatchesSection(ctx, W, groupsBottom+50);
  }

  return cursorY + 140;
}

function drawGroupsSection(ctx, W, startY){
  const GREEN_DEEP = "#0F3D1D", WHITE = "#FFFFFF", GOLD = "#FFD34D";

  ctx.textAlign = "center";
  ctx.fillStyle = WHITE;
  ctx.font = "600 26px Arial, sans-serif";
  ctx.fillText("FASE DE GRUPOS", W/2, startY);

  const letters = groupLettersState();
  const cardW = 480, gap = 40;
  const margin = (W - (cardW*2+gap))/2;
  const rowGap = 30;
  const headerBarH = 42, rowH = 46;
  const cols = letters.length>1 ? 2 : 1;
  const linhas = Math.ceil(letters.length/cols);

  let maxBottom = startY + 36;
  for(let linha=0; linha<linhas; linha++){
    const rowLetters = letters.slice(linha*cols, linha*cols+cols);
    let alturaLinha = 0;
    rowLetters.forEach((letter, ci)=>{
      const tamanhoGrupo = (state.groups[letters.indexOf(letter)]||[]).length || 3;
      const cardH = headerBarH + rowH*tamanhoGrupo;
      alturaLinha = Math.max(alturaLinha, cardH);
      const x = cols===2 ? (margin + ci*(cardW+gap)) : (W-cardW)/2;
      const py = maxBottom;

      ctx.fillStyle = GREEN_DEEP;
      roundRect(ctx, x, py, cardW, headerBarH, 8);
      ctx.fill();
      ctx.fillStyle = WHITE;
      ctx.font = "bold 23px Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("GRUPO " + letter, x+cardW/2, py+headerBarH/2+8);

      const rows = standingsFor(letter);
      rows.forEach((r,i)=>{
        const ry = py + headerBarH + i*rowH;
        ctx.fillStyle = i<2 ? GOLD : WHITE;
        roundRect(ctx, x, ry+3, cardW, rowH-6, 6);
        ctx.fill();

        ctx.textAlign = "left";
        ctx.fillStyle = GREEN_DEEP;
        ctx.font = (i<2 ? "bold " : "600 ") + "23px Arial, sans-serif";
        ctx.fillText(truncate(ctx, `${i+1}º  ${r.nome}`, cardW-110), x+16, ry+rowH/2+5);

        ctx.textAlign = "right";
        ctx.fillStyle = GREEN_DEEP;
        ctx.font = "600 19px Arial, sans-serif";
        ctx.fillText(r.pts + " pts", x+cardW-16, ry+rowH/2+4);
      });
    });
    maxBottom += alturaLinha + rowGap;
  }

  return maxBottom - rowGap;
}

// Enquanto a fase de grupos não termina, o chaveamento do mata-mata ainda não tem ninguém
// definido (tudo "A definir") — em vez disso, mostra os confrontos já sorteados dos grupos,
// cada um dentro de uma "bolha" com o rótulo "Jogo N" (ver drawJogoBubble/drawMatchBox/
// drawTeamBar), pra separar visualmente onde um confronto termina e o outro começa — antes
// ficavam só as pílulas de dupla empilhadas, sem nada indicando o agrupamento.
function drawGroupMatchesSection(ctx, W, startY){
  const WHITE = "#FFFFFF";
  ctx.textAlign = "center";
  ctx.fillStyle = WHITE;
  ctx.font = "600 26px Arial, sans-serif";
  ctx.fillText("JOGOS DA FASE DE GRUPOS", W/2, startY);

  const boxW = 560, boxX = (W-boxW)/2, barH = 42;
  let y = startY + 44;

  groupLettersState().forEach(letter=>{
    ctx.textAlign = "left";
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.font = "600 22px Arial, sans-serif";
    ctx.fillText("GRUPO " + letter, boxX, y+18);
    y += 36;

    state.groupMatches.filter(m=>m.group===letter).forEach(m=>{
      const win = winnerFinal(m.a, m.b, m);
      y = drawJogoBubble(ctx, boxX, y, boxW, m, win, barH, `Jogo ${m.jogo}`) + 22;
    });
    y += 14;
  });

  return y;
}

// Enquanto a fase de eliminação não termina (ainda não deu pra fechar o mata-mata de verdade),
// mostra os confrontos da rodada atual no mesmo estilo de bolha usado nos grupos — antes disso
// a imagem só trazia um texto resumido ("Rodada X em andamento"), sem nenhum jogo visível.
function drawElimRodadaAtualSection(ctx, W, startY){
  const WHITE = "#FFFFFF";
  const rodada = elimRodadaAtual();
  if(!rodada || !rodada.matches.length) return startY;

  ctx.textAlign = "center";
  ctx.fillStyle = WHITE;
  ctx.font = "600 26px Arial, sans-serif";
  ctx.fillText(`JOGOS DA RODADA ${state.elimRodadas.length}`, W/2, startY);

  const boxW = 560, boxX = (W-boxW)/2, barH = 42;
  let y = startY + 44;

  rodada.matches.forEach((m, mi)=>{
    const win = winnerFinal(m.a, m.b, m);
    y = drawJogoBubble(ctx, boxX, y, boxW, m, win, barH, `Jogo ${mi+1}`) + 22;
  });

  return y;
}

// Cartão arredondado ("bolha") que envolve as duas pílulas de um confronto (dupla A / dupla B)
// com o rótulo do jogo (ex: "Jogo 1") no topo — antes os pares de dupla ficavam só empilhados,
// sem nada indicando onde um confronto terminava e o outro começava. Devolve o Y do fim do cartão.
function drawJogoBubble(ctx, x, y, w, m, win, barH, label){
  const WHITE = "#FFFFFF";
  const pad = 16, labelH = 34, gapPilulas = 6;
  const bubbleH = pad + labelH + barH*2 + gapPilulas + pad;

  ctx.fillStyle = "rgba(255,255,255,0.08)";
  roundRect(ctx, x-pad, y, w+pad*2, bubbleH, 18);
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.18)";
  ctx.lineWidth = 1.5;
  roundRect(ctx, x-pad, y, w+pad*2, bubbleH, 18);
  ctx.stroke();

  ctx.textAlign = "left";
  ctx.fillStyle = WHITE;
  ctx.font = "bold 20px Arial, sans-serif";
  ctx.fillText(label, x, y+pad+labelH*0.6);

  drawMatchBox(ctx, x, y+pad+labelH, w, m.a, m.b, m, win, barH);

  return y + bubbleH;
}

/* ---------- Chaveamento (bracket), estilo "TV de Copa do Mundo": pílulas com placar,
   conectores em cerquilha e as duas metades convergindo pra uma Final central. ---------- */
function drawTeamBar(ctx, x, y, w, h, text, destaque, score){
  const WHITE = "#FFFFFF", GOLD_BG = "#FFF2D9", GREEN_DEEP = "#0F3D1D", CORAL = "#FF2B00";
  ctx.fillStyle = destaque ? GOLD_BG : WHITE;
  roundRect(ctx, x, y, w, h, h/2);
  ctx.fill();
  if(destaque){
    ctx.strokeStyle = CORAL;
    ctx.lineWidth = 3;
    roundRect(ctx, x+1.5, y+1.5, w-3, h-3, h/2-1.5);
    ctx.stroke();
  }

  const hasScore = score!==null && score!==undefined;
  let textStartX = x + 22;
  if(hasScore){
    const raio = h*0.36, cx = x+raio+8, cy = y+h/2;
    ctx.fillStyle = destaque ? CORAL : GREEN_DEEP;
    ctx.beginPath();
    ctx.arc(cx, cy, raio, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = WHITE;
    ctx.font = "bold " + Math.round(h*0.4) + "px Arial, sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(String(score), cx, cy+h*0.14);
    textStartX = cx + raio + 14;
  }

  const label = text || "A definir";
  const maxTextW = x+w-16-textStartX;
  const weight = destaque ? "bold" : "600";
  const size = fitFontSize(ctx, label, maxTextW, Math.min(25, Math.round(h*0.52)), 13, weight);
  ctx.font = `${weight} ${size}px Arial, sans-serif`;
  const finalLabel = ctx.measureText(label).width <= maxTextW ? label : truncate(ctx, label, maxTextW);
  ctx.fillStyle = GREEN_DEEP;
  ctx.textAlign = "left";
  ctx.fillText(finalLabel, textStartX, y+h/2+size*0.32);
}
function drawMatchBox(ctx, x, y, w, a, b, m, win, barH){
  barH = barH || 50;
  const gap = 6;
  const scoreA = (m && m.pa!==null && m.pa!=="") ? m.pa : null;
  const scoreB = (m && m.pb!==null && m.pb!=="") ? m.pb : null;
  drawTeamBar(ctx, x, y, w, barH, a, win && a===win, scoreA);
  drawTeamBar(ctx, x, y+barH+gap, w, barH, b, win && b===win, scoreB);
  return y + barH*2 + gap;
}
function elbowConnectorH(ctx, xLeft, xRight, y1, y2){
  const xMid = xLeft + (xRight-xLeft)*0.5;
  ctx.strokeStyle = "rgba(255,255,255,0.65)";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(xLeft, y1); ctx.lineTo(xMid, y1);
  ctx.moveTo(xLeft, y2); ctx.lineTo(xMid, y2);
  ctx.moveTo(xMid, y1); ctx.lineTo(xMid, y2);
  ctx.moveTo(xMid, (y1+y2)/2); ctx.lineTo(xRight, (y1+y2)/2);
  ctx.stroke();
}

function drawBracket(ctx, W, startY){
  const WHITE = "#FFFFFF", GOLD = "#FFD34D";
  const labelY = startY + 30;
  const margin = 26;

  const colLabel = (text, cx, y)=>{
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(255,255,255,0.85)";
    ctx.font = "600 22px Arial, sans-serif";
    ctx.fillText(text.toUpperCase(), cx, y);
  };
  const trophyLabel = (cx, y)=>{
    ctx.textAlign = "center";
    ctx.fillStyle = GOLD;
    ctx.font = "bold 32px Arial, sans-serif";
    ctx.fillText("🏆 FINAL", cx, y);
  };

  const rounds = totalRoundsBracket();
  if(rounds < 1) return startY;

  const teamsPorRodada = [], vencedoresPorRodada = [];
  for(let r=0; r<rounds; r++){
    teamsPorRodada.push(bracketTeamsForRound(r));
    vencedoresPorRodada.push(bracketWinnersForRound(r));
  }

  let cursorY;

  if(rounds===1){
    // Bracket mínimo (2 duplas): só a final, sem colunas laterais.
    const colW = 320, barH = 56;
    trophyLabel(W/2, labelY);
    const [a,b] = teamsPorRodada[0][0];
    cursorY = drawMatchBox(ctx, (W-colW)/2, labelY+40, colW, a, b, state.bracket[0][0], vencedoresPorRodada[0][0], barH);
  } else {
    const sideRounds = rounds - 1;
    // Larguras dinâmicas: preciso caber (sideRounds*2 + 1) colunas lado a lado (esquerda + final + direita).
    const slots = sideRounds*2 + 1;
    const colGap = 34;
    const colW = Math.max(140, Math.min(260, (W - 2*margin - (slots-1)*colGap) / slots));

    // Divide cada rodada lateral ao meio — metade vira o lado esquerdo, metade o direito.
    const ladoTeams = [[], []], ladoVenc = [[], []], ladoMatches = [[], []];
    for(let r=0; r<sideRounds; r++){
      const teams = teamsPorRodada[r], venc = vencedoresPorRodada[r], round = state.bracket[r]||[];
      const mid = teams.length/2;
      ladoTeams[0].push(teams.slice(0,mid)); ladoVenc[0].push(venc.slice(0,mid)); ladoMatches[0].push(round.slice(0,mid));
      ladoTeams[1].push(teams.slice(mid)); ladoVenc[1].push(venc.slice(mid)); ladoMatches[1].push(round.slice(mid));
    }

    function desenharLado(espelhado){
      const lado = espelhado ? 1 : 0;
      const times = ladoTeams[lado], venc = ladoVenc[lado], matches = ladoMatches[lado];
      const xCol = (r)=> espelhado ? (W - margin - colW - r*(colW+colGap)) : (margin + r*(colW+colGap));

      const barH0 = 40, boxH0 = barH0*2+6, rowGap0 = 32;
      const top0 = labelY + 44;
      let centros = times[0].map((t,i)=> top0 + i*(boxH0+rowGap0) + boxH0/2);
      let maxBottom = top0;

      colLabel(nomeRodada(0, rounds), xCol(0)+colW/2, labelY);
      times[0].forEach((t,i)=>{
        const y = top0 + i*(boxH0+rowGap0);
        const bottom = drawMatchBox(ctx, xCol(0), y, colW, t[0], t[1], matches[0][i], venc[0][i], barH0);
        maxBottom = Math.max(maxBottom, bottom);
      });

      for(let r=1; r<sideRounds; r++){
        colLabel(nomeRodada(r, rounds), xCol(r)+colW/2, labelY);
        const barH = 40 + r*4, boxH = barH*2+6;
        const novosCentros = [];
        for(let i=0; i<times[r].length; i++){
          const c = (centros[i*2] + centros[i*2+1]) / 2;
          const top = c - boxH/2;
          const [a,b] = times[r][i];
          const bottom = drawMatchBox(ctx, xCol(r), top, colW, a, b, matches[r][i], venc[r][i], barH);
          novosCentros.push(c);
          maxBottom = Math.max(maxBottom, bottom);
          const xOuter = espelhado ? xCol(r-1) : xCol(r-1)+colW;
          const xInner = espelhado ? xCol(r)+colW : xCol(r);
          if(espelhado) elbowConnectorH(ctx, xInner, xOuter, centros[i*2], centros[i*2+1]);
          else elbowConnectorH(ctx, xOuter, xInner, centros[i*2], centros[i*2+1]);
        }
        centros = novosCentros;
      }

      const xInner = espelhado ? xCol(sideRounds-1) : xCol(sideRounds-1)+colW;
      return {centro: centros[0], bottom: maxBottom, xInner};
    }

    const esquerda = desenharLado(false);
    const direita = desenharLado(true);

    const finalCentroY = (esquerda.centro + direita.centro) / 2;
    const finalBarH = 52, finalBoxH = finalBarH*2+6;
    const finalX = (W-colW)/2;

    trophyLabel(finalX+colW/2, labelY);

    ctx.strokeStyle = "rgba(255,255,255,0.65)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(esquerda.xInner, finalCentroY); ctx.lineTo(finalX, finalCentroY);
    ctx.moveTo(direita.xInner, finalCentroY); ctx.lineTo(finalX+colW, finalCentroY);
    ctx.stroke();

    const finalTeams = teamsPorRodada[rounds-1][0];
    const finalMatch = (state.bracket[rounds-1]||[])[0];
    const finalBottom = drawMatchBox(ctx, finalX, finalCentroY-finalBoxH/2, colW, finalTeams[0], finalTeams[1], finalMatch, vencedoresPorRodada[rounds-1][0], finalBarH);

    cursorY = Math.max(esquerda.bottom, direita.bottom, finalBottom);
  }

  cursorY += 80;
  const finalWin = champion();
  if(finalWin){
    ctx.textAlign = "center";
    ctx.fillStyle = GOLD;
    ctx.font = "600 30px Arial, sans-serif";
    ctx.fillText("🏆 CAMPEÃO DO TORNEIO", W/2, cursorY);
    cursorY += 66;
    ctx.fillStyle = WHITE;
    ctx.font = "bold 62px Arial, sans-serif";
    ctx.fillText(truncate(ctx, finalWin, W-160), W/2, cursorY);
  }

  if(state.terceiroLugar){
    const [la, lb] = semifinalLosers();
    const tWin = winnerFinal(la, lb, state.terceiro);
    cursorY += 90;
    colLabel("3º e 4º lugar", W/2, cursorY-20);
    const terceiroW = 420, terceiroX = (W-terceiroW)/2;
    cursorY = drawMatchBox(ctx, terceiroX, cursorY, terceiroW, la, lb, state.terceiro, tWin, 50);
  }

  return cursorY;
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
// Encolhe a fonte (até um mínimo) até o texto caber em maxWidth, em vez de truncar o nome —
// só recorre a truncar (ver chamador) se nem no tamanho mínimo couber.
function fitFontSize(ctx, text, maxWidth, baseSize, minSize, weight){
  let size = baseSize;
  while(size > minSize){
    ctx.font = `${weight} ${size}px Arial, sans-serif`;
    if(ctx.measureText(text).width <= maxWidth) break;
    size -= 1;
  }
  return size;
}
function truncate(ctx, text, maxWidth){
  let t = text;
  while(ctx.measureText(t).width > maxWidth && t.length > 3){
    t = t.slice(0, -1);
  }
  return t === text ? text : t.trim() + "…";
}
function wrapText(ctx, text, x, y, maxWidth, lineHeight, font){
  ctx.font = font;
  ctx.textAlign = "center";
  const words = text.split(" ");
  let line = "";
  const lines = [];
  words.forEach(w=>{
    const test = line ? line + " " + w : w;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  });
  if(line) lines.push(line);
  const startY = y - (lines.length-1)*lineHeight/2;
  lines.forEach((l,i)=> ctx.fillText(l, x, startY + i*lineHeight));
}
function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}
async function shareStoryImage(){
  const canvas = document.getElementById("story-canvas");
  if(!canvas) return;
  canvas.toBlob(async (blob)=>{
    if(!blob) return;
    const file = new File([blob], "campeonato-futevolei.png", {type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file], title:"Supremo FTV"});
      }catch(e){ /* usuário cancelou o compartilhamento */ }
    } else {
      showToast("Compartilhamento direto não é suportado aqui — usando download.");
      downloadStoryImage();
    }
  }, "image/png");
}
function downloadStoryImage(){
  const canvas = document.getElementById("story-canvas");
  if(!canvas) return;
  canvas.toBlob((blob)=>{
    if(!blob) return;
    const url = URL.createObjectURL(blob);
    if(isIOS()){
      window.open(url, "_blank");
      showToast("Toque e segure a imagem que abriu e escolha 'Salvar imagem'.");
    } else {
      const link = document.createElement("a");
      link.download = "campeonato-futevolei.png";
      link.href = url;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast("Imagem baixada!");
    }
    setTimeout(()=>URL.revokeObjectURL(url), 30000);
  }, "image/png");
}

function pendingElimMessages(){
  if(!state.drawn) return [];
  const pend = [];
  elimMatchList().forEach(({round, idx, side, faseLabel, nome, oponente})=>{
    if(!nome || !oponente) return;
    const i = duplaIndexByName(nome);
    if(i<0) return;
    const d = state.duplas[i];
    const key = `${round}-${idx}-${side}`;
    const rec = state.elimNotified[key];
    [1,2].forEach(slot=>{
      const tel = slot===1 ? d.tel1 : d.tel2;
      if(!tel) return;
      const sent = !!(rec && rec.nome===nome && (slot===1 ? rec.slot1 : rec.slot2));
      if(!sent) pend.push({key, slot, i, nome, oponente, faseLabel, tel});
    });
  });
  return pend;
}

  bindEvents();

// Tela de pagamento: aparece assim que o campeonato é criado (o Pix já é gerado automaticamente
// na hora, sem depender da aprovação do admin), até as diárias serem pagas. Sem Pix gerado ainda
// (ex: falha pontual ao falar com o Mercado Pago na criação): mostra um botão pra gerar na mão.
// Com Pix gerado: mostra QR + copia-e-cola e um botão pra checar manualmente (o pagamento também
// é liberado sozinho, via webhook e verificação em background, sem precisar desse botão).
function renderTelaPix(){
  const pg = state.pagamento;
  const dias = pg?.dias || calcularDiasLocal(state.dataInicio, state.dataFim);
  const temOverride = typeof state.valorOverride === "number";
  const valorEstimado = temOverride ? state.valorOverride : dias * valorDiariaCache;

  if(!pg || pg.status!=="pendente"){
    return `<div class="card empty" style="margin-top:20px;">
      <span class="ball-icon">🏐</span>
      <div style="font-weight:700;font-size:16px;color:var(--heading);margin:10px 0 8px;">💳 Falta o pagamento</div>
      <div class="sub" style="font-family:'DM Mono',monospace;margin-bottom:8px;">#${escapeHtml(state.codigo||"—")}</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px;">
        Período de ${formatarDataBR(state.dataInicio)} a ${formatarDataBR(state.dataFim)}
        ${dias ? ` (${dias} diária${dias>1?"s":""}${temOverride ? "" : ` × R$ ${valorDiariaCache.toFixed(2).replace(".", ",")}`} = <b>R$ ${valorEstimado.toFixed(2).replace(".", ",")}</b>)` : ""}.
        Gere o Pix abaixo para liberar o uso.
      </div>
      <button class="btn primary" id="btn-gerar-pix" style="max-width:260px;margin:0 auto;">Gerar Pix</button>
    </div>`;
  }

  return `<div class="card empty" style="margin-top:20px;">
    <span class="ball-icon">🏐</span>
    <div style="font-weight:700;font-size:16px;color:var(--heading);margin:10px 0 8px;">💳 Pagamento das diárias</div>
    <div class="sub" style="font-family:'DM Mono',monospace;margin-bottom:8px;">#${escapeHtml(state.codigo||"—")}</div>
    <div style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px;">
      ${pg.dias} diária${pg.dias>1?"s":""} (${formatarDataBR(state.dataInicio)} – ${formatarDataBR(state.dataFim)}) = <b>R$ ${pg.valor.toFixed(2).replace(".", ",")}</b>
    </div>
    ${pg.qrCodeBase64 ? `<img src="data:image/png;base64,${pg.qrCodeBase64}" alt="QR Code Pix" style="width:220px;height:220px;margin:0 auto 14px;display:block;border-radius:10px;border:1px solid var(--border);">` : ""}
    <label style="font-size:12px;font-weight:600;color:var(--heading);display:block;margin-bottom:6px;">Pix copia e cola</label>

    <button class="btn secondary" id="btn-copiar-pix" style="margin-bottom:8px;">Copiar código</button>
    <button class="btn ghost" id="btn-verificar-pix">Já paguei, verificar</button>
    <div class="sub" style="margin-top:12px;">Assim que o pagamento cair, o campeonato é liberado automaticamente — mas fique à vontade pra checar aqui também.</div>
  </div>`;
}

// Mesmo cálculo de dias do worker.ts, usado aqui só pra mostrar uma prévia do valor antes
// de gerar o Pix (o valor final de verdade é sempre recalculado e travado no servidor).
function calcularDiasLocal(dataInicio, dataFim){
  if(!dataInicio || !dataFim) return 0;
  const ini = new Date(dataInicio+"T00:00:00Z").getTime();
  const fim = new Date(dataFim+"T00:00:00Z").getTime();
  if(isNaN(ini) || isNaN(fim) || fim<ini) return 0;
  return Math.round((fim-ini)/86400000) + 1;
}
// Mesmo cálculo do worker.ts (calcularValorComCupom) — desconto sobre o subtotal automático,
// nunca sobre um valorOverride manual do admin (esse já é a palavra final).
function calcularValorComCupomLocal(dias, cupomAplicado){
  const subtotal = dias*valorDiariaCache;
  const desconto = cupomAplicado?.percentual ? subtotal*(cupomAplicado.percentual/100) : 0;
  return Math.max(0, subtotal-desconto);
}
