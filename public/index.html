<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Futevôlei — Campeonato</title>
<meta name="theme-color" content="#0B3C49">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="icon" href="./icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@500&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sand:#EDE3CC;
    --sand-dark:#C9B896;
    --ocean:#0E7C7B;
    --ocean-deep:#0B3C49;
    --coral:#F2652A;
    --grass:#4C9A64;
    --white:#FFFCF6;
    --ink:#0B3C49;
    --muted:#6B7C7A;
    --radius:16px;
    --shadow: 0 10px 24px -12px rgba(11,60,73,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Work Sans',sans-serif;
    background: var(--sand);
    color: var(--ink);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .stage{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
  }
  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--white);
    position:relative;
    box-shadow: var(--shadow);
    display:flex;
    flex-direction:column;
  }
  @media (min-width:481px){
    body{padding:24px 0;}
    .app{min-height:calc(100vh - 48px); border-radius:28px; overflow:hidden;}
  }

  /* ---------- Header ---------- */
  header{
    background: linear-gradient(160deg, var(--ocean) 0%, var(--ocean-deep) 100%);
    color:var(--white);
    padding:22px 20px 26px;
    position:relative;
    overflow:hidden;
  }
  header .eyebrow{
    font-family:'DM Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    opacity:.75;
  }
  header h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:34px;
    letter-spacing:.03em;
    margin:2px 0 0;
    line-height:1;
  }
  .net-divider{
    display:flex;
    align-items:center;
    gap:6px;
    margin:14px 0 0;
  }
  .net-divider .pole{width:3px;height:16px;background:rgba(255,255,255,.55);border-radius:1px;}
  .net-divider .dashes{
    flex:1;
    height:0;
    border-top:3px dashed rgba(255,255,255,.55);
  }
  .net-divider .ball{
    width:10px;height:10px;border-radius:50%;background:var(--coral);
    box-shadow:0 0 0 2px rgba(255,255,255,.7);
  }

  /* ---------- Content ---------- */
  main{
    flex:1;
    padding:18px 18px 90px;
  }
  .section-title{
    font-family:'Bebas Neue',sans-serif;
    font-size:20px;
    letter-spacing:.02em;
    color:var(--ocean-deep);
    margin:0 0 4px;
  }
  .section-sub{
    font-size:12.5px;
    color:var(--muted);
    margin:0 0 14px;
    line-height:1.4;
  }

  /* ---------- Cards ---------- */
  .card{
    background:var(--white);
    border:1px solid #EDE7D8;
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:12px;
  }
  .stat-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:14px;
  }
  .stat{
    border-radius:var(--radius);
    padding:14px;
    color:var(--white);
    position:relative;
    overflow:hidden;
  }
  .stat.ocean{background:linear-gradient(150deg,var(--ocean),var(--ocean-deep));}
  .stat.coral{background:linear-gradient(150deg,var(--coral),#C94A16);}
  .stat.grass{background:linear-gradient(150deg,var(--grass),#2E6E42);}
  .stat.ink{background:linear-gradient(150deg,#33424A,var(--ocean-deep));}
  .stat .num{
    font-family:'DM Mono',monospace;
    font-size:22px;
    font-weight:500;
    display:block;
  }
  .stat .lbl{
    font-size:10.5px;
    letter-spacing:.06em;
    text-transform:uppercase;
    opacity:.85;
  }

  /* ---------- Duplas / Sorteio ---------- */
  .dupla-row{
    display:flex;align-items:center;gap:10px;margin-bottom:8px;
  }
  .dupla-row .num{
    font-family:'DM Mono',monospace;
    width:22px;text-align:center;color:var(--muted);font-size:13px;
  }
  .dupla-card{
    border:1.5px solid var(--sand-dark);border-radius:12px;
    padding:10px 12px;margin-bottom:10px;background:var(--white);
  }
  .dupla-card .top-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .tel-row{display:flex;gap:8px;}
  .tel-row input{font-family:'DM Mono',monospace;font-size:12.5px;}
  .tel-row input::placeholder{font-family:'Work Sans',sans-serif;}
  .whats-list .dupla-card{padding:12px 14px;}
  .whats-list .g-name{font-weight:700;font-size:14px;margin-bottom:2px;}
  .whats-list .g-matches{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;}
  .msg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .msg-block{display:flex;flex-direction:column;gap:6px;}
  .btn-send{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    background:var(--coral);color:#fff;border:none;border-radius:10px;
    font-family:'Work Sans',sans-serif;font-weight:600;font-size:12.5px;
    padding:10px 8px;text-decoration:none;cursor:pointer;text-align:center;
  }
  .btn-send.disabled{background:var(--sand-dark);color:var(--muted);pointer-events:none;}
  .tg-status{
    font-size:10.5px;font-weight:700;text-align:center;border-radius:8px;padding:5px 6px;
  }
  .tg-status.ok{background:#E3F4FC;color:#0E7FB8;}
  .tg-status.pending{background:#FDF1E7;color:var(--coral);}
  .tg-settings{margin-bottom:14px;}
  .tg-settings label{font-size:12px;font-weight:600;color:var(--ocean-deep);display:block;margin-bottom:6px;}
  .tg-settings .hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4;}
  .bulk-row{display:flex;gap:8px;margin-bottom:14px;}
  .copy-note{
    font-size:11px;color:var(--muted);text-align:center;margin-top:2px;opacity:0;transition:opacity .2s;
  }
  .copy-note.show{opacity:1;}
  input[type=text]{
    flex:1;
    border:1.5px solid var(--sand-dark);
    border-radius:10px;
    padding:9px 12px;
    font-size:14px;
    font-family:'Work Sans',sans-serif;
    color:var(--ink);
    background:var(--white);
  }
  input[type=text]:focus{outline:none;border-color:var(--ocean);}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--coral);color:var(--white);border:none;
    font-family:'Work Sans',sans-serif;font-weight:600;font-size:14px;
    padding:13px 18px;border-radius:12px;width:100%;cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 8px 18px -8px rgba(242,101,42,.6);
  }
  .btn:active{transform:scale(.97);}
  .btn.secondary{
    background:transparent;color:var(--ocean-deep);
    border:1.5px solid var(--sand-dark);box-shadow:none;
  }
  .btn.ghost{background:transparent;color:var(--muted);box-shadow:none;font-weight:500;}

  .group-card{
    border-radius:var(--radius);
    border:1px solid #EDE7D8;
    margin-bottom:10px;
    overflow:hidden;
  }
  .group-head{
    background:var(--ocean-deep);color:var(--white);
    font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.04em;
    padding:8px 14px;
  }
  .group-body{padding:10px 14px;}
  .group-body .name{
    display:flex;align-items:center;gap:8px;padding:6px 0;font-size:14px;font-weight:500;
  }
  .group-body .name .dot{width:7px;height:7px;border-radius:50%;background:var(--coral);flex-shrink:0;}

  /* ---------- Tabs filter ---------- */
  .chip-row{display:flex;gap:8px;margin-bottom:14px;}
  .chip{
    font-size:12px;font-weight:600;padding:7px 13px;border-radius:20px;
    border:1.5px solid var(--sand-dark);color:var(--muted);cursor:pointer;
    font-family:'Work Sans',sans-serif;
  }
  .chip.active{background:var(--ocean-deep);color:var(--white);border-color:var(--ocean-deep);}

  /* ---------- Match rows ---------- */
  .match{
    display:flex;align-items:center;gap:8px;
    padding:10px 0;border-bottom:1px solid #F1ECDD;
  }
  .match:last-child{border-bottom:none;}
  .match .team{
    flex:1;font-size:13.5px;font-weight:500;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .match .team.win{color:var(--grass);font-weight:700;}
  .score-input{
    width:40px;text-align:center;border:1.5px solid var(--sand-dark);
    border-radius:8px;padding:7px 2px;font-family:'DM Mono',monospace;font-size:14px;
    color:var(--ink);background:var(--sand);
  }
  .score-input:focus{outline:none;border-color:var(--coral);background:var(--white);}
  .match .x{font-family:'DM Mono',monospace;color:var(--muted);font-size:12px;}
  .group-tag{
    font-family:'DM Mono',monospace;font-size:10px;color:var(--white);
    background:var(--ocean);border-radius:6px;padding:2px 6px;flex-shrink:0;
  }

  /* ---------- Standings table ---------- */
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th{
    font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;
    color:var(--muted);text-align:center;padding:6px 3px;letter-spacing:.03em;
  }
  th.name-col, td.name-col{text-align:left;}
  td{padding:7px 3px;text-align:center;border-top:1px solid #F1ECDD;}
  tr.qualified td{background:#EAF4EE;font-weight:600;}
  tr.qualified td.pos{color:var(--grass);}
  td.pos{font-family:'DM Mono',monospace;font-weight:700;}

  /* ---------- Bracket ---------- */
  .round-label{
    font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;
    letter-spacing:.08em;color:var(--ocean);margin:18px 0 8px;
  }
  .round-label:first-child{margin-top:0;}
  .bracket-match{
    background:var(--white);border:1px solid #EDE7D8;border-radius:12px;
    padding:10px 12px;margin-bottom:10px;
  }
  .bracket-match .lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:6px;}
  .bracket-row{display:flex;align-items:center;gap:8px;padding:4px 0;}
  .bracket-row .team{flex:1;font-size:13.5px;font-weight:500;}
  .bracket-row .team.win{color:var(--grass);font-weight:700;}
  .bracket-row .team.tbd{color:var(--muted);font-style:italic;font-weight:400;}

  .champion-banner{
    background:linear-gradient(150deg,var(--coral),#C94A16);
    color:var(--white);border-radius:var(--radius);
    padding:22px 16px;text-align:center;margin-bottom:16px;
  }
  .champion-banner .eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.85;}
  .champion-banner .name{font-family:'Bebas Neue',sans-serif;font-size:30px;margin-top:4px;}

  .empty{
    text-align:center;padding:30px 10px;color:var(--muted);font-size:13.5px;
  }
  .empty .ball-icon{font-size:30px;display:block;margin-bottom:8px;}

  /* ---------- Bottom nav ---------- */
  nav.tabbar{
    position:sticky;bottom:0;left:0;right:0;
    background:var(--white);border-top:1px solid #EDE7D8;
    display:flex;justify-content:space-around;
    padding:8px 4px calc(8px + env(safe-area-inset-bottom));
    z-index:10;
  }
  nav.tabbar button{
    flex:1;background:none;border:none;display:flex;flex-direction:column;
    align-items:center;gap:3px;padding:6px 2px;cursor:pointer;color:var(--muted);
    font-family:'Work Sans',sans-serif;
  }
  nav.tabbar button svg{width:20px;height:20px;}
  nav.tabbar button .lbl{font-size:10px;font-weight:600;}
  nav.tabbar button.active{color:var(--coral);}
  nav.tabbar button{position:relative;}
  .nav-badge{
    position:absolute;top:2px;right:calc(50% - 22px);
    background:var(--coral);color:#fff;font-family:'DM Mono',monospace;
    font-size:9.5px;font-weight:700;min-width:16px;height:16px;border-radius:8px;
    display:none;align-items:center;justify-content:center;padding:0 3px;
    box-shadow:0 0 0 2px var(--white);
  }
  .nav-badge.show{display:flex;}

  .toast{
    position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(10px);
    background:var(--ocean-deep);color:var(--white);padding:10px 16px;border-radius:10px;
    font-size:13px;opacity:0;transition:opacity .25s, transform .25s;pointer-events:none;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .tiebreak-note{
    font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4;
  }

  /* ---------- Login / Torneios ---------- */
  .login-wrap{
    min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:20px 10px;
  }
  .login-wrap .ball-big{font-size:56px;margin-bottom:10px;}
  .login-wrap h2{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--ocean-deep);margin:0 0 8px;}
  .login-wrap p{font-size:13px;color:var(--muted);margin:0 0 22px;max-width:320px;line-height:1.5;}
  #google-signin-btn{display:flex;justify-content:center;}
  .gcid-box{width:100%;max-width:320px;text-align:left;}
  .gcid-box label{font-size:12px;font-weight:600;color:var(--ocean-deep);display:block;margin-bottom:6px;}
  .gcid-box .hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.4;text-align:left;}

  .torneio-bar{
    display:flex;align-items:center;gap:8px;margin-top:8px;
    font-size:12px;color:rgba(255,255,255,.85);
  }
  .torneio-bar .voltar{
    background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;
    padding:5px 10px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:'Work Sans',sans-serif;
  }
  .user-chip{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .user-chip img{width:42px;height:42px;border-radius:50%;}
  .user-chip .name{font-weight:700;font-size:14px;color:var(--ocean-deep);}
  .user-chip .email{font-size:11px;color:var(--muted);}
  .torneio-item{
    border:1.5px solid var(--sand-dark);border-radius:12px;padding:12px 14px;margin-bottom:10px;
    cursor:pointer;background:var(--white);
  }
  .torneio-item .row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .torneio-item .nome{font-weight:700;font-size:14.5px;color:var(--ocean-deep);}
  .torneio-item .sub{font-size:11px;color:var(--muted);margin-top:4px;}
  .status-pill{
    font-size:10.5px;font-weight:700;border-radius:20px;padding:4px 10px;white-space:nowrap;flex-shrink:0;
  }
  .status-pill.criado{background:#E3F4FC;color:#0E7FB8;}
  .status-pill.andamento{background:#FDF1E7;color:var(--coral);}
  .status-pill.finalizado{background:#E2EFDA;color:var(--grass);}
  .btn-excluir{
    background:none;border:none;color:#C0392B;font-size:11px;font-weight:600;
    font-family:'Work Sans',sans-serif;cursor:pointer;padding:4px 6px;flex-shrink:0;
  }

  /* ---------- Ações de arbitragem (mini botões sob cada jogo) ---------- */
  .ref-actions-row{display:flex;gap:8px;padding:0 2px 10px;margin-top:-2px;}
  .ref-mini-btn{
    flex:1;border:none;border-radius:9px;padding:7px 6px;font-size:11.5px;font-weight:700;
    font-family:'Work Sans',sans-serif;cursor:pointer;background:var(--ocean-deep);color:var(--white);
  }
  .ref-mini-btn.ghost{background:var(--sand);color:var(--ocean-deep);border:1px solid var(--sand-dark);}
  .ref-mini-btn:active{transform:scale(.96);}

  /* ---------- Tela do juiz (Apitar jogo) ---------- */
  .ref-screen{
    position:fixed;inset:0;background:var(--ocean-deep);color:var(--white);z-index:200;
    display:flex;flex-direction:column;align-items:center;padding:18px 18px 30px;
    font-family:'Work Sans',sans-serif;overflow-y:auto;
  }
  .ref-top{width:100%;max-width:420px;display:flex;align-items:center;gap:12px;margin-bottom:6px;}
  .ref-close{
    width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,.12);
    color:var(--white);font-size:16px;cursor:pointer;flex-shrink:0;
  }
  .ref-label{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:.02em;opacity:.9;}
  .ref-timer-box{text-align:center;margin:14px 0 6px;}
  .ref-timer{font-family:'DM Mono',monospace;font-size:46px;font-weight:600;letter-spacing:.02em;}
  .status-tecnico .ref-timer{color:var(--coral);}
  .status-finalizada .ref-timer{color:var(--grass);}
  .ref-timer-status{font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;opacity:.75;margin-top:2px;}
  .ref-board{
    display:flex;align-items:center;justify-content:center;gap:14px;
    width:100%;max-width:420px;margin:14px 0 6px;
  }
  .ref-team-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;background:rgba(255,255,255,.06);border-radius:20px;padding:14px 8px 16px;}
  .ref-vs{font-family:'Bebas Neue',sans-serif;font-size:20px;opacity:.6;}
  .ref-score-btn{
    width:56px;height:44px;border-radius:12px;border:none;font-size:24px;font-weight:700;
    cursor:pointer;color:var(--ocean-deep);
  }
  .ref-score-btn.plus{background:var(--grass);color:var(--white);}
  .ref-score-btn.minus{background:rgba(255,255,255,.85);}
  .ref-score-btn:active{transform:scale(.94);}
  .ref-score-btn:disabled{opacity:.35;pointer-events:none;}
  .ref-score-num{font-family:'DM Mono',monospace;font-size:52px;font-weight:600;line-height:1;}
  .ref-team-nome{font-size:13px;font-weight:600;text-align:center;max-width:110px;}
  .ref-actions{width:100%;max-width:420px;display:flex;flex-direction:column;gap:10px;margin-top:16px;}
  .ref-actions .btn{margin:0;}
  .ref-btn-fim{border:1.5px solid var(--coral)!important;color:var(--coral)!important;}
  .ref-final-msg{
    background:rgba(255,255,255,.1);border-radius:12px;padding:12px;text-align:center;
    font-size:13.5px;font-weight:600;
  }
  .ref-tv-link{
    margin-top:18px;background:none;border:none;color:rgba(255,255,255,.75);font-size:12.5px;
    text-decoration:underline;cursor:pointer;font-family:'Work Sans',sans-serif;
  }

  /* ---------- Popup de troca de lado ---------- */
  .popup-troca{
    position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;
    background:rgba(11,60,73,.55);opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .popup-troca.show{opacity:1;pointer-events:auto;}
  .popup-troca-inner{
    background:var(--white);color:var(--ink);border-radius:20px;padding:26px 24px;text-align:center;
    max-width:280px;box-shadow:var(--shadow);
  }
  .popup-troca-icon{font-size:38px;margin-bottom:8px;}
  .popup-troca-msg{font-family:'Bebas Neue',sans-serif;font-size:20px;margin-bottom:16px;}
  .popup-troca-ok{
    background:var(--coral);color:var(--white);border:none;border-radius:10px;
    padding:9px 26px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:'Work Sans',sans-serif;
  }

  /* ---------- Placar para TV ---------- */
  .tv-screen{
    position:fixed;inset:0;background:var(--ocean-deep);color:var(--white);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Work Sans',sans-serif;text-align:center;padding:30px;
  }
  .tv-loading{font-size:22px;opacity:.8;}
  .tv-label{
    font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,4vw,44px);letter-spacing:.03em;
    opacity:.85;margin-bottom:4vh;
  }
  .tv-board{display:flex;align-items:center;justify-content:center;gap:6vw;width:100%;}
  .tv-team{flex:1;max-width:38%;}
  .tv-team-nome{
    font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,3.4vw,40px);letter-spacing:.02em;
    margin-bottom:2vh;word-break:break-word;
  }
  .tv-score{font-family:'DM Mono',monospace;font-weight:700;font-size:clamp(70px,14vw,180px);line-height:1;}
  .tv-x{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,4vw,50px);opacity:.5;}
  .tv-footer{margin-top:6vh;}
  .tv-timer{font-family:'DM Mono',monospace;font-size:clamp(30px,5vw,60px);font-weight:600;}
  .tv-status{font-size:clamp(14px,2vw,20px);letter-spacing:.08em;text-transform:uppercase;opacity:.75;margin-top:6px;}
</style>
</head>
<body>
<div class="stage">
  <div class="app">
    <header>
      <div class="eyebrow">Beach Sports Club</div>
      <h1>Futevôlei</h1>
      <div id="torneio-bar"></div>
      <div class="net-divider"><span class="pole"></span><span class="dashes"></span><span class="ball"></span><span class="dashes"></span><span class="pole"></span></div>
    </header>
    <main id="main"></main>
    <div class="toast" id="toast"></div>
    <nav class="tabbar">
      <button data-tab="resumo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg><span class="lbl">Resumo</span></button>
      <button data-tab="sorteio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M8 9h.01M16 9h.01M8 15l4-3 4 3"/></svg><span class="lbl">Duplas</span></button>
      <button data-tab="jogos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg><span class="lbl">Jogos</span></button>
      <button data-tab="classificacao"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V10M12 19V4M20 19v-6"/></svg><span class="lbl">Tabela</span></button>
      <button data-tab="matamata"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5h4v4H4zM4 15h4v4H4zM16 10h4v4h-4zM8 7h4v0M8 17h4v0M12 7v6M12 13v4M12 12h4"/></svg><span class="lbl">Mata-mata</span><span class="nav-badge" id="nav-badge-matamata"></span></button>
    </nav>
  </div>
</div>

<script>
/* ============================================================
   ESTADO
============================================================ */
const STORAGE_KEY = "futevolei_state_v1";

function defaultState(){
  return {
    tab: "resumo",
    duplas: Array.from({length:6}, (_,i)=>({nome:`Dupla ${i+1}`, tel1:"", tel2:"", nomeDefault:true})),
    formato: "grupos", // "grupos" | "eliminacao" — escolhido antes do sorteio
    numGrupos: 4, // (formato "grupos") quantidade de grupos, deve dividir a qtde de duplas igualmente
    elimTarget: 4, // (formato "eliminacao") quantidade de duplas que avançam pro mata-mata (potência de 2)
    drawn: false,
    groups: [], // [[nomes do grupo 0], [grupo 1], ...] — quantidade e tamanho dinâmicos
    groupMatches: [], // {group,jogo,a,b,pa,pb}
    elimRodadas: [], // (formato "eliminacao") [{matches:[{a,b,pa,pb}], bye:nome|null}, ...]
    bracketSeed: null, // (formato "eliminacao") lista fixa de classificados (com folgas=null) que abre a 1ª rodada do mata-mata
    bracket: [], // [[{pa,pb}, ...], [...], ...] — cada posição é uma rodada do mata-mata (tamanho = log2(qualificados))
    terceiro: {pa:null,pb:null},
    terceiroLugar: false,
    filter: "todos",
    tournamentId: null,
    telegramBot: "",
    elimNotified: {},
    cloudId: null,
    cloudNome: "",
    arbitragem: {}, // {[matchId]: {status, placarA, placarB, acumuladoMs, inicioMs, ultimoMultiploTroca, duracaoFinalSegundos}}
    apitoMatchId: null
  };
}

/* Compatibilidade: torneios salvos antes desta versão tinham "elim.qf/sf/final" fixos
   (sempre 4 grupos -> 8 qualificados). Se detectarmos esse formato antigo e ainda
   não existir um "bracket" novo, convertemos automaticamente, sem perder resultados. */
function migrarBracketAntigo(s){
  if(s && s.elim && (!s.bracket || !s.bracket.length) && Array.isArray(s.elim.qf)){
    s.numGrupos = s.numGrupos || 4;
    s.bracket = [
      s.elim.qf.map(m=>({pa:m.pa, pb:m.pb})),
      s.elim.sf.map(m=>({pa:m.pa, pb:m.pb})),
      [{pa:s.elim.final.pa, pb:s.elim.final.pb}]
    ];
    if(!s.terceiro || (s.terceiro.pa==null && s.terceiro.pb==null)){
      s.terceiro = { pa: s.elim.terceiro?.pa ?? null, pb: s.elim.terceiro?.pb ?? null };
    }
  }
  return s;
}

let state = load();
const AUTH_KEY = "futevolei_auth_v1";
function loadAuth(){
  try{ return JSON.parse(localStorage.getItem(AUTH_KEY)); }catch(e){ return null; }
}
let auth = loadAuth();

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return migrarBracketAntigo(Object.assign(defaultState(), parsed));
  }catch(e){ return defaultState(); }
}
function save(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if(auth) syncTorneio();
}

if(!state.tournamentId){
  state.tournamentId = Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-4);
  save();
}
let telegramStatus = {};

/* ============================================================
   AUTENTICAÇÃO (Google) E TORNEIOS NA NUVEM
============================================================ */
const GCID_KEY = "futevolei_gclientid_v1";

function saveAuth(a){ localStorage.setItem(AUTH_KEY, JSON.stringify(a)); }

function loadClientId(){ return localStorage.getItem(GCID_KEY) || ""; }
function saveClientId(v){ localStorage.setItem(GCID_KEY, (v||"").trim()); }

function decodeJwt(token){
  try{
    const payload = token.split(".")[1];
    const b64 = payload.replace(/-/g,"+").replace(/_/g,"/");
    const json = decodeURIComponent(
      atob(b64).split("").map(c => "%" + ("00"+c.charCodeAt(0).toString(16)).slice(-2)).join("")
    );
    return JSON.parse(json);
  }catch(e){ return null; }
}

function handleGoogleCredential(response){
  const payload = decodeJwt(response.credential);
  if(!payload) return;
  auth = { email: payload.email, name: payload.name, picture: payload.picture };
  saveAuth(auth);
  render();
}

function initGoogleSignIn(){
  const clientId = loadClientId();
  const btnDiv = document.getElementById("google-signin-btn");
  if(!clientId || !btnDiv || !window.google || !google.accounts || !google.accounts.id) return;
  try{
    google.accounts.id.initialize({ client_id: clientId, callback: handleGoogleCredential });
    google.accounts.id.renderButton(btnDiv, { theme:"outline", size:"large", width: 280 });
  }catch(e){ /* client id inválido ou domínio não autorizado */ }
}

function logout(){
  auth = null;
  saveAuth(null);
  try{ if(window.google && google.accounts && google.accounts.id) google.accounts.id.disableAutoSelect(); }catch(e){}
  render();
}

function statusTorneio(){
  if(champion()) return "Finalizado";
  if(state.drawn) return "Em andamento";
  return "Criado";
}

let torneiosList = null;
let torneiosLoading = false;
let syncTimer = null;

const LOCAL_TORNEIOS_KEY = "futevolei_local_torneios_v1";
function getLocalTorneiosDB(){
  try{ return JSON.parse(localStorage.getItem(LOCAL_TORNEIOS_KEY)) || {}; }catch(e){ return {}; }
}
function setLocalTorneiosDB(db){ localStorage.setItem(LOCAL_TORNEIOS_KEY, JSON.stringify(db)); }

function saveTorneioLocalFallback(payload){
  const db = getLocalTorneiosDB();
  const id = payload.id || ("local-" + Math.random().toString(36).slice(2,10));
  const now = new Date().toISOString();
  const existing = db[id];
  const meta = {
    id, nome: payload.nome, status: payload.status,
    ownerEmail: payload.ownerEmail, ownerName: payload.ownerName,
    createdAt: existing?.createdAt || now, updatedAt: now
  };
  db[id] = { ...meta, state: payload.state };
  setLocalTorneiosDB(db);
  return meta;
}

function montarPayloadTorneio(){
  return {
    id: state.cloudId,
    nome: state.cloudNome || "Torneio sem nome",
    status: statusTorneio(),
    ownerEmail: auth.email,
    ownerName: auth.name,
    state
  };
}

async function enviarTorneioAgora(payload, keepalive){
  try{
    const res = await fetch("/api/torneios-save", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload),
      keepalive: !!keepalive
    });
    if(!res.ok) throw new Error("resposta não-ok");
    const data = await res.json();
    if(data.id && state.cloudId !== data.id){
      state.cloudId = data.id;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
  }catch(e){
    // Sem servidor de functions disponível (ex: hospedagem local simples) — usa reserva local
    const meta = saveTorneioLocalFallback(payload);
    if(state.cloudId !== meta.id){
      state.cloudId = meta.id;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
  }
}

function syncTorneio(){
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>{
    if(!auth) return;
    enviarTorneioAgora(montarPayloadTorneio(), false);
  }, 800);
}

// Envio de emergência: garante que a última alteração não fique só no aparelho
// se a página for fechada/minimizada antes do envio programado (800ms) terminar.
function flushSyncTorneio(){
  if(!syncTimer) return; // nada pendente
  clearTimeout(syncTimer);
  syncTimer = null;
  if(!auth || !state.cloudId) return;
  enviarTorneioAgora(montarPayloadTorneio(), true);
}
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "hidden") flushSyncTorneio();
});
window.addEventListener("pagehide", flushSyncTorneio);

async function fetchTorneiosList(){
  if(torneiosLoading) return;
  torneiosLoading = true;
  try{
    const res = await fetch("/api/torneios-list", { cache: "no-store" });
    if(!res.ok) throw new Error("resposta não-ok");
    const data = await res.json();
    torneiosList = data.torneios || [];
  }catch(e){
    const db = getLocalTorneiosDB();
    torneiosList = Object.values(db).map(t=>({
      id:t.id, nome:t.nome, status:t.status, ownerEmail:t.ownerEmail, ownerName:t.ownerName, updatedAt:t.updatedAt
    }));
  }
  torneiosLoading = false;
  render();
}

async function criarNovoTorneio(){
  const nome = (prompt("Nome do torneio:", "Campeonato de Futevôlei") || "").trim();
  if(!nome) return;
  state = defaultState();
  state.tournamentId = Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-4);
  state.cloudNome = nome;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  showToast("Criando torneio...");
  try{
    const res = await fetch("/api/torneios-save", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ id:null, nome, status:"Criado", ownerEmail:auth.email, ownerName:auth.name, state })
    });
    if(!res.ok) throw new Error("resposta não-ok");
    const data = await res.json();
    if(data.id){ state.cloudId = data.id; localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  }catch(e){
    const meta = saveTorneioLocalFallback({ id:null, nome, status:"Criado", ownerEmail:auth.email, ownerName:auth.name, state });
    state.cloudId = meta.id;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    showToast("Sem conexão com a nuvem — torneio salvo só neste navegador.");
  }
  torneiosList = null;
  render();
}

async function abrirTorneio(id){
  showToast("Carregando torneio...");
  try{
    const res = await fetch(`/api/torneios-get?id=${encodeURIComponent(id)}`, { cache: "no-store" });
    if(!res.ok) throw new Error("resposta não-ok");
    const data = await res.json();
    if(!data || !data.state) throw new Error("sem dados");
    abrirTorneioComDados(data);
  }catch(e){
    const db = getLocalTorneiosDB();
    const local = db[id];
    if(local && local.state){
      abrirTorneioComDados(local);
    } else {
      showToast("Não foi possível carregar esse torneio.");
    }
  }
}

function abrirTorneioComDados(data){
  state = migrarBracketAntigo(Object.assign(defaultState(), data.state));
  state.cloudId = data.id;
  state.cloudNome = data.nome;
  state.tab = "resumo";
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  telegramStatus = {};
  render();
  if(state.drawn) refreshTelegramStatus();
  checkElimNotifications();
  showToast(`"${data.nome}" carregado!`);
}

// Busca a versão mais recente do torneio já aberto (usado ao carregar/recarregar a página,
// já que um F5 sozinho não ia até a nuvem — só reaproveitava o que já estava salvo neste navegador).
async function refreshTorneioAtual(){
  if(!auth || !state.cloudId) return;
  try{
    const res = await fetch(`/api/torneios-get?id=${encodeURIComponent(state.cloudId)}`, { cache:"no-store" });
    if(!res.ok) throw new Error("resposta não-ok");
    const data = await res.json();
    if(data && data.state){
      const tabAtual = state.tab;
      state = migrarBracketAntigo(Object.assign(defaultState(), data.state));
      state.cloudId = data.id;
      state.cloudNome = data.nome;
      state.tab = tabAtual;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      telegramStatus = {};
      render();
      if(state.drawn) refreshTelegramStatus();
      checkElimNotifications();
    }
  }catch(e){ /* sem conexão — mantém os dados locais que já tinha */ }
}

async function excluirTorneio(id, nome){
  if(!confirm(`Excluir o torneio "${nome}"? Essa ação não pode ser desfeita.`)) return;
  showToast("Excluindo torneio...");
  try{
    const res = await fetch("/api/torneios-delete", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ id })
    });
    if(!res.ok) throw new Error("resposta não-ok");
  }catch(e){
    // sem servidor de functions disponível — remove também da reserva local
  }
  const db = getLocalTorneiosDB();
  if(db[id]){ delete db[id]; setLocalTorneiosDB(db); }

  if(state.cloudId === id){
    state.cloudId = null;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
  torneiosList = null;
  showToast("Torneio excluído.");
  render();
}

function voltarParaTorneios(){
  state.cloudId = null;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  torneiosList = null;
  render();
}

async function migrarTorneioLocal(){
  const nome = (prompt("Nome para este torneio:", "Meu torneio") || "").trim();
  if(!nome) return;
  state.cloudNome = nome;
  showToast("Enviando torneio para a nuvem...");
  const payload = { id:null, nome, status: statusTorneio(), ownerEmail:auth.email, ownerName:auth.name, state };
  try{
    const res = await fetch("/api/torneios-save", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error("resposta não-ok");
    const data = await res.json();
    if(data.id){
      state.cloudId = data.id;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      torneiosList = null;
      showToast("Torneio adicionado!");
      render();
    }
  }catch(e){
    const meta = saveTorneioLocalFallback(payload);
    state.cloudId = meta.id;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    torneiosList = null;
    showToast("Sem conexão com a nuvem — torneio salvo só neste navegador.");
    render();
  }
}

/* ============================================================
   LÓGICA DO TORNEIO
============================================================ */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function groupLetters(n){
  const L = [];
  for(let i=0;i<n;i++) L.push(String.fromCharCode(65+i));
  return L;
}
function groupLettersState(){
  return groupLetters(state.numGrupos || 4);
}
// Quantidade de duplas que se qualificam pro mata-mata (1º e 2º de cada grupo)
function qualificadosCount(){
  return (state.numGrupos || 4) * 2;
}
function sortear(){
  if(state.formato==="eliminacao"){
    state.groups = [];
    state.groupMatches = [];
    state.elimRodadas = [];
    state.bracketSeed = null;
    state.bracket = [];
    state.terceiro = {pa:null, pb:null};
    state.drawn = true;
    sortearRodadaEliminacao();
    save();
    return;
  }
  const nomes = state.duplas.map(d => (d.nome||"").trim() || "Dupla sem nome");
  const numGrupos = state.numGrupos || 4;
  const tamanhoGrupo = nomes.length / numGrupos;
  const embaralhado = shuffle(nomes);
  const letters = groupLetters(numGrupos);
  const groups = [];
  for(let g=0; g<numGrupos; g++){
    groups.push(embaralhado.slice(g*tamanhoGrupo, (g+1)*tamanhoGrupo));
  }
  const groupMatches = [];
  groups.forEach((g, gi)=>{
    let jogoNum = 1;
    for(let x=0; x<g.length; x++){
      for(let y=x+1; y<g.length; y++){
        groupMatches.push({group:letters[gi], jogo:jogoNum++, a:g[x], b:g[y], pa:null, pb:null});
      }
    }
  });
  state.groups = groups;
  state.groupMatches = groupMatches;
  state.drawn = true;
  state.bracket = criarBracketVazio(qualificadosCount());
  state.terceiro = {pa:null, pb:null};
  save();
}
// Configuração de duplas/grupos (formato "grupos") é válida quando: nº de grupos é potência de 2
// (1,2,4,8,16...) — assim 2x essa quantidade de qualificados também é potência de 2, o que permite
// montar um chaveamento normal (mata-mata) — e a qtde de duplas é múltipla do nº de grupos, com
// pelo menos 3 duplas por grupo (para a fase de grupos fazer sentido).
// Já no formato "eliminacao", só validamos a quantidade de duplas que avançam pro mata-mata.
function configuracaoValida(){
  const n = state.duplas.length;
  if(state.formato==="eliminacao"){
    const t = state.elimTarget || 4;
    if(n < 3) return {ok:false, msg:"São necessárias pelo menos 3 duplas."};
    if(t<2 || (t & (t-1))!==0) return {ok:false, msg:"A quantidade de duplas que avançam pro mata-mata precisa ser uma potência de 2 (2, 4, 8...)."};
    if(t >= n) return {ok:false, msg:`Escolha um número de qualificados menor que o total de duplas (${n}).`};
    return {ok:true, msg:""};
  }
  const g = state.numGrupos || 4;
  if(g<1 || (g & (g-1))!==0) return {ok:false, msg:"A quantidade de grupos precisa ser uma potência de 2 (1, 2, 4, 8...)."};
  if(n % g !== 0) return {ok:false, msg:`${n} duplas não dividem igualmente em ${g} grupos. Ajuste a quantidade de duplas ou de grupos.`};
  const tamanho = n/g;
  if(tamanho < 3) return {ok:false, msg:`Cada grupo ficaria com só ${tamanho} dupla(s). São necessárias pelo menos 3 duplas por grupo.`};
  return {ok:true, msg:""};
}

/* ---------- Modo Eliminação: sorteio por rodadas, 2 derrotas = eliminada ---------- */
function duplasNomes(){
  return state.duplas.map(d => (d.nome||"").trim() || "Dupla sem nome");
}
// Nº de derrotas de cada dupla, somando todas as rodadas já sorteadas (derivado, sempre recalculado —
// se um placar for corrigido depois, a contagem se ajusta sozinha).
function elimPerdasPorDupla(){
  const perdas = {};
  state.elimRodadas.forEach(r=>{
    r.matches.forEach(m=>{
      const w = winner(m.a, m.b, m.pa, m.pb);
      if(!w) return;
      const loser = w===m.a ? m.b : m.a;
      perdas[loser] = (perdas[loser]||0) + 1;
    });
  });
  return perdas;
}
function elimPerdasDe(nome){ return elimPerdasPorDupla()[nome] || 0; }
function elimEliminada(nome){ return elimPerdasDe(nome) >= 2; }
// Nº de vitórias de cada dupla, somando todas as rodadas já sorteadas (mesmo princípio de elimPerdasPorDupla).
function elimVitoriasPorDupla(){
  const vitorias = {};
  state.elimRodadas.forEach(r=>{
    r.matches.forEach(m=>{
      const w = winner(m.a, m.b, m.pa, m.pb);
      if(w) vitorias[w] = (vitorias[w]||0) + 1;
    });
  });
  return vitorias;
}
// Duplas ainda vivas (0 ou 1 derrota) — são elas que entram no sorteio da próxima rodada
// e, quando atingirem a meta de qualificados, avançam direto pro mata-mata.
function elimVivas(){
  return duplasNomes().filter(n => !elimEliminada(n));
}
function elimRodadaAtual(){
  return state.elimRodadas[state.elimRodadas.length-1] || null;
}
function elimRodadaCompleta(rodada){
  if(!rodada) return true;
  return rodada.matches.every(m => m.pa!==null && m.pa!=="" && m.pb!==null && m.pb!=="");
}
// Sorteia uma nova rodada entre as duplas vivas, priorizando confrontos entre quem tem menos
// vitórias (ordena por vitórias, com desempate aleatório, e casa vizinhos dessa ordem). Se o nº
// de vivas for ímpar, a folga vai para quem tem MAIS vitórias entre os vivos — quem está indo
// melhor descansa, em vez de arriscar à toa.
function sortearRodadaEliminacao(){
  const vitorias = elimVitoriasPorDupla();
  const vivos = shuffle(elimVivas());
  vivos.sort((a,b)=> (vitorias[a]||0) - (vitorias[b]||0));
  let bye = null;
  if(vivos.length % 2 === 1) bye = vivos.pop(); // fica no fim da lista = quem tem mais vitórias
  const matches = [];
  for(let i=0;i<vivos.length;i+=2){
    matches.push({a:vivos[i], b:vivos[i+1], pa:null, pb:null});
  }
  state.elimRodadas.push({matches, bye});
  save();
}
// true quando a rodada mais recente já foi totalmente registrada E o nº de vivas já
// bateu (ou ficou abaixo d)a meta de qualificados — ou seja, dá para ir pro mata-mata.
function elimProntoParaMataMata(){
  const r = elimRodadaAtual();
  if(!r || !elimRodadaCompleta(r)) return false;
  return elimVivas().length <= (state.elimTarget||4);
}
function proximaPotenciaDeDois(n){
  let p = 1;
  while(p < n) p *= 2;
  return Math.max(1,p);
}
// Fecha a fase de eliminação e monta a 1ª rodada do mata-mata com quem sobrou vivo.
// Se a quantidade não for uma potência de 2 exata, completa com folgas (byes) distribuídas
// aleatoriamente, usando o motor de chaveamento genérico já existente.
function iniciarMataMataEliminacao(){
  const vivas = shuffle(elimVivas());
  const tamanhoBracket = proximaPotenciaDeDois(Math.max(2, vivas.length));
  const comFolgas = vivas.slice();
  while(comFolgas.length < tamanhoBracket) comFolgas.push(null);
  state.bracketSeed = shuffle(comFolgas);
  state.bracket = criarBracketVazio(tamanhoBracket);
  state.terceiro = {pa:null, pb:null};
  save();
}
function matamataPronto(){
  return state.formato==="eliminacao" ? !!(state.bracketSeed && state.bracketSeed.length) : allGroupsFilled();
}

function resetTudo(){
  state = defaultState();
  save();
}

function standingsFor(letter){
  const idx = groupLettersState().indexOf(letter);
  const nomes = state.groups[idx] || [];
  const rows = nomes.map(nome => ({nome, j:0, v:0, d:0, pp:0, pc:0}));
  state.groupMatches.filter(m=>m.group===letter).forEach(m=>{
    if(m.pa===null || m.pb===null || m.pa==="" || m.pb==="") return;
    const pa = Number(m.pa), pb = Number(m.pb);
    const ra = rows.find(r=>r.nome===m.a);
    const rb = rows.find(r=>r.nome===m.b);
    ra.j++; rb.j++;
    ra.pp += pa; ra.pc += pb;
    rb.pp += pb; rb.pc += pa;
    if(pa>pb){ra.v++; rb.d++;} else if(pb>pa){rb.v++; ra.d++;}
  });
  rows.forEach(r=>{ r.saldo = r.pp - r.pc; r.pts = r.v*3; });
  rows.sort((a,b)=> b.pts-a.pts || b.saldo-a.saldo || b.pp-a.pp);
  return rows;
}

function allGroupsFilled(){
  return state.drawn && state.groupMatches.length>0 &&
    state.groupMatches.every(m=> m.pa!==null && m.pb!==null && m.pa!=="" && m.pb!=="");
}

function winner(a,b,pa,pb){
  if(a==null && b==null) return null;
  if(a==null) return b; // folga (bye): b avança automaticamente, sem precisar jogar
  if(b==null) return a;
  if(pa===null||pb===null||pa===""||pb==="") return null;
  const na=Number(pa), nb=Number(pb);
  if(na>nb) return a; if(nb>na) return b; return null;
}

/* ---------- Chaveamento (mata-mata) genérico, com N rodadas dinâmicas ---------- */
function criarBracketVazio(qualificados){
  const rounds = Math.max(1, Math.round(Math.log2(qualificados)));
  const bracket = [];
  for(let r=0; r<rounds; r++){
    const nMatches = qualificados / Math.pow(2, r+1);
    bracket.push(Array.from({length:nMatches}, ()=>({pa:null, pb:null})));
  }
  return bracket;
}
function totalRoundsBracket(){
  return state.bracket.length;
}
// Times da rodada 0 (primeira rodada do mata-mata), a partir da classificação dos grupos,
// cruzando grupos dois a dois (1ºA×2ºB, 1ºB×2ºA, 1ºC×2ºD, 1ºD×2ºC, ...).
function primeiraRodadaTeams(){
  if(state.formato==="eliminacao"){
    const seed = state.bracketSeed || [];
    const teams = [];
    for(let i=0;i<seed.length;i+=2) teams.push([seed[i]??null, seed[i+1]??null]);
    return teams;
  }
  const letters = groupLettersState();
  const nMatches = state.bracket[0] ? state.bracket[0].length : 0;
  if(!allGroupsFilled()) return Array.from({length:nMatches}, ()=>[null,null]);
  const standings = letters.map(l=>standingsFor(l));
  if(letters.length===1){
    // Um único grupo: o 1º e o 2º colocados já disputam a rodada direto (geralmente a final).
    return [[standings[0][0]?.nome, standings[0][1]?.nome]];
  }
  const teams = [];
  for(let i=0; i<letters.length; i+=2){
    const A = standings[i], B = standings[i+1];
    teams.push([A[0]?.nome, B[1]?.nome]);
    teams.push([B[0]?.nome, A[1]?.nome]);
  }
  return teams;
}
function bracketTeamsForRound(r){
  if(r===0) return primeiraRodadaTeams();
  const prevTeams = bracketTeamsForRound(r-1);
  const prevRound = state.bracket[r-1] || [];
  const prevWinners = prevTeams.map((t,i)=> winner(t[0], t[1], prevRound[i]?.pa, prevRound[i]?.pb));
  const teams = [];
  for(let i=0; i<prevWinners.length; i+=2) teams.push([prevWinners[i], prevWinners[i+1]]);
  return teams;
}
function bracketWinnersForRound(r){
  const teams = bracketTeamsForRound(r);
  const round = state.bracket[r] || [];
  return teams.map((t,i)=> winner(t[0], t[1], round[i]?.pa, round[i]?.pb));
}
// Perdedores da semifinal (penúltima rodada) — usados na disputa de 3º/4º lugar
function semifinalLosers(){
  const rounds = totalRoundsBracket();
  if(rounds<2) return [null,null];
  const r = rounds-2;
  const teams = bracketTeamsForRound(r);
  const round = state.bracket[r] || [];
  const losers = teams.map((t,i)=>{
    const [a,b] = t;
    const w = winner(a,b,round[i]?.pa, round[i]?.pb);
    if(!w || !a || !b) return null;
    return w===a ? b : a;
  });
  return [losers[0] ?? null, losers[1] ?? null];
}
function terceiroWinner(){
  const [a,b] = semifinalLosers();
  return winner(a,b, state.terceiro.pa, state.terceiro.pb);
}
function champion(){
  const rounds = totalRoundsBracket();
  if(!rounds) return null;
  const w = bracketWinnersForRound(rounds-1);
  return w[0] || null;
}
function nomeRodada(r, totalRounds){
  const restantes = totalRounds - r; // 1 = final, 2 = semifinal, 3 = quartas...
  if(restantes===1) return "Final";
  if(restantes===2) return "Semifinal";
  if(restantes===3) return "Quartas de Final";
  if(restantes===4) return "Oitavas de Final";
  return `Rodada ${r+1}`;
}
function faseAtual(){
  if(champion()) return "Encerrado";
  if(state.formato==="eliminacao"){
    if(!state.drawn) return "Sorteio pendente";
    if(!matamataPronto()) return `Eliminação · Rodada ${state.elimRodadas.length}`;
  } else {
    if(!allGroupsFilled()) return state.drawn ? "Fase de Grupos" : "Sorteio pendente";
  }
  const rounds = totalRoundsBracket();
  for(let r=0; r<rounds; r++){
    const teams = bracketTeamsForRound(r);
    const round = state.bracket[r] || [];
    const pendente = teams.some((t,i)=> t[0] && t[1] && (round[i]?.pa==null || round[i]?.pa===""));
    const aguardando = teams.some(t=> !t[0] || !t[1]);
    if(aguardando) return nomeRodada(r, rounds) + " (aguardando classificados)";
    if(pendente) return nomeRodada(r, rounds);
  }
  return "Encerrado";
}

/* ---------- WhatsApp ---------- */
function matchesForDupla(nome){
  return state.groupMatches.filter(m => m.a===nome || m.b===nome);
}
function groupLetterForDupla(nome){
  const m = matchesForDupla(nome)[0];
  return m ? m.group : null;
}
function mensagemWhatsApp(nome){
  const matches = matchesForDupla(nome);
  const letter = groupLetterForDupla(nome);
  if(!matches.length) return "";
  const linhas = matches.map((m,idx)=>{
    const oponente = m.a===nome ? m.b : m.a;
    return `Jogo ${idx+1}: vs ${oponente}`;
  });
  return `Olá, dupla ${nome}! 🏐\n\nVocê está no Grupo ${letter} do Campeonato de Futevôlei.\n\nSeus jogos da fase de grupos:\n${linhas.join("\n")}\n\nBoa sorte! 🏆`;
}
function mensagemMataMata(faseLabel, nome, oponente){
  return `Olá, dupla ${nome}! 🏐\n\nSeu próximo jogo (${faseLabel}) já está definido:\nvs ${oponente}\n\nBoa sorte! 🏆`;
}
function duplaIndexByName(nome){
  return state.duplas.findIndex(d => ((d.nome||"").trim() || "Dupla sem nome") === nome);
}
function telefoneParaWa(tel){
  const digits = (tel||"").replace(/\D/g,"");
  if(!digits) return null;
  return digits.length <= 11 ? "55"+digits : digits;
}
function waLink(tel, msg){
  const phone = telefoneParaWa(tel);
  if(!phone) return null;
  return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
}

/* ============================================================
   ARBITRAGEM (JUIZ DE PARTIDA)
============================================================ */
function makeMatchId(round, idx){
  if(round==="terceiro") return "terceiro";
  if(typeof round==="string" && round.startsWith("e")) return `${round}_${idx}`;
  return `b${round}_${idx}`;
}
function matchIdIsElim(matchId){
  return !/^g\d+$/.test(matchId);
}
function getMatchObj(matchId){
  if(/^g\d+$/.test(matchId)) return state.groupMatches[Number(matchId.slice(1))];
  if(matchId==="terceiro") return state.terceiro;
  const me = matchId.match(/^e(\d+)_(\d+)$/);
  if(me) return state.elimRodadas[Number(me[1])].matches[Number(me[2])];
  const m = matchId.match(/^b(\d+)_(\d+)$/);
  if(m) return state.bracket[Number(m[1])][Number(m[2])];
  return null;
}
function getMatchTeams(matchId){
  if(/^g\d+$/.test(matchId)){ const mm = state.groupMatches[Number(matchId.slice(1))]; return [mm.a, mm.b]; }
  if(matchId==="terceiro") return semifinalLosers();
  const me = matchId.match(/^e(\d+)_(\d+)$/);
  if(me){ const mm = state.elimRodadas[Number(me[1])].matches[Number(me[2])]; return [mm.a, mm.b]; }
  const m = matchId.match(/^b(\d+)_(\d+)$/);
  if(m) return bracketTeamsForRound(Number(m[1]))[Number(m[2])];
  return [null,null];
}
function getMatchLabel(matchId){
  if(/^g\d+$/.test(matchId)){ const mm = state.groupMatches[Number(matchId.slice(1))]; return `Grupo ${mm.group} · Jogo ${mm.jogo}`; }
  if(matchId==="terceiro") return "Disputa de 3º e 4º Lugar";
  const me = matchId.match(/^e(\d+)_(\d+)$/);
  if(me) return `Rodada ${Number(me[1])+1} · Jogo ${Number(me[2])+1}`;
  const m = matchId.match(/^b(\d+)_(\d+)$/);
  if(m){
    const r = Number(m[1]), i = Number(m[2]);
    const rounds = totalRoundsBracket();
    const label = nomeRodada(r, rounds);
    const nMatches = state.bracket[r] ? state.bracket[r].length : 1;
    return nMatches>1 ? `${label} · ${i+1}` : label;
  }
  return "";
}
function getArb(matchId){
  if(!state.arbitragem) state.arbitragem = {};
  if(!state.arbitragem[matchId]){
    state.arbitragem[matchId] = {
      status: "nao_iniciada", // nao_iniciada | andamento | tecnico | finalizada
      placarA: 0,
      placarB: 0,
      acumuladoMs: 0,
      inicioMs: null,
      ultimoMultiploTroca: 0,
      duracaoFinalSegundos: null
    };
  }
  return state.arbitragem[matchId];
}
function tempoDecorridoMs(arb){
  return arb.acumuladoMs + (arb.inicioMs ? (Date.now() - arb.inicioMs) : 0);
}
function formatTempo(ms){
  const totalSec = Math.max(0, Math.floor(ms/1000));
  const m = Math.floor(totalSec/60), s = totalSec%60;
  return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}
function checkTrocaLado(arb){
  const soma = arb.placarA + arb.placarB;
  const multiploAtual = soma>0 ? Math.floor(soma/6)*6 : 0;
  let deveTrocar = false;
  if(multiploAtual>0 && multiploAtual>(arb.ultimoMultiploTroca||0)){
    arb.ultimoMultiploTroca = multiploAtual;
    deveTrocar = true;
  } else if(soma < (arb.ultimoMultiploTroca||0)){
    arb.ultimoMultiploTroca = multiploAtual;
  }
  return deveTrocar;
}
function arbSalvarAgora(){
  save();
  flushSyncTorneio();
}
function arbIniciar(matchId){
  const arb = getArb(matchId);
  if(arb.status!=="nao_iniciada") return;
  arb.inicioMs = Date.now();
  arb.status = "andamento";
  arbSalvarAgora();
  render();
}
function arbTempoTecnico(matchId){
  const arb = getArb(matchId);
  if(arb.status==="andamento"){
    arb.acumuladoMs += Date.now() - arb.inicioMs;
    arb.inicioMs = null;
    arb.status = "tecnico";
  } else if(arb.status==="tecnico"){
    arb.inicioMs = Date.now();
    arb.status = "andamento";
  } else {
    return;
  }
  arbSalvarAgora();
  render();
}
function arbFinalizar(matchId){
  const arb = getArb(matchId);
  if(arb.status!=="andamento" && arb.status!=="tecnico") return;
  if(arb.status==="andamento" && arb.inicioMs){
    arb.acumuladoMs += Date.now() - arb.inicioMs;
    arb.inicioMs = null;
  }
  arb.status = "finalizada";
  arb.duracaoFinalSegundos = Math.floor(arb.acumuladoMs/1000);
  const m = getMatchObj(matchId);
  if(m){ m.pa = arb.placarA; m.pb = arb.placarB; }
  arbSalvarAgora();
  render();
  checkElimNotifications();
  showToast("Partida finalizada e placar salvo!");
}
function arbReabrir(matchId){
  const arb = getArb(matchId);
  if(arb.status!=="finalizada") return;
  arb.status = "tecnico";
  arbSalvarAgora();
  render();
}
function arbPonto(matchId, lado, delta){
  const arb = getArb(matchId);
  if(arb.status==="finalizada") return;
  const campo = lado==="a" ? "placarA" : "placarB";
  arb[campo] = Math.max(0, arb[campo]+delta);
  const trocar = checkTrocaLado(arb);
  arbSalvarAgora();
  render();
  if(trocar) mostrarPopupTroca();
}
function mostrarPopupTroca(){
  const el = document.getElementById("popup-troca");
  if(!el) return;
  el.classList.add("show");
  clearTimeout(window.__popupTrocaTimer);
  window.__popupTrocaTimer = setTimeout(()=>{ el.classList.remove("show"); }, 4500);
}
function abrirApito(matchId){
  state.apitoMatchId = matchId;
  state.tab = "apito";
  save();
  render();
}
function fecharApito(){
  state.tab = matchIdIsElim(state.apitoMatchId) ? "matamata" : "jogos";
  save();
  render();
}
function abrirPlacarTV(matchId){
  if(!state.cloudId){ showToast("Salve o torneio na nuvem antes de abrir o placar para TV."); return; }
  const url = `${location.origin}${location.pathname}?placarTV=${encodeURIComponent(matchId)}&torneio=${encodeURIComponent(state.cloudId)}`;
  window.open(url, "_blank");
}
let refTickInterval = null;
function stopRefTick(){
  if(refTickInterval){ clearInterval(refTickInterval); refTickInterval = null; }
}
function iniciarRefTick(){
  stopRefTick();
  refTickInterval = setInterval(()=>{
    if(state.tab!=="apito"){ stopRefTick(); return; }
    const arb = getArb(state.apitoMatchId);
    if(arb.status!=="andamento") return;
    const el = document.getElementById("ref-timer-txt");
    if(el) el.textContent = formatTempo(tempoDecorridoMs(arb));
  }, 1000);
}

/* ---------- Telegram ---------- */
function codigoDupla(i, slot){
  return `${state.tournamentId}_${i}_${slot}`;
}
function telegramLink(i, slot){
  const bot = (state.telegramBot||"").trim().replace(/^@/,"");
  if(!bot) return null;
  return `https://t.me/${bot}?start=${codigoDupla(i, slot)}`;
}
async function refreshTelegramStatus(){
  if(!state.drawn) return;
  const codes = [];
  state.duplas.forEach((_,i)=>{ codes.push(codigoDupla(i,1), codigoDupla(i,2)); });
  try{
    const res = await fetch(`/api/telegram-status?codes=${encodeURIComponent(codes.join(","))}`, { cache: "no-store" });
    if(!res.ok) return;
    const data = await res.json();
    telegramStatus = data.status || {};
    render();
    checkElimNotifications();
  }catch(e){ /* função ainda não publicada ou sem conexão — ignora silenciosamente */ }
}
function itensTelegramDupla(i){
  const d = state.duplas[i];
  const nome = (d.nome||"").trim() || "Dupla sem nome";
  const msg = mensagemWhatsApp(nome);
  const items = [];
  if(d.tel1 && telegramStatus[codigoDupla(i,1)]) items.push({code: codigoDupla(i,1), message: msg});
  if(d.tel2 && telegramStatus[codigoDupla(i,2)]) items.push({code: codigoDupla(i,2), message: msg});
  return items;
}
async function enviarTelegramTodos(silent){
  const items = [];
  state.duplas.forEach((d,i)=>{ items.push(...itensTelegramDupla(i)); });
  if(!items.length){ if(!silent) showToast("Nenhuma dupla ativou o Telegram ainda."); return; }
  try{
    const res = await fetch("/api/telegram-send", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({items})
    });
    const data = await res.json();
    const okCount = (data.results||[]).filter(r=>r.ok).length;
    showToast(`${okCount} de ${items.length} enviadas pelo Telegram!`);
  }catch(e){ if(!silent) showToast("Erro ao enviar pelo Telegram."); }
}

/* ---------- Notificações automáticas do mata-mata ---------- */
function elimMatchList(){
  const list = [];
  if(state.formato==="eliminacao"){
    state.elimRodadas.forEach((r, ri)=>{
      const label = `Rodada ${ri+1}`;
      r.matches.forEach((m, idx)=>{
        list.push({round:`e${ri}`, idx, side:"a", faseLabel:label, nome:m.a, oponente:m.b});
        list.push({round:`e${ri}`, idx, side:"b", faseLabel:label, nome:m.b, oponente:m.a});
      });
    });
  }
  if(matamataPronto()){
    const rounds = totalRoundsBracket();
    for(let r=0; r<rounds; r++){
      const teams = bracketTeamsForRound(r);
      const label = nomeRodada(r, rounds);
      teams.forEach(([a,b],idx)=>{
        list.push({round:r, idx, side:"a", faseLabel:label, nome:a, oponente:b});
        list.push({round:r, idx, side:"b", faseLabel:label, nome:b, oponente:a});
      });
    }
    if(state.terceiroLugar){
      const [la,lb] = semifinalLosers();
      list.push({round:"terceiro", idx:0, side:"a", faseLabel:"Disputa de 3º Lugar", nome:la, oponente:lb});
      list.push({round:"terceiro", idx:0, side:"b", faseLabel:"Disputa de 3º Lugar", nome:lb, oponente:la});
    }
  }
  return list;
}
function checkElimNotifications(){
  let changed = false;
  elimMatchList().forEach(({round, idx, side, faseLabel, nome, oponente})=>{
    if(!nome || !oponente) return;
    const key = `${round}-${idx}-${side}`;
    const rec = (state.elimNotified[key] && state.elimNotified[key].nome===nome)
      ? state.elimNotified[key]
      : {nome, slot1:false, slot2:false};
    const i = duplaIndexByName(nome);
    if(i<0){ return; }
    const d = state.duplas[i];
    const msg = mensagemMataMata(faseLabel, nome, oponente);
    const pendentes = [];
    if(d.tel1 && telegramStatus[codigoDupla(i,1)] && !rec.slot1) pendentes.push({slot:1, code:codigoDupla(i,1), message:msg});
    if(d.tel2 && telegramStatus[codigoDupla(i,2)] && !rec.slot2) pendentes.push({slot:2, code:codigoDupla(i,2), message:msg});
    if(pendentes.length){
      enviarNotificacaoElim(key, rec, pendentes);
    } else if(!state.elimNotified[key] || state.elimNotified[key].nome!==nome){
      state.elimNotified[key] = rec;
      changed = true;
    }
  });
  if(changed) save();
}
async function enviarNotificacaoElim(key, rec, pendentes){
  try{
    const res = await fetch("/api/telegram-send", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({items: pendentes.map(p=>({code:p.code, message:p.message}))})
    });
    const data = await res.json();
    (data.results||[]).forEach((r,idx)=>{
      if(r.ok){
        const slot = pendentes[idx].slot;
        if(slot===1) rec.slot1 = true; else rec.slot2 = true;
      }
    });
  }catch(e){ /* tenta de novo na próxima checagem */ }
  state.elimNotified[key] = rec;
  save();
  render();
}
function limparPendenciasElim(){
  const pend = pendingElimMessages();
  pend.forEach(p=>{
    const rec = (state.elimNotified[p.key] && state.elimNotified[p.key].nome===p.nome)
      ? state.elimNotified[p.key]
      : {nome:p.nome, slot1:false, slot2:false};
    if(p.slot===1) rec.slot1 = true; else rec.slot2 = true;
    state.elimNotified[p.key] = rec;
  });
  save();
  render();
}

============================================================ */
const main = document.getElementById("main");

/* ---------- Story (imagem para compartilhar) ---------- */
function drawStoryCanvas(){
  const canvas = document.getElementById("story-canvas");
  if(!canvas) return;
  const neededH = renderStory(canvas, 1920);
  if(neededH > 1920){
    renderStory(canvas, Math.ceil(neededH/20)*20 + 20);
  }
}

function renderStory(canvas, H){
  canvas.height = H;
  const ctx = canvas.getContext("2d");
  const W = canvas.width;
  const OCEAN = "#0E7C7B", OCEAN_DEEP = "#0B3C49", SAND = "#EDE3CC", CORAL = "#F2652A", WHITE = "#FFFCF6", MUTED = "#6B7C7A";

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = SAND;
  ctx.fillRect(0,0,W,H);

  const headerH = 300;
  const grad = ctx.createLinearGradient(0,0,W,headerH);
  grad.addColorStop(0, OCEAN);
  grad.addColorStop(1, OCEAN_DEEP);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,headerH);

  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(255,255,255,.75)";
  ctx.font = "600 24px Arial, sans-serif";
  ctx.fillText("BEACH SPORTS CLUB", W/2, 90);

  ctx.fillStyle = WHITE;
  ctx.font = "bold 96px Arial, sans-serif";
  ctx.fillText("FUTEVÔLEI", W/2, 190);

  const netY = 250;
  ctx.strokeStyle = "rgba(255,255,255,.6)";
  ctx.lineWidth = 5;
  ctx.setLineDash([22,16]);
  ctx.beginPath();
  ctx.moveTo(140, netY);
  ctx.lineTo(W-140, netY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = CORAL;
  ctx.beginPath(); ctx.arc(W/2, netY, 18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = OCEAN_DEEP;
  ctx.fillRect(130, netY-36, 10, 72);
  ctx.fillRect(W-140, netY-36, 10, 72);

  let cursorY;
  if(!state.drawn){
    ctx.textAlign = "center";
    ctx.fillStyle = OCEAN_DEEP;
    ctx.font = "600 42px Arial, sans-serif";
    ctx.fillText("Sorteie as duplas para", W/2, headerH+180);
    ctx.fillText("gerar a imagem do campeonato", W/2, headerH+240);
    cursorY = headerH+300;
  } else if(state.formato==="eliminacao" && !matamataPronto()){
    ctx.textAlign = "center";
    ctx.fillStyle = OCEAN_DEEP;
    ctx.font = "600 42px Arial, sans-serif";
    ctx.fillText("Fase de eliminação", W/2, headerH+160);
    ctx.fillText(`Rodada ${state.elimRodadas.length} em andamento`, W/2, headerH+220);
    ctx.font = "600 30px Arial, sans-serif";
    ctx.fillStyle = MUTED;
    ctx.fillText(`${elimVivas().length} duplas seguem vivas`, W/2, headerH+280);
    cursorY = headerH+340;
  } else if(state.formato==="eliminacao"){
    cursorY = drawBracket(ctx, W, headerH+80);
  } else {
    const groupsBottom = drawGroupsSection(ctx, W, headerH+80);
    cursorY = drawBracket(ctx, W, groupsBottom+50);
  }

  ctx.textAlign = "center";
  ctx.fillStyle = MUTED;
  ctx.font = "32px Arial, sans-serif";
  ctx.fillText("Campeonato de Futevôlei", W/2, H-70);

  return cursorY + 140;
}

function drawGroupsSection(ctx, W, startY){
  const OCEAN_DEEP = "#0B3C49", MUTED = "#6B7C7A", WHITE = "#FFFCF6", LIGHTGREEN = "#DCEEE1";

  ctx.textAlign = "center";
  ctx.fillStyle = MUTED;
  ctx.font = "600 26px Arial, sans-serif";
  ctx.fillText("FASE DE GRUPOS", W/2, startY);

  const letters = groupLettersState();
  const cardW = 480, gap = 40;
  const margin = (W - (cardW*2+gap))/2;
  const rowGap = 30;
  const headerBarH = 42, rowH = 46;
  const cols = letters.length>1 ? 2 : 1;
  const linhas = Math.ceil(letters.length/cols);

  let maxBottom = startY + 36;
  for(let linha=0; linha<linhas; linha++){
    const rowLetters = letters.slice(linha*cols, linha*cols+cols);
    let alturaLinha = 0;
    rowLetters.forEach((letter, ci)=>{
      const tamanhoGrupo = (state.groups[letters.indexOf(letter)]||[]).length || 3;
      const cardH = headerBarH + rowH*tamanhoGrupo;
      alturaLinha = Math.max(alturaLinha, cardH);
      const x = cols===2 ? (margin + ci*(cardW+gap)) : (W-cardW)/2;
      const py = maxBottom;

      ctx.fillStyle = OCEAN_DEEP;
      roundRect(ctx, x, py, cardW, headerBarH, 8);
      ctx.fill();
      ctx.fillStyle = WHITE;
      ctx.font = "bold 23px Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("GRUPO " + letter, x+cardW/2, py+headerBarH/2+8);

      const rows = standingsFor(letter);
      rows.forEach((r,i)=>{
        const ry = py + headerBarH + i*rowH;
        ctx.fillStyle = i<2 ? LIGHTGREEN : WHITE;
        roundRect(ctx, x, ry+3, cardW, rowH-6, 6);
        ctx.fill();

        ctx.textAlign = "left";
        ctx.fillStyle = OCEAN_DEEP;
        ctx.font = (i<2 ? "bold " : "600 ") + "23px Arial, sans-serif";
        ctx.fillText(truncate(ctx, `${i+1}º  ${r.nome}`, cardW-110), x+16, ry+rowH/2+5);

        ctx.textAlign = "right";
        ctx.fillStyle = MUTED;
        ctx.font = "600 19px Arial, sans-serif";
        ctx.fillText(r.pts + " pts", x+cardW-16, ry+rowH/2+4);
      });
    });
    maxBottom += alturaLinha + rowGap;
  }

  return maxBottom - rowGap;
}

/* ---------- Chaveamento (bracket) ---------- */
function drawTeamBar(ctx, x, y, w, h, text, destaque){
  const WHITE = "#FFFCF6", GOLD_BG = "#FFF2D9", OCEAN_DEEP = "#0B3C49", CORAL = "#F2652A";
  ctx.fillStyle = destaque ? GOLD_BG : WHITE;
  roundRect(ctx, x, y, w, h, 10);
  ctx.fill();
  if(destaque){
    ctx.strokeStyle = CORAL;
    ctx.lineWidth = 3;
    roundRect(ctx, x+1.5, y+1.5, w-3, h-3, 9);
    ctx.stroke();
  }
  ctx.fillStyle = OCEAN_DEEP;
  ctx.font = (destaque ? "bold " : "600 ") + "27px Arial, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(truncate(ctx, text || "A definir", w-36), x+w/2, y+h/2+9);
}
function drawMatchBox(ctx, x, y, w, a, b, win, barH){
  barH = barH || 50;
  const gap = 5;
  drawTeamBar(ctx, x, y, w, barH, a, win && a===win);
  drawTeamBar(ctx, x, y+barH+gap, w, barH, b, win && b===win);
  return y + barH*2 + gap;
}
function elbowConnectorH(ctx, xLeft, xRight, y1, y2){
  const OCEAN_DEEP = "#0B3C49";
  const xMid = xLeft + (xRight-xLeft)*0.5;
  ctx.strokeStyle = OCEAN_DEEP;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(xLeft, y1); ctx.lineTo(xMid, y1);
  ctx.moveTo(xLeft, y2); ctx.lineTo(xMid, y2);
  ctx.moveTo(xMid, y1); ctx.lineTo(xMid, y2);
  ctx.moveTo(xMid, (y1+y2)/2); ctx.lineTo(xRight, (y1+y2)/2);
  ctx.stroke();
}

function drawBracket(ctx, W, startY){
  const OCEAN_DEEP = "#0B3C49", CORAL = "#F2652A", MUTED = "#6B7C7A";

  const colLabel = (text, cx, y)=>{
    ctx.textAlign = "center";
    ctx.fillStyle = MUTED;
    ctx.font = "600 25px Arial, sans-serif";
    ctx.fillText(text.toUpperCase(), cx, y);
  };

  const rounds = totalRoundsBracket();
  const teamsPorRodada = [];
  const vencedoresPorRodada = [];
  for(let r=0; r<rounds; r++){
    const teams = bracketTeamsForRound(r);
    teamsPorRodada.push(teams);
    vencedoresPorRodada.push(bracketWinnersForRound(r));
  }

  const margin = 30;
  const colW = 280, colGap = 90;
  const labelY = startY + 30;

  // Posições X de cada coluna (última coluna um pouco mais estreita, "Final")
  const colX = [];
  for(let r=0; r<rounds; r++) colX.push(margin + r*(colW+colGap));

  const nomesColuna = Array.from({length:rounds}, (_,r)=> nomeRodada(r, rounds));
  nomesColuna.forEach((nome, r)=> colLabel(nome, colX[r]+colW/2, labelY));

  // Primeira coluna: caixas empilhadas de cima a baixo
  const barH0 = 46, boxH0 = barH0*2+5, rowGap0 = 46;
  const top0 = labelY + 40;
  let centros = teamsPorRodada[0].map((t,i)=> top0 + i*(boxH0+rowGap0) + boxH0/2);
  const bottoms0 = teamsPorRodada[0].map((t,i)=>{
    const y = top0 + i*(boxH0+rowGap0);
    return drawMatchBox(ctx, colX[0], y, colW, t[0], t[1], vencedoresPorRodada[0][i], barH0);
  });

  let cursorY = Math.max(...bottoms0);

  // Colunas seguintes: cada caixa centrada entre o par de caixas anteriores
  for(let r=1; r<rounds; r++){
    const barH = 46 + r*6;
    const boxH = barH*2+5;
    const novosCentros = [];
    const bottoms = [];
    for(let i=0; i<teamsPorRodada[r].length; i++){
      const c = (centros[i*2] + centros[i*2+1]) / 2;
      const top = c - boxH/2;
      const [a,b] = teamsPorRodada[r][i];
      const bottom = drawMatchBox(ctx, colX[r], top, colW, a, b, vencedoresPorRodada[r][i], barH);
      novosCentros.push(c);
      bottoms.push(bottom);
      elbowConnectorH(ctx, colX[r-1]+colW, colX[r], centros[i*2], centros[i*2+1]);
    }
    centros = novosCentros;
    cursorY = Math.max(cursorY, ...bottoms);
  }

  cursorY += 80;
  const finalWin = champion();
  if(finalWin){
    ctx.textAlign = "center";
    ctx.fillStyle = CORAL;
    ctx.font = "600 30px Arial, sans-serif";
    ctx.fillText("🏆 CAMPEÃO DO TORNEIO", W/2, cursorY);
    cursorY += 66;
    ctx.fillStyle = OCEAN_DEEP;
    ctx.font = "bold 62px Arial, sans-serif";
    ctx.fillText(truncate(ctx, finalWin, W-160), W/2, cursorY);
  }

  if(state.terceiroLugar){
    const [la, lb] = semifinalLosers();
    const tWin = winner(la, lb, state.terceiro.pa, state.terceiro.pb);
    cursorY += 90;
    colLabel("3º e 4º lugar", W/2, cursorY-20);
    const terceiroW = 420, terceiroX = (W-terceiroW)/2;
    cursorY = drawMatchBox(ctx, terceiroX, cursorY, terceiroW, la, lb, tWin);
  }

  return cursorY;
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
function truncate(ctx, text, maxWidth){
  let t = text;
  while(ctx.measureText(t).width > maxWidth && t.length > 3){
    t = t.slice(0, -1);
  }
  return t === text ? text : t.trim() + "…";
}
function wrapText(ctx, text, x, y, maxWidth, lineHeight, font){
  ctx.font = font;
  ctx.textAlign = "center";
  const words = text.split(" ");
  let line = "";
  const lines = [];
  words.forEach(w=>{
    const test = line ? line + " " + w : w;
    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  });
  if(line) lines.push(line);
  const startY = y - (lines.length-1)*lineHeight/2;
  lines.forEach((l,i)=> ctx.fillText(l, x, startY + i*lineHeight));
}
function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}
async function shareStoryImage(){
  const canvas = document.getElementById("story-canvas");
  if(!canvas) return;
  canvas.toBlob(async (blob)=>{
    if(!blob) return;
    const file = new File([blob], "campeonato-futevolei.png", {type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file], title:"Campeonato de Futevôlei"});
      }catch(e){ /* usuário cancelou o compartilhamento */ }
    } else {
      showToast("Compartilhamento direto não é suportado aqui — usando download.");
      downloadStoryImage();
    }
  }, "image/png");
}
function downloadStoryImage(){
  const canvas = document.getElementById("story-canvas");
  if(!canvas) return;
  canvas.toBlob((blob)=>{
    if(!blob) return;
    const url = URL.createObjectURL(blob);
    if(isIOS()){
      window.open(url, "_blank");
      showToast("Toque e segure a imagem que abriu e escolha 'Salvar imagem'.");
    } else {
      const link = document.createElement("a");
      link.download = "campeonato-futevolei.png";
      link.href = url;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast("Imagem baixada!");
    }
    setTimeout(()=>URL.revokeObjectURL(url), 30000);
  }, "image/png");
}

function pendingElimMessages(){
  if(!state.drawn) return [];
  const pend = [];
  elimMatchList().forEach(({round, idx, side, faseLabel, nome, oponente})=>{
    if(!nome || !oponente) return;
    const i = duplaIndexByName(nome);
    if(i<0) return;
    const d = state.duplas[i];
    const key = `${round}-${idx}-${side}`;
    const rec = state.elimNotified[key];
    [1,2].forEach(slot=>{
      const tel = slot===1 ? d.tel1 : d.tel2;
      if(!tel) return;
      const sent = !!(rec && rec.nome===nome && (slot===1 ? rec.slot1 : rec.slot2));
      if(!sent) pend.push({key, slot, i, nome, oponente, faseLabel, tel});
    });
  });
  return pend;
}

    html += `<div class="section-title" style="margin-top:6px;">Situação das duplas</div>`;

    </div>`;
  return html;
}

function renderContatoBlock(i, slot, tel, baseMsg, trackKey){
  if(!tel){
    return `<div class="msg-block"><span class="btn-send disabled">Sem Telefone ${slot}</span></div>`;
  }
  const jaAtivado = !!telegramStatus[codigoDupla(i, slot)];
  const link = telegramLink(i, slot);
  let msg = baseMsg;
  if(link && !jaAtivado){
    msg += `\n\n📲 Quer receber os próximos jogos automaticamente, sem precisar abrir o WhatsApp? Ative nosso bot gratuito no Telegram (é só apertar Iniciar uma vez):\n${link}`;
  }
  const href = waLink(tel, msg);
  const botOk = !!(state.telegramBot||"").trim();

  let statusHtml = "";
  if(trackKey){
    const rec = state.elimNotified[trackKey];
    const enviado = !!(rec && (slot===1 ? rec.slot1 : rec.slot2));
    statusHtml = enviado
      ? `<div class="tg-status ok">✅ Mensagem enviada</div>`
      : `<div class="tg-status pending">⏳ Mensagem pendente</div>`;
  } else if(botOk){
    statusHtml = jaAtivado
      ? `<div class="tg-status ok">✅ Telegram: ativado</div>`
      : `<div class="tg-status pending">⏳ Telegram: aguardando ativação</div>`;
  }

  const trackAttr = trackKey ? `data-track-key="${trackKey}" data-track-slot="${slot}"` : "";
  return `<div class="msg-block">
    <a class="btn-send" href="${href}" target="_blank" rel="noopener" ${trackAttr}>📱 Enviar mensagem</a>
    ${statusHtml}
  </div>`;
}

function renderSituacaoEliminacaoLista(){

  nomes.slice().sort((a,b)=> (perdas[a]||0)-(perdas[b]||0) || (vitorias[b]||0)-(vitorias[a]||0)).forEach(nome=>{
    const l = perdas[nome] || 0;
    const v = vitorias[nome] || 0;
    const cor = l>=2 ? "#C0392B" : (l===1 ? "#F2652A" : "#4C9A64");
    const status = l>=2 ? "❌ Eliminada" : (l===1 ? "⚠️ 1 derrota" : "✅ Sem derrotas");
    html += `<div class="name"><span class="dot" style="background:${cor}"></span>${escapeHtml(nome)} <span style="margin-left:auto;font-size:11.5px;color:var(--muted);">${v}V · ${status}</span></div>`;
  });
  html += `</div>`;
  return html;
}

  state.elimRodadas.forEach((r, ri)=>{
    html += `<div class="group-card"><div class="group-head">Rodada ${ri+1}</div><div class="group-body">`;
    r.matches.forEach((m, mi)=>{

        <button class="ref-mini-btn ghost" data-placartv="${matchId}">📺 Placar do jogo</button>
      </div>`;
    });
    if(r.bye) html += `<div class="tiebreak-note">🎟️ ${escapeHtml(r.bye)} folgou nesta rodada (mais vitórias entre os vivos — avança direto, sem jogar).</div>`;
    html += `</div></div>`;
  });

  const rodadaAtual = elimRodadaAtual();
  const completa = elimRodadaCompleta(rodadaAtual);
  const vivas = elimVivas();
  const meta = state.elimTarget || 4;

  if(!completa){
    html += `<div class="card empty" style="padding:16px;">Registre os resultados de todos os jogos da rodada para liberar a próxima etapa.</div>`;
  } else if(!matamataPronto() && vivas.length > meta){
    html += `<button class="btn" id="btn-sortear-proxima-rodada">Sortear rodada ${state.elimRodadas.length+1} 🏐</button>
      <div class="tiebreak-note" style="text-align:center;">${vivas.length} duplas seguem vivas · meta: ${meta} para o mata-mata.</div>`;

    html += `<div class="champion-banner" style="background:linear-gradient(150deg,var(--grass),#2E6E42);">

      </div>
      <button class="btn" id="btn-iniciar-matamata-elim">Ir para o mata-mata 🏆</button>`;

    html += `<div class="tiebreak-note" style="text-align:center;">Fase de eliminação concluída — acompanhe o chaveamento na aba Mata-mata.</div>`;
  }

  html += `<div class="section-title" style="margin-top:18px;">Situação das duplas</div>`;
  html += renderSituacaoEliminacaoLista();
  return html;
}
