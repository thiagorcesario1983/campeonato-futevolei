// Status "geral" do torneio pra tela de Torneios (lista) — igual à prioridade usada em
// torneioEstaAtivo()/renderTorneioBloqueado(), mas independente de qual torneio está aberto:
// recusado/bloqueado são decisões explícitas do admin e vêm primeiro; senão, se o período já
// passou, mostra "Expirado" mesmo que nunca tenha sido revisado (uma solicitação parada há
// meses não deveria continuar aparecendo como "Pendente"); só depois aprovado/pendente.
function statusGeralTorneio(t){
  if(t.aprovacaoStatus==="recusado") return "recusado";
  if(t.aprovacaoStatus==="bloqueado") return "bloqueado";
  if(t.dataFim && hojeLocalISO() > t.dataFim) return "expirado";
  if(t.aprovacaoStatus==="aprovado") return "aprovado";
  return "pendente";
}
function badgeStatusGeral(t){
  const st = statusGeralTorneio(t);
  if(st==="aprovado") return `<span class="status-pill" style="background:#DCEEE1;color:#2E6E42;">✅ Aprovado</span>`;
  if(st==="recusado") return `<span class="status-pill" style="background:#F7DCD8;color:#A23B2E;">❌ Recusado</span>`;
  if(st==="bloqueado") return `<span class="status-pill" style="background:#E4E4E4;color:#5A5A5A;">🔒 Bloqueado</span>`;
  if(st==="expirado") return `<span class="status-pill" style="background:#E4E4E4;color:#5A5A5A;">⏱️ Expirado</span>`;
  return `<span class="status-pill" style="background:#FCEFD8;color:#9A6B1E;">⏳ Pendente</span>`;
}
const ROTULO_STATUS_GERAL = { todos:"Todos", pendente:"Pendente", aprovado:"Aprovado", recusado:"Recusado", bloqueado:"Bloqueado", expirado:"Expirado" };
function formatarDataBR(iso){
  if(!iso) return "—";
  const [y,m,d] = iso.split("-");
  return (y&&m&&d) ? `${d}/${m}/${y}` : iso;
}
// timestamp completo (new Date().toISOString(), com hora) -> "dd/mm/aaaa hh:mm" no fuso local do
// aparelho — diferente de formatarDataBR acima, que só trata datas soltas "YYYY-MM-DD" (sem hora).
function formatarDataHoraBR(timestamp){
  const d = timestamp ? new Date(timestamp) : null;
  if(!d || isNaN(d.getTime())) return "—";
  const dia = String(d.getDate()).padStart(2,"0");
  const mes = String(d.getMonth()+1).padStart(2,"0");
  const hh = String(d.getHours()).padStart(2,"0");
  const mm = String(d.getMinutes()).padStart(2,"0");
  return `${dia}/${mes}/${d.getFullYear()} ${hh}:${mm}`;
}
// Mesma ideia de hojeLocalISO(), mas pra um timestamp qualquer — usada pra comparar o log com o
// filtro de data (que é "YYYY-MM-DD" vindo de um <input type=date>) no fuso local do aparelho.
function dataLocalISO(timestamp){
  const d = timestamp ? new Date(timestamp) : null;
  if(!d || isNaN(d.getTime())) return "";
  const mes = String(d.getMonth()+1).padStart(2,"0");
  const dia = String(d.getDate()).padStart(2,"0");
  return `${d.getFullYear()}-${mes}-${dia}`;
}
// Só o "HH:MM" (sem data) no fuso local — usada pro filtro de hora do log funcionar como
// horário do dia, independente da data (ex: "das 14:30 às 14:55" vale pra qualquer dia
// selecionado, não só um instante específico combinado com a data).
function horaLocalISO(timestamp){
  const d = timestamp ? new Date(timestamp) : null;
  if(!d || isNaN(d.getTime())) return "";
  const hh = String(d.getHours()).padStart(2,"0");
  const mm = String(d.getMinutes()).padStart(2,"0");
  return `${hh}:${mm}`;
}

// Mesmas regras de validade do worker (checarValidadeCupom) — o status salvo continua "ativo"
// mesmo vencido (só "bloqueado" é setado manualmente), então precisa calcular a validade real
// na hora de exibir/filtrar, senão parece utilizável quando não é.
function statusGeralCupom(c){
  if(c.status==="bloqueado") return "bloqueado";
  const hoje = hojeLocalISO();
  if(c.dataFim && hoje > c.dataFim) return "expirado";
  if(c.dataInicio && hoje < c.dataInicio) return "nao_comecou";
  if(typeof c.maxUsos==="number" && c.usos>=c.maxUsos) return "limite_atingido";
  return "ativo";
}
const ROTULO_STATUS_CUPOM = { todos:"Todos", ativo:"Ativo", expirado:"Expirado", nao_comecou:"Ainda não começou", limite_atingido:"Limite atingido", bloqueado:"Bloqueado" };
function badgeCupom(c){
  const st = statusGeralCupom(c);
  if(st==="bloqueado") return `<span class="status-pill" style="background:#E4E4E4;color:#5A5A5A;">🔒 Bloqueado</span>`;
  if(st==="expirado") return `<span class="status-pill" style="background:#F5D9D9;color:#8A2E2E;">⏰ Expirado</span>`;
  if(st==="nao_comecou") return `<span class="status-pill" style="background:#FCEBC9;color:#8A6D1D;">🕓 Ainda não começou</span>`;
  if(st==="limite_atingido") return `<span class="status-pill" style="background:#E4E4E4;color:#5A5A5A;">🎯 Limite atingido</span>`;
  return `<span class="status-pill" style="background:#DCEEE1;color:#2E6E42;">✅ Ativo</span>`;
}

// Aplica os filtros atuais (torneio, tipo/função, período) sobre logsList — usada tanto pra
// desenhar a tela (com paginação por cima) quanto pra montar as opções do filtro de torneio.
function logsFiltrados(){
  let lista = (logsList || []).slice().sort((a,b)=> (b.quando||"").localeCompare(a.quando||""));
  if(logsFiltroTorneio!=="todos") lista = lista.filter(l=> l.torneioId===logsFiltroTorneio);
  if(logsFiltroTipo!=="todos") lista = lista.filter(l=> l.tipo===logsFiltroTipo);
  // Data e hora são filtros independentes (não um instante único combinado): a hora vale como
  // horário do dia em qualquer data selecionada — por isso dá pra preencher só a hora (ex: "das
  // 14:30 às 14:55") sem escolher nenhuma data, e funciona igual em todos os dias do log.
  if(logsFiltroDataInicio) lista = lista.filter(l=> dataLocalISO(l.quando) >= logsFiltroDataInicio);
  if(logsFiltroDataFim) lista = lista.filter(l=> dataLocalISO(l.quando) <= logsFiltroDataFim);
  if(logsFiltroHoraInicio) lista = lista.filter(l=> horaLocalISO(l.quando) >= logsFiltroHoraInicio);
  if(logsFiltroHoraFim) lista = lista.filter(l=> horaLocalISO(l.quando) <= logsFiltroHoraFim);
  return lista;
}

// Exporta a lista já filtrada (não só a página atual) — mesmo padrão de exportarRelatorioCuponsCSV.
function exportarLogsCSV(linhas){
  const cab = ["Data/Hora","Função","Descrição","Ator (nome)","Ator (e-mail)","Torneio","Código do torneio","IP","País","Região","Cidade","Conexão","Dados"];
  const linhasCSV = linhas.map(l=> [
    formatarDataHoraBR(l.quando), ROTULO_TIPO_LOG[l.tipo] || l.tipo, l.descricao || "",
    l.atorNome || "", l.atorEmail || "", l.torneioNome || "", l.torneioCodigo || "",
    l.ip || "", l.pais || "", l.regiao || "", l.cidade || "", l.conexao || "",
    l.dados ? JSON.stringify(l.dados) : ""
  ]);
  const csv = [cab, ...linhasCSV].map(linha=> linha.map(v=> `"${String(v).replace(/"/g,'""')}"`).join(";")).join("\r\n");
  baixarArquivo(`log-atividade-${hojeLocalISO()}.csv`, "﻿"+csv, "text/csv;charset=utf-8");
}

      <label style="font-size:12px;font-weight:600;color:var(--heading);display:block;margin-bottom:6px;">Até</label>
      <input type="date" id="input-log-filtro-data-fim" value="${logsFiltroDataFim}" style="width:100%;border:1.5px solid var(--sand-dark);border-radius:10px;padding:9px 12px;font-size:13px;margin-bottom:6px;">
      <input type="time" id="input-log-filtro-hora-fim" value="${logsFiltroHoraFim}" style="width:100%;border:1.5px solid var(--sand-dark);border-radius:10px;padding:9px 12px;font-size:13px;">
    </div>
  </div>`;

  html += `<button class="btn" id="btn-gerar-relatorio-log" style="margin-bottom:16px;" ${logsLoading?"disabled":""}>${logsLoading ? "Carregando..." : (jaCarregado ? "🔄 Atualizar relatório" : "📊 Gerar relatório")}</button>`;

  if(!jaCarregado){
    return html;
  }

  if(!logsList.length){
    return html + `<div class="card empty"><span class="ball-icon">🗒️</span>Nenhum evento registrado ainda.</div>`;
  }

  html += `<button class="btn ghost" id="btn-exportar-logs" style="margin-bottom:16px;">⬇️ Exportar CSV</button>`;

  const lista = logsFiltrados();
  if(!lista.length){
    return html + `<div class="card empty">Nenhum evento com esses filtros.</div>`;
  }

  const totalPaginas = Math.max(1, Math.ceil(lista.length / LOGS_POR_PAGINA));
  if(logsPagina > totalPaginas) logsPagina = totalPaginas;
  if(logsPagina < 1) logsPagina = 1;
  const inicio = (logsPagina-1) * LOGS_POR_PAGINA;
  const listaPagina = lista.slice(inicio, inicio + LOGS_POR_PAGINA);

  html += `<div class="sub" style="margin-bottom:10px;">${lista.length} evento${lista.length===1?"":"s"}</div>`;

  listaPagina.forEach(l=>{
    const local = [l.cidade, l.regiao, l.pais].filter(Boolean).join(", ");
    html += `<div class="card" style="margin-bottom:14px;">
      <div class="row" style="margin-bottom:2px;">
        ${badgeTipoLog(l.tipo)}
        <span class="sub" style="font-family:'DM Mono',monospace;">${formatarDataHoraBR(l.quando)}</span>
      </div>
      <div class="sub" style="margin-bottom:4px;">${escapeHtml(l.descricao||"")}</div>
      <div class="sub" style="margin-bottom:2px;">👤 ${escapeHtml(l.atorNome || l.atorEmail || "—")}${l.atorEmail && l.atorNome ? ` · ${escapeHtml(l.atorEmail)}` : ""}</div>
      ${l.torneioId ? `<div class="sub" style="margin-bottom:2px;">📋 ${escapeHtml(l.torneioNome||"Torneio sem nome")}${l.torneioCodigo ? ` <span style="opacity:.7;">#${escapeHtml(l.torneioCodigo)}</span>` : ""}</div>` : ""}
      ${l.ip || local ? `<div class="sub" style="margin-bottom:2px;font-family:'DM Mono',monospace;font-size:11px;">🌐 ${escapeHtml(l.ip||"—")}${local ? ` · ${escapeHtml(local)}` : ""}</div>` : ""}
      ${l.conexao ? `<div class="sub" style="font-size:11px;">📶 ${escapeHtml(l.conexao)}</div>` : ""}
    </div>`;
  });

  if(totalPaginas > 1){
    html += `<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:6px;">
      <button class="btn ghost" id="btn-log-pagina-anterior" style="width:auto;padding:8px 16px;${logsPagina<=1 ? "opacity:.45;cursor:not-allowed;" : ""}" ${logsPagina<=1 ? "disabled" : ""}>← Anterior</button>
      <span class="sub">Página ${logsPagina} de ${totalPaginas}</span>
      <button class="btn ghost" id="btn-log-pagina-proxima" style="width:auto;padding:8px 16px;${logsPagina>=totalPaginas ? "opacity:.45;cursor:not-allowed;" : ""}" ${logsPagina>=totalPaginas ? "disabled" : ""}>Próxima →</button>
    </div>`;
  }

  return html;
}

// Junta os jogos pendentes de todas as fases já em andamento (grupos/eliminação, mata-mata e
// disputa de 3º lugar) — assim que uma fase nova é sorteada os jogos dela já aparecem aqui, e
// assim que um jogo é finalizado ele some da lista (nada de limite fixo de quantidade).
function listaProximosJogos(){
  const itens = [];
  if(state.formato==="eliminacao"){
    const rodadaAtual = elimRodadaAtual();
    if(rodadaAtual){
      rodadaAtual.matches.filter(m=>!partidaFinalizada(m)).forEach(m=>{
        itens.push({tag:`Rodada ${state.elimRodadas.length}`, a:m.a, b:m.b});
      });
    }
  } else {
    state.groupMatches.filter(m=>!partidaFinalizada(m)).forEach(m=>{
      itens.push({tag:`${m.group}${m.jogo}`, a:m.a, b:m.b});
    });
  }
  if(mataMataLiberadoParaJogar()){
    const totalRounds = totalRoundsBracket();
    for(let r=0; r<totalRounds; r++){
      const teams = bracketTeamsForRound(r);
      const round = state.bracket[r] || [];
      teams.forEach((t,i)=>{
        if(t[0] && t[1] && !partidaFinalizada(round[i])){
          itens.push({tag: nomeRodada(r, totalRounds), a:t[0], b:t[1]});
        }
      });
    }
    if(state.terceiroLugar){
      const [a,b] = semifinalLosers();
      if(a && b && !partidaFinalizada(state.terceiro)){
        itens.push({tag:"3º lugar", a, b});
      }
    }
  }
  return itens;
}

  let html = `<div class="section-title">Resumo do Campeonato</div>
    <div class="section-sub">Visão geral em tempo real, direto do sorteio ao título.</div>`;

    const vivas = state.drawn ? elimVivas().length : 0;
    html += `<div class="stat-grid">
      <div class="stat ocean"><span class="num">${state.elimRodadas.length}</span><span class="lbl">Rodadas · Eliminação</span></div>
      <div class="stat coral"><span class="num">${elimFeitos} / ${elimTotal.length}</span><span class="lbl">Jogos · Mata-mata</span></div>
      <div class="stat ink"><span class="num" style="font-size:15px">${faseAtual()}</span><span class="lbl">Fase atual</span></div>

    }

    html += `<div class="section-title" style="margin-top:6px;">Situação das duplas</div>`;

  } else {
    const jogosGrupo = state.groupMatches.filter(m=>partidaFinalizada(m)).length;
    html += `<div class="stat-grid">
      <div class="stat ocean"><span class="num">${jogosGrupo} / ${state.groupMatches.length}</span><span class="lbl">Jogos · Grupos</span></div>
      <div class="stat coral"><span class="num">${elimFeitos} / ${elimTotal.length}</span><span class="lbl">Jogos · Mata-mata</span></div>

    </div>`;

    if(!state.drawn){
      html += `<div class="card empty"><span class="ball-icon">🏐</span>Nenhum sorteio realizado ainda.<br>Vá em <b>Duplas</b> para começar.</div>`;
      return html;
    }

    html += `<div class="section-title" style="margin-top:6px;">Classificação parcial</div>`;
    groupLettersState().forEach(letter=>{
      const rows = standingsFor(letter);
      html += `<div class="group-card"><div class="group-head">Grupo ${letter}</div><div class="group-body">`;
      rows.forEach((r,i)=>{
        html += `<div class="name"><span class="dot" style="background:${i<2?'#4C9A64':'#C9B896'}"></span>${r.nome} <span style="margin-left:auto;font-family:'DM Mono',monospace;color:var(--muted);font-size:12px;">${r.pts} pts</span></div>`;
      });
      html += `</div></div>`;
    });

  }

  const proximosJogos = listaProximosJogos();
  if(proximosJogos.length){
    html += `<div class="section-title" style="margin-top:14px;">Próximos jogos</div><div class="card">`;
    proximosJogos.forEach(j=>{
      html += `<div class="match">${j.tag ? `<span class="group-tag">${escapeHtml(j.tag)}</span>` : ""}<span class="team">${escapeHtml(j.a)}</span><span class="x">vs</span><span class="team">${escapeHtml(j.b)}</span></div>`;
    });
    html += `</div>`;
  }

  html += `<div class="section-title" style="margin-top:14px;">Compartilhar</div>
    <div class="card" style="text-align:center;">
      <canvas id="story-canvas" width="1080" height="1920" style="width:100%;height:auto;max-width:260px;border-radius:14px;box-shadow:var(--shadow);background:#EDE3CC;"></canvas>
      <div style="display:flex;gap:8px;margin-top:12px;">

        <button class="btn secondary" id="btn-story-download" style="flex:1;">⬇️ Baixar</button>

    </div>`;
  return html;
}

function renderContatoBlock(i, slot, tel, baseMsg, trackKey){
  if(!tel){
    return `<div class="msg-block"><span class="btn-send disabled">Sem Telefone ${slot}</span></div>`;
  }
  const jaAtivado = !!telegramStatus[codigoDupla(i, slot)];
  const link = telegramLink(i, slot);
  let msg = baseMsg;
  if(link && !jaAtivado){
    msg += `\n\n📲 Quer receber os próximos jogos automaticamente, sem precisar abrir o WhatsApp? Ative nosso bot gratuito no Telegram (é só apertar Iniciar uma vez):\n${link}`;
  }
  const href = waLink(tel, msg);
  const botOk = !!(state.telegramBot||"").trim();

  let statusHtml = "";
  if(trackKey){
    const rec = state.elimNotified[trackKey];
    const enviado = !!(rec && (slot===1 ? rec.slot1 : rec.slot2));
    statusHtml = enviado
      ? `<div class="tg-status ok">✅ Mensagem enviada</div>`
      : `<div class="tg-status pending">⏳ Mensagem pendente</div>`;
  } else if(botOk){
    statusHtml = jaAtivado
      ? `<div class="tg-status ok">✅ Telegram: ativado</div>`
      : `<div class="tg-status pending">⏳ Telegram: aguardando ativação</div>`;
  }

  const trackAttr = trackKey ? `data-track-key="${trackKey}" data-track-slot="${slot}"` : "";
  return `<div class="msg-block">
    <a class="btn-send" href="${href}" target="_blank" rel="noopener" ${trackAttr}>📱 Enviar mensagem</a>
    ${statusHtml}
  </div>`;
}

function badgeStatusDupla(status, ativacaoVia){
  if(status==="pendente") return `<span class="status-pill" style="background:#FCEFD8;color:#9A6B1E;">⏳ Pendente pagamento</span>`;
  if(status==="bloqueada") return `<span class="status-pill" style="background:#F7DCD8;color:#A23B2E;">🚫 Bloqueada</span>`;
  const viaTxt = ativacaoVia==="pix" ? " · via Pix" : ativacaoVia==="manual" ? " · aprovação manual" : "";
  return `<span class="status-pill" style="background:#DCEEE1;color:#2E6E42;">✅ Ativa${viaTxt}</span>`;
}

    html += `<div class="section-title" style="margin-top:18px;">Grupos sorteados</div>`;
    groupLettersState().forEach((letter,gi)=>{
      html += `<div class="group-card"><div class="group-head">Grupo ${letter}</div><div class="group-body">`;
      (state.groups[gi]||[]).forEach(n=>{
        html += `<div class="name"><span class="dot"></span>${escapeHtml(n)}</div>`;
      });
      html += `</div></div>`;
    });

    html += `<div class="section-title" style="margin-top:18px;">Enviar jogos</div>
      <div class="section-sub">Toque em "Enviar mensagem" para abrir o WhatsApp já com os jogos da dupla (e o link de ativação do Telegram, se configurado). Depois que a dupla ativar o bot, os próximos jogos chegam automaticamente por lá também.</div>`;

    const botOk = !!(state.telegramBot||"").trim();
    if(botOk){
      html += `<div class="bulk-row">
        <button class="btn secondary" id="btn-tg-refresh" style="width:auto;flex:1;">🔄 Atualizar status</button>
        <button class="btn" id="btn-tg-all" style="width:auto;flex:1;background:#2AABEE;box-shadow:none;">📲 Enviar todas (Telegram)</button>
      </div>`;
    }

    html += `<div class="whats-list">`;
    state.duplas.forEach((d,i)=>{
      const nome = (d.nome||"").trim()||"Dupla sem nome";
      const matches = matchesForDupla(nome);
      const letter = groupLetterForDupla(nome);
      const resumoJogos = matches.map(m => m.a===nome ? `vs ${m.b}` : `vs ${m.a}`).join(" · ");
      html += `<div class="dupla-card">
        <div class="g-name">${escapeHtml(nome)} <span style="color:var(--muted);font-weight:500;">· Grupo ${letter}</span></div>
        <div class="g-matches">${resumoJogos || "Sem jogos"}</div>
        <div class="msg-grid">
          ${renderContatoBlock(i, 1, d.tel1, mensagemWhatsApp(nome))}
          ${renderContatoBlock(i, 2, d.tel2, mensagemWhatsApp(nome))}
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `<button class="btn ghost" id="btn-reset" style="margin-top:18px;">Reiniciar torneio</button>`;
  return html;
}

function renderSituacaoEliminacaoLista(){
  const perdas = elimPerdasPorDupla();
  const vitorias = elimVitoriasPorDupla();
  const nomes = duplasNomes();
  let html = `<div class="card">`;
  nomes.slice().sort((a,b)=> (perdas[a]||0)-(perdas[b]||0) || (vitorias[b]||0)-(vitorias[a]||0)).forEach(nome=>{
    const l = perdas[nome] || 0;
    const v = vitorias[nome] || 0;
    const cor = l>=2 ? "#C0392B" : (l===1 ? "#F2652A" : "#4C9A64");
    const status = l>=2 ? "❌ Eliminada" : (l===1 ? "⚠️ 1 derrota" : "✅ Sem derrotas");
    html += `<div class="name"><span class="dot" style="background:${cor}"></span>${escapeHtml(nome)} <span style="margin-left:auto;font-size:11.5px;color:var(--muted);">${v}V · ${status}</span></div>`;
  });
  html += `</div>`;
  return html;
}

function renderRodadasEliminacao(){
  let html = `
    <div class="section-title">Rodadas · Eliminação</div>
    <div class="section-sub">Cada dupla que perde 2 jogos é eliminada. Os confrontos priorizam quem tem menos vitórias; em rodada com número ímpar, quem tem mais vitórias folga. As rodadas continuam até a quantidade de vivas chegar na meta de qualificados (ou menos) — se pular a meta numa única rodada, as vagas que faltarem são preenchidas por repescagem: as duplas eliminadas com melhor desempenho (mais vitórias, depois saldo de pontos, depois pontos pró) avançam pro mata-mata no lugar. Empate real nesses 3 critérios é decidido por você.</div>`;

  const pendentes = pendingElimMessages().filter(p=>String(p.key).startsWith("e"));
  if(pendentes.length){
    html += `<div class="card" style="border:1.5px solid var(--coral);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
        <div style="font-weight:700;font-size:13.5px;color:var(--coral);">📣 ${pendentes.length} mensage${pendentes.length>1?'ns':'m'} pendente${pendentes.length>1?'s':''}</div>
        <button class="btn ghost" id="btn-clear-pendentes" style="width:auto;padding:4px 10px;font-size:11.5px;">Limpar</button>
      </div>
      <div style="font-size:11.5px;color:var(--muted);margin-bottom:10px;">Telegram já tentou enviar automaticamente para quem ativou. Estes aqui precisam do seu toque no WhatsApp.</div>`;
    pendentes.forEach(p=>{
      const baseMsg = mensagemMataMata(p.faseLabel, p.nome, p.oponente);
      html += `<div style="margin-bottom:10px;">
        <div style="font-size:12.5px;font-weight:600;margin-bottom:4px;">${escapeHtml(p.nome)} <span style="color:var(--muted);font-weight:500;">· ${p.faseLabel} vs ${escapeHtml(p.oponente)}</span></div>
        ${renderContatoBlock(p.i, p.slot, p.tel, baseMsg, p.key)}
      </div>`;
    });
    html += `</div>`;
  }

  state.elimRodadas.forEach((r, ri)=>{
    html += `<div class="round-label">Rodada ${ri+1}</div>`;
    r.matches.forEach((m, mi)=>{
      const win = winnerFinal(m.a,m.b,m);
      const matchId = `e${ri}_${mi}`;
      const arbAtiva = ["andamento","tecnico"].includes(state.arbitragem?.[matchId]?.status);
      html += `<div class="bracket-match">
      <div class="lbl">Jogo ${mi+1}</div>
      <div class="match">
        <span class="team ${win===m.a?'win':''}">${escapeHtml(m.a)}</span>
        <input class="score-input" type="number" min="0" inputmode="numeric" data-erm="${ri}_${mi}" data-side="a" value="${m.pa??""}" ${arbAtiva||m.finalizado?"disabled":""}>
        <span class="x">×</span>
        <input class="score-input" type="number" min="0" inputmode="numeric" data-erm="${ri}_${mi}" data-side="b" value="${m.pb??""}" ${arbAtiva||m.finalizado?"disabled":""}>
        <span class="team ${win===m.b?'win':''}">${escapeHtml(m.b)}</span>
      </div>
      ${liveScoreBadgeHtml(matchId)}
      ${woNoteHtml(m, m.a, m.b)}
      ${(m.finalizado && !m.wo) ? `<div class="tiebreak-note">✅ Partida finalizada.</div>` : ""}
      ${acoesJogoHtml(matchId, m)}
      </div>`;
    });
    if(r.bye) html += `<div class="tiebreak-note">🎟️ ${escapeHtml(r.bye)} folgou nesta rodada (mais vitórias e menos derrotas entre os vivos — avança direto, sem jogar).</div>`;
  });

  const rodadaAtual = elimRodadaAtual();
  const completa = elimRodadaCompleta(rodadaAtual);
  const vivas = elimVivas();
  const meta = state.elimTarget || 4;

  if(!completa){
    html += `<div class="card empty" style="padding:16px;">Registre os resultados de todos os jogos da rodada para liberar a próxima etapa.</div>`;
  } else if(!matamataPronto() && !elimProntoParaMataMata()){
    html += `<button class="btn" id="btn-sortear-proxima-rodada">Sortear rodada ${state.elimRodadas.length+1} 🏐</button>
      <div class="tiebreak-note" style="text-align:center;">${vivas.length} duplas seguem vivas · meta: ${meta} para o mata-mata. Continua sorteando até a quantidade de vivas chegar em ${meta} (ou menos).</div>`;
  } else if(!matamataPronto() && elimRepescagemPrecisaEscolha()){
    const repesc = elimRepescagemInfo();
    const stats = elimEstatisticasPorDupla();
    const escolha = state.elimRepescagemEscolha || [];
    const escolhidas = escolha.filter(n=>repesc.grupoEmpatado.includes(n));
    html += `<div class="card" style="border:1.5px solid var(--coral);">
      <div style="font-weight:700;font-size:14px;color:var(--coral);margin-bottom:6px;">⚖️ Empate na repescagem</div>
      <div style="font-size:12.5px;color:var(--muted);margin-bottom:10px;">
        Faltaram duplas pra fechar a meta de ${meta} qualificados, e estas duplas eliminadas empataram em vitórias, saldo de pontos e pontos pró disputando ${repesc.vagas===1?"a vaga que sobrou":"as "+repesc.vagas+" vagas que sobraram"}. Escolha ${repesc.vagas===1?"quem avança":"quais avançam"} (${escolhidas.length}/${repesc.vagas}):
      </div>`;
    repesc.grupoEmpatado.forEach(nome=>{
      const s = stats[nome] || {vitorias:0,pp:0,pc:0};
      const saldo = s.pp - s.pc;
      const marcado = escolhidas.includes(nome);
      html += `<label style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--sand-dark);">
        <input type="checkbox" data-repesc-nome="${escapeHtml(nome)}" ${marcado?"checked":""}>
        <span style="flex:1;">${escapeHtml(nome)}</span>
        <span style="font-size:11.5px;color:var(--muted);">${s.vitorias}V · saldo ${saldo>0?"+":""}${saldo} · ${s.pp} pontos pró</span>
      </label>`;
    });
    html += `</div>`;
  } else if(!matamataPronto()){
    const repesc = elimRepescagemInfo();
    const resgatadas = elimRepescadasFinal();
    const totalClassificadas = vivas.length + resgatadas.length;
    if(resgatadas.length){
      html += `<div class="tiebreak-note" style="text-align:center;">🎟️ ${resgatadas.map(escapeHtml).join(", ")} ${resgatadas.length>1?"entraram":"entrou"} de repescagem no mata-mata — melhor desempenho entre as eliminadas (mais vitórias, depois saldo de pontos, depois pontos pró) pra fechar a meta de ${meta}.</div>`;
    }
    html += `<div class="champion-banner" style="background:linear-gradient(150deg,var(--grass),#2E6E42);">
        <div class="eyebrow">Fase de eliminação concluída</div>
        <div class="name" style="font-size:22px;">${totalClassificadas} dupla${totalClassificadas>1?'s':''} classificada${totalClassificadas>1?'s':''}</div>
      </div>
      <button class="btn" id="btn-iniciar-matamata-elim">Ir para o mata-mata 🏆</button>`;
  } else {
    html += `<div class="tiebreak-note" style="text-align:center;">Fase de eliminação concluída — acompanhe o chaveamento na aba Mata-mata.</div>`;
  }

  html += `<div class="section-title" style="margin-top:18px;">Situação das duplas</div>`;
  html += renderSituacaoEliminacaoLista();
  return html;
}

function fluxoStep(titulo, detalheHtml, cor){
  return `<div class="flow-connector"></div>
    <div class="flow-card" style="border-left-color:${cor||'var(--ocean)'};">
      <div class="flow-title">${titulo}</div>
      <div class="flow-detail">${detalheHtml}</div>
    </div>`;
}
function fluxoJogoLinha(a, b, m){
  const done = partidaFinalizada(m);
  const emAndamento = !done && m && m.pa!==null && m.pa!=="" && m.pb!==null && m.pb!=="";
  const w = done ? winnerFinal(a,b,m) : null;
  const placar = (done||emAndamento) ? `${m.pa}×${m.pb}` : "—";
  let linha = `${escapeHtml(a)} ${placar} ${escapeHtml(b)}`;
  if(w) linha += ` → <b>${escapeHtml(w)}</b> venceu`;
  else if(emAndamento) linha += ` → 🔴 em andamento (ainda não finalizado)`;
  else linha += ` → pendente`;
  return linha;
}

function renderFluxoJogos(){
  if(!state.drawn){
    return `<div class="section-title">Fluxo de Jogos</div><div class="card empty"><span class="ball-icon">🏐</span>Sorteie as duplas primeiro para gerar o fluxo de auditoria.</div>`;
  }

  let html = `<div class="section-title">Fluxo de Jogos</div>
    <div class="section-sub">Sequência de decisões do campeonato — do sorteio ao campeão, com os critérios usados em cada etapa.</div>`;

  html += fluxoStep(
    "🏐 Sorteio",
    `Formato: <b>${state.formato==="eliminacao"?"Eliminação":"Por grupos"}</b>${state.formato==="eliminacao" ? ` · Meta de qualificados: ${state.elimTarget}` : ` · ${state.numGrupos} grupo(s)`} · ${duplasAtivas().length} duplas sorteadas.`
  );

  if(state.formato==="grupos"){
    groupLettersState().forEach(letter=>{
      const matches = state.groupMatches.filter(m=>m.group===letter);
      const jogosHtml = matches.map(m=>`Jogo ${m.jogo}: ${fluxoJogoLinha(m.a,m.b,m)}`).join("<br>");
      html += fluxoStep(`Grupo ${letter} · Jogos`, jogosHtml, "var(--ocean)");

      const rows = standingsFor(letter);
      // Empate real na última vaga de classificação (ver gruposDesempateInfo) é uma decisão do
      // organizador, distinta do empate informativo de critério entre 1º/2º abaixo — precisa
      // ficar bem clara no fluxo, inclusive se ainda está pendente ou já foi decidida.
      const desempateInfo = gruposDesempateInfoPorLetra(letter);
      const temEmpateReal = desempateInfo.grupoEmpatado.length > desempateInfo.vagas;
      const escolhaGrupo = (state.grupoDesempateEscolha||[]).filter(n=>desempateInfo.grupoEmpatado.includes(n));
      const pendente = temEmpateReal && escolhaGrupo.length < desempateInfo.vagas;
      // Enquanto pendente, só quem já está garantido (jaGarantidas) mantém o badge QUALIFICADO —
      // os empatados disputando a vaga (grupoEmpatado) ficam com "AGUARDANDO DECISÃO" abaixo, em
      // vez de perderem qualquer badge (o que escondia até quem nunca esteve em dúvida).
      const classificadosFinais = new Set(pendente ? desempateInfo.jaGarantidas : gruposClassificadosFinal(letter));

      let criterioHtml = "";
      if(rows.length>=2 && rows[0].pts===rows[1].pts){
        criterioHtml = rows[0].saldo!==rows[1].saldo
          ? `⚖️ Empate em pontos entre 1º e 2º colocado → decidido por <b>saldo de pontos</b>.`
          : (rows[0].pp!==rows[1].pp ? `⚖️ Empate em pontos e saldo → decidido por <b>pontos pró</b>.` : ``);
      }
      let empateRealHtml = "";
      if(temEmpateReal){
        const nomesEmpatados = desempateInfo.grupoEmpatado.map(n=>escapeHtml(n)).join(", ");
        const vagaTxt = desempateInfo.vagas>1 ? "as últimas vagas" : "a última vaga";
        empateRealHtml = pendente
          ? `⚖️ <b>Empate técnico real</b> (pontos, saldo e pontos pró idênticos) entre ${nomesEmpatados} disputando ${vagaTxt} de classificação — decisão ainda pendente do organizador (ver card "Decisão Desempate" na aba Mata-mata).`
          : `⚖️ <b>Empate técnico real</b> entre ${nomesEmpatados} disputando ${vagaTxt} de classificação → decidido manualmente pelo organizador: <b>${escolhaGrupo.slice(0,desempateInfo.vagas).map(n=>escapeHtml(n)).join(", ")}</b> avança${escolhaGrupo.slice(0,desempateInfo.vagas).length>1?"m":""} pro mata-mata.`;
      }

      const classifHtml = rows.map((r,i)=>{
        let badge = "";
        if(classificadosFinais.has(r.nome)) badge = ` <span class="flow-badge" style="background:#DCEEE1;color:#2E6E42;">QUALIFICADO</span>`;
        else if(pendente && desempateInfo.grupoEmpatado.includes(r.nome)) badge = ` <span class="flow-badge" style="background:#FCEFD8;color:#9A6B1E;">⚖️ AGUARDANDO DECISÃO</span>`;
        return `${i+1}º ${escapeHtml(r.nome)} — ${r.pts}pts, saldo ${r.saldo>0?"+":""}${r.saldo}, ${r.pp} pontos pró${badge}`;
      }).join("<br>");

      const extras = [criterioHtml, empateRealHtml].filter(Boolean).join("<br>");
      html += fluxoStep(`Grupo ${letter} · Classificação`, classifHtml + (extras?`<br><br>${extras}`:``), "var(--grass)");
    });
  } else {
    state.elimRodadas.forEach((r,ri)=>{
      const jogosHtml = r.matches.map(m=>fluxoJogoLinha(m.a,m.b,m)).join("<br>");
      const byeHtml = r.bye ? `<br>🎟️ ${escapeHtml(r.bye)} folgou nessa rodada (critério: mais vitórias e, em empate, menos derrotas entre as duplas ainda vivas).` : ``;
      html += fluxoStep(`Eliminação · Rodada ${ri+1}`, jogosHtml + byeHtml, "var(--ocean)");
    });
    if(state.bracketSeed){
      const eliminadas = duplasNomes().filter(n=>elimEliminada(n));
      const vivas = state.bracketSeed.filter(Boolean);
      let elimHtml = eliminadas.length
        ? `❌ Eliminadas (2 derrotas): ${eliminadas.map(n=>escapeHtml(n)).join(", ")}.`
        : `Nenhuma dupla eliminada.`;
      elimHtml += `<br>✅ Classificadas para o mata-mata: ${vivas.map(n=>escapeHtml(n)).join(", ")}.`;

      // Repescagem (ver elimRepescagemInfo) também é uma decisão que precisa ficar clara no
      // fluxo, igual ao empate técnico do formato "grupos" acima — inclusive quando envolveu
      // empate real e escolha manual do organizador, não só o preenchimento automático.
      const repesc = elimRepescagemInfo();
      if(repesc.necessario > 0){
        const resgatadas = elimRepescadasFinal();
        elimHtml += `<br>🎟️ Repescagem: faltaram duplas pra fechar a meta de ${state.elimTarget || 4} qualificados — ${resgatadas.length ? resgatadas.map(n=>escapeHtml(n)).join(", ") : "ninguém"} ${resgatadas.length>1?"entraram":"entrou"} pelo melhor retrospecto entre as eliminadas (vitórias, saldo de pontos, pontos pró).`;
        if(repesc.grupoEmpatado.length > repesc.vagas){
          const nomesEmpatados = repesc.grupoEmpatado.map(n=>escapeHtml(n)).join(", ");
          const escolha = (state.elimRepescagemEscolha||[]).filter(n=>repesc.grupoEmpatado.includes(n));
          const vagaTxt = repesc.vagas>1 ? "as vagas restantes" : "a vaga restante";
          elimHtml += escolha.length >= repesc.vagas
            ? `<br>⚖️ <b>Empate técnico real</b> entre ${nomesEmpatados} disputando ${vagaTxt} da repescagem → decidido manualmente pelo organizador: <b>${escolha.slice(0,repesc.vagas).map(n=>escapeHtml(n)).join(", ")}</b> avança${escolha.slice(0,repesc.vagas).length>1?"m":""}.`
            : `<br>⚖️ <b>Empate técnico real</b> entre ${nomesEmpatados} disputando ${vagaTxt} da repescagem — decisão ainda pendente do organizador (ver aba Jogos).`;
        }
      }
      html += fluxoStep(`Eliminação · Fechamento`, elimHtml, "var(--grass)");
    }
  }

  if(matamataPronto()){
    const rounds = totalRoundsBracket();
    for(let r=0;r<rounds;r++){
      const teams = bracketTeamsForRound(r);
      const round = state.bracket[r] || [];
      const label = nomeRodada(r, rounds);
      const jogosHtml = teams.map((t,i)=>{
        const [a,b] = t;
        if(!a && !b) return `Aguardando classificados`;
        if(!a || !b) return `${escapeHtml(a||b)} avança direto (folga no chaveamento)`;
        const m = round[i] || {};
        return fluxoJogoLinha(a,b,m);
      }).join("<br>");
      html += fluxoStep(`Mata-mata · ${label}`, jogosHtml, "var(--coral)");
    }
    if(state.terceiroLugar){
      const [la,lb] = semifinalLosers();
      html += fluxoStep(`Disputa de 3º lugar`, (la&&lb) ? fluxoJogoLinha(la,lb,state.terceiro) : `Aguardando os perdedores da semifinal`, "var(--muted)");
    }
    const camp = champion();
    if(camp){
      html += fluxoStep(`🏆 Campeão`, `<b>${escapeHtml(camp)}</b> venceu a Final e é o campeão do torneio.`, "#C9A227");
    }
  } else {
    html += fluxoStep(`Mata-mata`, `Ainda não começou — depende da conclusão da fase anterior.`, "var(--muted)");
  }

  return html;
}

// Lista unificada de todos os jogos do torneio (fase de grupos/eliminação + mata-mata),
// usando o mesmo esquema de matchId já usado pela arbitragem e pelo placar de TV.
function listarTodosOsJogos(){
  const lista = [];
  if(!state.drawn) return lista;
  if(state.formato==="grupos"){
    state.groupMatches.forEach((m,idx)=>{
      if(partidaFinalizada(m)) return;
      lista.push({matchId:`g${idx}`, label:`Grupo ${m.group} · Jogo ${m.jogo}`, a:m.a, b:m.b});
    });
  } else {
    state.elimRodadas.forEach((r,ri)=>{
      r.matches.forEach((m,mi)=>{
        if(partidaFinalizada(m)) return;
        lista.push({matchId:`e${ri}_${mi}`, label:`Eliminação · Rodada ${ri+1}`, a:m.a, b:m.b});
      });
    });
  }
  if(matamataPronto() && mataMataLiberadoParaJogar()){
    const rounds = totalRoundsBracket();
    for(let r=0;r<rounds;r++){
      const teams = bracketTeamsForRound(r);
      const round = state.bracket[r] || [];
      const label = nomeRodada(r, rounds);
      teams.forEach((t,i)=>{
        if(t[0] && t[1] && !partidaFinalizada(round[i])) lista.push({matchId:`b${r}_${i}`, label, a:t[0], b:t[1]});
      });
    }
    if(state.terceiroLugar){
      const [la,lb] = semifinalLosers();
      if(la && lb && !partidaFinalizada(state.terceiro)) lista.push({matchId:"terceiro", label:"Disputa de 3º Lugar", a:la, b:lb});
    }
  }
  return lista;
}

function renderPlacarMultiplo(){
  if(!state.drawn){
    return `<div class="section-title">Placar</div><div class="card empty"><span class="ball-icon">🏐</span>Sorteie as duplas primeiro.</div>`;
  }
  const jogos = listarTodosOsJogos();
  if(!jogos.length){
    return `<div class="section-title">Placar</div><div class="card empty"><span class="ball-icon">🏐</span>Nenhum jogo pendente no momento — todos os disponíveis já foram finalizados.</div>`;
  }

  // remove da seleção jogos que não existem mais (ex: apagados por um novo sorteio, ou já finalizados)
  const idsValidos = new Set(jogos.map(j=>j.matchId));
  Array.from(placarSelecionados).forEach(id=>{ if(!idsValidos.has(id)) placarSelecionados.delete(id); });

  let html = `<div class="section-title">Placar</div>
    <div class="section-sub">Jogos ainda não finalizados. Selecione os que estão acontecendo agora e abra todos numa tela só, pensada para um monitor ou TV — igual ao "Placar do jogo", mas com vários de uma vez, divididos em partes iguais.</div>`;
  jogos.forEach(j=>{
    const checked = placarSelecionados.has(j.matchId);
    html += `<label class="card" style="display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer;">
      <input type="checkbox" data-placar-check="${j.matchId}" ${checked?"checked":""} style="width:18px;height:18px;flex-shrink:0;">
      <div>
        <div style="font-weight:600;font-size:13px;color:var(--heading);">${escapeHtml(j.a)} × ${escapeHtml(j.b)}</div>
        <div class="sub">${escapeHtml(j.label)}</div>
      </div>
    </label>`;
  });
  const n = placarSelecionados.size;
  html += `<button class="btn" id="btn-abrir-placar" ${n?"":'disabled style="opacity:.5;"'} style="margin-top:10px;">📺 Abrir placar (${n} selecionado${n===1?"":"s"})</button>`;
  return html;
}

function renderJogos(){
  if(!state.drawn){
    return `<div class="section-title">Jogos</div><div class="card empty"><span class="ball-icon">🏐</span>Sorteie na aba Duplas primeiro.</div>`;
  }
  if(state.formato==="eliminacao") return renderRodadasEliminacao();
  const filters = [["todos","Todos"],["pendentes","Pendentes"],["realizados","Realizados"]];
  let html = `
    <div class="section-title">Fase de Grupos</div>
    <div class="section-sub">Cada confronto tem um único set. Registre os pontos e finalize a partida para valer na classificação.</div>
    <div class="chip-row">`;
  filters.forEach(([key,label])=>{
    html += `<div class="chip ${state.filter===key?"active":""}" data-filter="${key}">${label}</div>`;
  });
  html += `</div>`;

  groupLettersState().forEach(letter=>{
    let matches = state.groupMatches.filter(m=>m.group===letter);
    if(state.filter==="pendentes") matches = matches.filter(m=>!partidaFinalizada(m));
    if(state.filter==="realizados") matches = matches.filter(m=>partidaFinalizada(m));
    if(!matches.length) return;
    html += `<div class="round-label">Grupo ${letter}</div>`;
    matches.forEach(m=>{
      const idx = state.groupMatches.indexOf(m);
      const win = winnerFinal(m.a,m.b,m);
      const matchId = "g"+idx;
      const arbAtiva = ["andamento","tecnico"].includes(state.arbitragem?.[matchId]?.status);
      html += `<div class="bracket-match">
      <div class="lbl">Jogo ${m.jogo}</div>
      <div class="match">
        <span class="team ${win===m.a?'win':''}">${escapeHtml(m.a)}</span>
        <input class="score-input" type="number" min="0" inputmode="numeric" data-gm="${idx}" data-side="a" value="${m.pa??""}" ${arbAtiva||m.finalizado?"disabled":""}>
        <span class="x">×</span>
        <input class="score-input" type="number" min="0" inputmode="numeric" data-gm="${idx}" data-side="b" value="${m.pb??""}" ${arbAtiva||m.finalizado?"disabled":""}>
        <span class="team ${win===m.b?'win':''}">${escapeHtml(m.b)}</span>
      </div>
      ${liveScoreBadgeHtml(matchId)}
      ${woNoteHtml(m, m.a, m.b)}

// Card "Decisão Desempate", no topo da aba Mata-mata: lista, por grupo, as duplas empatadas
// tecnicamente (pontos, saldo e pontos pró idênticos) disputando a última vaga de classificação,
// com seleção única (radio) quando só falta 1 vaga, ou múltipla (checkbox, capada nas vagas
// restantes) quando o empate envolve mais de uma vaga ao mesmo tempo. Fica visível mesmo depois
// de confirmado (botão "Gerar jogos") — só trava pra edição (mataMataIniciado) quando algum jogo
// da 1ª rodada do mata-mata já começou, pra não invalidar um jogo em andamento.
function renderDecisaoDesempateCard(infos){
  const escolha = state.grupoDesempateEscolha || [];
  const bloqueado = mataMataIniciado();
  let html = `<div class="card" style="border:1.5px solid var(--coral);margin-bottom:14px;">
    <div style="font-weight:700;font-size:15px;color:var(--coral);margin-bottom:6px;">⚖️ Decisão Desempate</div>
    <div style="font-size:12.5px;color:var(--muted);margin-bottom:12px;">
      Empate técnico na classificação (pontos, saldo e pontos pró idênticos) disputando a última vaga de classificação de cada grupo abaixo. Escolha quem avança para liberar a geração dos jogos do mata-mata.
    </div>`;
  infos.forEach(info=>{
    html += `<div style="margin-bottom:14px;">
      <div style="font-weight:600;font-size:13px;margin-bottom:6px;">Grupo ${escapeHtml(info.letter)}${info.vagas>1?` · escolha ${info.vagas} duplas`:``}</div>`;
    info.grupoEmpatado.forEach(nome=>{
      const inputType = info.vagas>1 ? "checkbox" : "radio";
      const marcado = escolha.includes(nome);
      html += `<label style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--sand-dark);${bloqueado?"opacity:.6;":""}">
        <input type="${inputType}" name="desempate-${escapeHtml(info.letter)}" data-desempate-grupo="${escapeHtml(info.letter)}" data-desempate-nome="${escapeHtml(nome)}" ${marcado?"checked":""} ${bloqueado?"disabled":""}>
        <span>${escapeHtml(nome)}</span>
      </label>`;
    });
    html += `</div>`;
  });
  if(bloqueado){
    html += `<div class="tiebreak-note">🔒 Já existe jogo do mata-mata iniciado — a decisão não pode mais ser alterada.</div>`;
  }
  html += `</div>`;
  return html;
}

function renderMataMata(){
  if(!matamataPronto()){
    const dica = state.formato==="eliminacao"
      ? "O chaveamento aparece aqui quando a fase de eliminação (aba Jogos) terminar."
      : "O chaveamento aparece aqui quando todos os jogos da fase de grupos forem concluídos.";
    return `<div class="section-title">Mata-mata</div><div class="card empty"><span class="ball-icon">🏐</span>${dica}</div>`;
  }

  const infos = gruposDesempateInfo();
  const temEmpate = infos.length > 0;
  const pendente = gruposDesempatePrecisaEscolha();
  const liberado = mataMataLiberadoParaJogar();

  let html = `<div class="section-title">Mata-mata</div>`;
  if(temEmpate) html += renderDecisaoDesempateCard(infos);

  if(!liberado){
    html += pendente
      ? `<div class="tiebreak-note" style="text-align:center;">Escolha quem avança em cada grupo acima para liberar a geração dos jogos.</div>`
      : `<button class="btn" id="btn-gerar-jogos-matamata">Gerar jogos do mata-mata 🏆</button>`;
    return html;
  }

  const camp = champion();
  const rounds = totalRoundsBracket();
  html += `
    <div class="section-sub">
      ${state.formato==="eliminacao"
        ? "As duplas classificadas na fase de eliminação disputam o mata-mata a partir daqui."
        : "1º e 2º de cada grupo se cruzam na primeira rodada do mata-mata; a partir daí, os vencedores avançam até a final."}${state.terceiroLugar ? `<br><b>3º/4º lugar:</b> perdedores da semifinal` : ``}
    </div>
    <div class="card" style="padding:10px 14px;margin-bottom:12px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--heading);cursor:pointer;">
        <input type="checkbox" id="chk-terceiro" ${state.terceiroLugar?"checked":""} style="width:17px;height:17px;">
        Disputar jogo de 3º e 4º lugar
      </label>
    </div>`;

  const pendentes = pendingElimMessages();
  if(pendentes.length){
    html += `<div class="card" style="border:1.5px solid var(--coral);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
        <div style="font-weight:700;font-size:13.5px;color:var(--coral);">📣 ${pendentes.length} mensage${pendentes.length>1?'ns':'m'} pendente${pendentes.length>1?'s':''}</div>
        <button class="btn ghost" id="btn-clear-pendentes" style="width:auto;padding:4px 10px;font-size:11.5px;">Limpar</button>
      </div>
      <div style="font-size:11.5px;color:var(--muted);margin-bottom:10px;">Telegram já tentou enviar automaticamente para quem ativou. Estes aqui precisam do seu toque no WhatsApp.</div>`;
    pendentes.forEach(p=>{
      const baseMsg = mensagemMataMata(p.faseLabel, p.nome, p.oponente);
      html += `<div style="margin-bottom:10px;">
        <div style="font-size:12.5px;font-weight:600;margin-bottom:4px;">${escapeHtml(p.nome)} <span style="color:var(--muted);font-weight:500;">· ${p.faseLabel} vs ${escapeHtml(p.oponente)}</span></div>
        ${renderContatoBlock(p.i, p.slot, p.tel, baseMsg, p.key)}
      </div>`;
    });
    html += `</div>`;
  }

  if(camp){
    html += `<div class="champion-banner"><div class="eyebrow">Campeão do torneio</div><div class="name">🏆 ${escapeHtml(camp)}</div></div>`;
  }

  for(let r=0; r<rounds; r++){
    const teams = bracketTeamsForRound(r);
    const label = nomeRodada(r, rounds);
    html += `<div class="round-label">${escapeHtml(label)}</div>`;
    state.bracket[r].forEach((m,i)=>{
      const [a,b] = teams[i];
      const tag = teams.length>1 ? `${label.slice(0,2).toUpperCase()}${i+1}` : label.toUpperCase();
      html += bracketMatchHtml(tag, label, r, i, a, b, m);
    });
  }

  if(state.terceiroLugar){
    const [la,lb] = semifinalLosers();
    html += `<div class="round-label">Disputa de 3º e 4º lugar</div>`;
    html += bracketMatchHtml("3º LUGAR", "Disputa de 3º Lugar", "terceiro", 0, la, lb, state.terceiro);
  }

  return html;
}

function bracketMatchHtml(label, faseLabel, round, idx, a, b, m){
  const pa = m?.pa, pb = m?.pb;
  const win = winnerFinal(a,b,m,round===0);
  const matchId = makeMatchId(round, idx);
  const arbAtiva = ["andamento","tecnico"].includes(state.arbitragem?.[matchId]?.status);
  const teamBlock = (nome, oponente, side, isWin)=>{
    if(!nome) return `<div class="bracket-row"><span class="team tbd">${oponente ? "— Folga —" : "Aguardando resultados"}</span></div>`;
    if(!oponente) return `<div class="bracket-row"><span class="team win">${escapeHtml(nome)}</span><span class="tg-status ok" style="flex-shrink:0;">🎟️ Folga</span></div>`;
    const scoreVal = side==="a" ? (pa??"") : (pb??"");
    const di = duplaIndexByName(nome);
    let contatos = "";
    if(di>=0 && oponente){
      const d = state.duplas[di];
      const baseMsg = mensagemMataMata(faseLabel, nome, oponente);
      const trackKey = `${round}-${idx}-${side}`;
      contatos = `<div class="msg-grid" style="margin-top:6px;margin-bottom:10px;">
        ${renderContatoBlock(di, 1, d.tel1, baseMsg, trackKey)}
        ${renderContatoBlock(di, 2, d.tel2, baseMsg, trackKey)}
      </div>`;
    }
    return `<div class="bracket-row">
      <span class="team ${isWin?'win':''}">${escapeHtml(nome)}</span>
      <input class="score-input" type="number" min="0" inputmode="numeric" data-round="${round}" data-idx="${idx}" data-side="${side}" value="${scoreVal}" ${arbAtiva||m?.finalizado?"disabled":""}>
    </div>${contatos}`;
  };
  const acoes = (a && b) ? acoesJogoHtml(matchId, m) : "";
  return `<div class="bracket-match">
    <div class="lbl">${label}</div>
    ${teamBlock(a, b, "a", win===a)}
    ${teamBlock(b, a, "b", win===b)}
    ${(a && b) ? liveScoreBadgeHtml(matchId) : ""}
    ${(a && b) ? woNoteHtml(m, a, b) : ""}
    ${(m?.finalizado && !m?.wo) ? `<div class="tiebreak-note">✅ Partida finalizada.</div>` : ""}
    ${acoes}
  </div>`;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function bindEvents(){

  const btnCopiarPix = document.getElementById("btn-copiar-pix");
  if(btnCopiarPix) btnCopiarPix.addEventListener("click", copiarCodigoPix);
  const btnVerificarPix = document.getElementById("btn-verificar-pix");
  if(btnVerificarPix) btnVerificarPix.addEventListener("click", verificarPagamentoPix);

  const btnSalvarGcidAdmin = document.getElementById("btn-salvar-gcid-admin");
  if(btnSalvarGcidAdmin) btnSalvarGcidAdmin.addEventListener("click", async ()=>{
    const val = document.getElementById("input-gcid-admin").value.trim();
    if(!val){ showToast("Cole o Client ID do Google."); return; }
    showToast("Salvando...");
    const ok = await salvarConfigAdmin({googleClientId: val});
    if(ok){ showToast("Client ID salvo! Já vale para todo mundo."); render(); }
  });
  const btnRemoverGcidAdmin = document.getElementById("btn-remover-gcid-admin");
  if(btnRemoverGcidAdmin) btnRemoverGcidAdmin.addEventListener("click", async ()=>{
    if(!confirm("Remover o Client ID do Google? O login com Google para de funcionar até configurar de novo.")) return;
    const ok = await salvarConfigAdmin({googleClientId: ""});
    if(ok){ showToast("Client ID removido."); render(); }
  });
  const btnSalvarEmailAdmin = document.getElementById("btn-salvar-email-admin");
  if(btnSalvarEmailAdmin) btnSalvarEmailAdmin.addEventListener("click", async ()=>{
    const val = document.getElementById("input-email-admin").value.trim();

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove("show"), 2200);
}

/* ---------- Loading (spinner) ---------- */
// Overlay de tela cheia com o círculo girando, pra ações que demoram um pouco (abrir torneio,
// gerar Pix, verificar pagamento, salvar decisão de aprovação, etc.)
let __loadingDepth = 0;
function showLoading(msg){
  __loadingDepth++;
  const overlay = document.getElementById("loading-overlay");
  const msgEl = document.getElementById("loading-msg");
  if(msgEl) msgEl.textContent = msg || "Carregando...";
  if(overlay) overlay.classList.add("show");
}
function hideLoading(){
  __loadingDepth = Math.max(0, __loadingDepth-1);
  if(__loadingDepth>0) return; // ainda tem outra chamada em andamento — não esconde ainda
  const overlay = document.getElementById("loading-overlay");
  if(overlay) overlay.classList.remove("show");
}

/* ---------- Modo claro / escuro ---------- */
const THEME_KEY = "futevolei_tema_v1";
function aplicarTema(tema){
  document.documentElement.setAttribute("data-theme", tema==="dark" ? "dark" : "light");
  const meta = document.getElementById("meta-theme-color");
  if(meta) meta.setAttribute("content", tema==="dark" ? "#000000" : "#205527");
  const icone = document.getElementById("btn-theme-icon");
  if(icone) icone.textContent = tema==="dark" ? "☀️" : "🌙";
}
function temaAtual(){
  return document.documentElement.getAttribute("data-theme")==="dark" ? "dark" : "light";
}
function alternarTema(){
  const novo = temaAtual()==="dark" ? "light" : "dark";
  try{ localStorage.setItem(THEME_KEY, novo); }catch(e){}
  aplicarTema(novo);
}

let __tvUltimoArb = null;
function tvAtualizarBadgeConexao(ok, erro){
  let badge = document.getElementById("tv-conn-badge");
  if(!badge){
    badge = document.createElement("div");
    badge.id = "tv-conn-badge";
    badge.style.cssText = "position:fixed;top:10px;right:10px;padding:6px 12px;border-radius:20px;font-size:12px;font-family:sans-serif;z-index:999;max-width:80vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;";

  }
  if(ok){

    badge.style.display = "block";
    badge.style.background = "rgba(200,50,50,.9)";
    badge.style.color = "#fff";

function iniciarPlacarTV(torneioId, matchId){
  document.body.innerHTML = `<div class="tv-screen" id="tv-screen"><div class="tv-loading">🏐 Carregando placar...</div></div>`;

  async function atualizar(){
    try{
      const res = await fetch(`/api/torneios-tv?id=${encodeURIComponent(torneioId)}`, { cache:"no-store" });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if(!data || !data.state) throw new Error("resposta sem dados do torneio");
      state = Object.assign(defaultState(), data.state);
      renderTV(matchId);
      tvAtualizarBadgeConexao(true);
    }catch(e){
      const msg = (e && e.message) ? e.message : String(e);
      const el = document.getElementById("tv-screen");
      if(el && !el.dataset.loaded){
        el.innerHTML = `<div class="tv-loading">⚠️ Não foi possível carregar: ${msg}</div>`;
      } else {
        tvAtualizarBadgeConexao(false, msg);
      }
    }
  }

  setInterval(()=>{
    if(!__tvUltimoArb || __tvUltimoArb.status!=="andamento") return;
    const el = document.querySelector(".tv-timer");
    if(el) el.textContent = formatTempo(tempoDecorridoMs(__tvUltimoArb));
  }, 1000);

  atualizar();
  setInterval(atualizar, 1200);
}

function renderTVMulti(matchIds){
  const screen = document.getElementById("tv-screen");
  if(!screen) return;
  const n = matchIds.length;
  const cols = Math.max(1, Math.ceil(Math.sqrt(n)));
  const rows = Math.ceil(n/cols);
  screen.dataset.loaded = "1";

  const statusLabelMap = {
    nao_iniciada: "Aguardando início",
    andamento: "🔴 Em andamento",
    tecnico: "⏸️ Tempo técnico",
    finalizada: "✅ Finalizada"
  };

  let html = `<div class="tv-multi-grid" style="grid-template-columns:repeat(${cols}, 1fr);grid-template-rows:repeat(${rows}, 1fr);">`;
  matchIds.forEach(matchId=>{
    const [a,b] = getMatchTeams(matchId);
    const label = getMatchLabel(matchId);
    const arb = getArb(matchId);
    const tempoMs = tempoDecorridoMs(arb);
    const statusLabel = statusLabelMap[arb.status] || "";
    html += `<div class="tv-multi-cell">
      <div class="tv-multi-label">${escapeHtml(label)}</div>
      <div class="tv-multi-board">
        <div class="tv-multi-team">
          <div class="tv-multi-nome">${escapeHtml(a||"—")}</div>
          <div class="tv-multi-score">${arb.placarA}</div>
        </div>
        <div class="tv-multi-x">×</div>
        <div class="tv-multi-team">
          <div class="tv-multi-nome">${escapeHtml(b||"—")}</div>
          <div class="tv-multi-score">${arb.placarB}</div>
        </div>
      </div>
      <div class="tv-multi-footer">
        <span class="tv-multi-timer" data-tv-timer="${matchId}">${formatTempo(tempoMs)}</span>
        <span class="tv-multi-status">${statusLabel}</span>
      </div>
    </div>`;
  });
  html += `</div>`;
  screen.innerHTML = html;
}

/* ============================================================
   APITAR JOGO (link público de árbitro convidado)
   Página isolada: quem abre esse link só vê e mexe no placar/cronômetro dessa UMA partida.
   Nunca carrega o resto do torneio, nem exige login — só o link com o token é suficiente.
============================================================ */
let __apitoPublicoCtx = null;
let __apitoPublicoArb = null;
let __apitoPublicoTick = null;

function iniciarApitoPublico(ctx){
  __apitoPublicoCtx = ctx;
  const nomeSalvo = localStorage.getItem("futevolei_apito_ultimo_nome_v1") || "";
  document.body.innerHTML = `<div class="ref-screen">
    <div class="ref-top"><div class="ref-label">${escapeHtml(ctx.label || "Apitar jogo")}</div></div>
    <div class="ref-board" style="margin-top:10px;">
      <div style="width:100%;text-align:center;font-size:14px;color:var(--muted, #666);margin-bottom:14px;">${escapeHtml(ctx.a||"—")} × ${escapeHtml(ctx.b||"—")}</div>
    </div>
    <div style="padding:0 20px;">
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">Seu nome (aparece como árbitro da partida)</label>
      <input type="text" id="input-apito-nome" value="${escapeHtml(nomeSalvo)}" placeholder="Seu nome" style="width:100%;border:1.5px solid #ccc;border-radius:10px;padding:10px 12px;font-size:14px;margin-bottom:12px;">
      <button class="btn primary" id="btn-apito-comecar" style="width:100%;">Começar a apitar</button>
    </div>
  </div>`;
  const iniciar = ()=>{
    const nome = (document.getElementById("input-apito-nome").value||"").trim();
    if(!nome){ alert("Digite seu nome pra continuar."); return; }
    localStorage.setItem("futevolei_apito_ultimo_nome_v1", nome);
    __apitoPublicoCtx.nome = nome;
    carregarApitoPublico();
  };
  document.getElementById("btn-apito-comecar").addEventListener("click", iniciar);
  document.getElementById("input-apito-nome").addEventListener("keydown", e=>{ if(e.key==="Enter") iniciar(); });
}

async function carregarApitoPublico(){
  document.body.innerHTML = `<div class="ref-screen"><div class="ref-top"><div class="ref-label">Carregando...</div></div></div>`;
  try{
    const c = __apitoPublicoCtx;
    const res = await fetch(`/api/apito?torneio=${encodeURIComponent(c.torneio)}&match=${encodeURIComponent(c.match)}&token=${encodeURIComponent(c.token)}`, { cache:"no-store" });
    const data = await res.json();
    if(!res.ok){
      document.body.innerHTML = `<div class="ref-screen"><div class="ref-top"><div class="ref-label">⚠️ ${escapeHtml(data.error||"Link inválido ou expirado.")}</div></div></div>`;
      return;
    }
    __apitoPublicoArb = data.arb;
    renderApitoPublicoTela();
  }catch(e){
    document.body.innerHTML = `<div class="ref-screen"><div class="ref-top"><div class="ref-label">⚠️ Sem conexão. Recarregue a página pra tentar de novo.</div></div></div>`;
  }
}

function renderApitoPublicoTela(){
  const c = __apitoPublicoCtx;
  const arb = __apitoPublicoArb;
  const statusLabel = {
    nao_iniciada: "Não iniciada",
    andamento: "Em andamento",
    tecnico: "⏸️ Tempo técnico",
    finalizada: "✅ Finalizada"
  }[arb.status] || "";

  let acoes = "";
  if(arb.status==="nao_iniciada"){
    acoes += `<button class="btn" id="btn-ap-iniciar">▶️ Iniciar partida</button>`;
  }
  if(arb.status==="andamento" || arb.status==="tecnico"){
    acoes += `<button class="btn secondary" id="btn-ap-tecnico">${arb.status==="tecnico" ? "▶️ Retomar" : "⏸️ Tempo técnico"}</button>`;
    acoes += `<button class="btn ghost ref-btn-fim" id="btn-ap-finalizar">🏁 Fim de partida</button>`;
  }
  if(arb.status==="finalizada"){
    acoes += `<div class="ref-final-msg">✅ Partida finalizada · duração ${formatTempo(arb.acumuladoMs)}</div>`;
  }

  document.body.innerHTML = `<div class="ref-screen">
    <div class="ref-top"><div class="ref-label">${escapeHtml(c.label || "Apitar jogo")}</div></div>
    <div class="ref-timer-box status-${arb.status}">
      <div class="ref-timer" id="ref-timer-txt">${formatTempo(tempoDecorridoMs(arb))}</div>
      <div class="ref-timer-status">${statusLabel}</div>
    </div>
    <div class="ref-board">
      <div class="ref-team-col">
        <button class="ref-score-btn plus" data-ap-ponto="a" data-delta="1" ${arb.status==="finalizada"?"disabled":""}>+</button>
        <div class="ref-score-num">${arb.placarA}</div>
        <button class="ref-score-btn minus" data-ap-ponto="a" data-delta="-1" ${arb.status==="finalizada"?"disabled":""}>−</button>
        <div class="ref-team-nome">${escapeHtml(c.a||"—")}</div>
      </div>
      <div class="ref-vs">×</div>
      <div class="ref-team-col">
        <button class="ref-score-btn plus" data-ap-ponto="b" data-delta="1" ${arb.status==="finalizada"?"disabled":""}>+</button>
        <div class="ref-score-num">${arb.placarB}</div>
        <button class="ref-score-btn minus" data-ap-ponto="b" data-delta="-1" ${arb.status==="finalizada"?"disabled":""}>−</button>
        <div class="ref-team-nome">${escapeHtml(c.b||"—")}</div>
      </div>
    </div>
    <div class="ref-actions">${acoes}</div>
    <div style="text-align:center;font-size:12px;color:var(--muted,#888);margin-top:14px;">Apitando como <b>${escapeHtml(c.nome||"")}</b></div>
  </div>
  <div class="popup-troca" id="popup-troca">
    <div class="popup-troca-inner">
      <div class="popup-troca-icon">🔄</div>
      <div class="popup-troca-msg">Troca de lado das equipes.</div>
      <button class="popup-troca-ok" id="btn-fechar-popup-troca">OK</button>
    </div>
  </div>`;

  const btnIniciar = document.getElementById("btn-ap-iniciar");
  if(btnIniciar) btnIniciar.addEventListener("click", ()=> apitoPublicoAcao("iniciar"));
  const btnTecnico = document.getElementById("btn-ap-tecnico");
  if(btnTecnico) btnTecnico.addEventListener("click", ()=> apitoPublicoAcao("tempoTecnico"));
  const btnFinalizar = document.getElementById("btn-ap-finalizar");
  if(btnFinalizar) btnFinalizar.addEventListener("click", ()=>{
    if(confirm("Finalizar a partida? O placar e o tempo de jogo serão salvos.")) apitoPublicoAcao("finalizar");
  });
  document.querySelectorAll("[data-ap-ponto]").forEach(btn=>{
    btn.addEventListener("click", ()=> apitoPublicoAcao("ponto", { lado: btn.dataset.apPonto, delta: Number(btn.dataset.delta) }));
  });
  const btnFecharPopupAp = document.getElementById("btn-fechar-popup-troca");
  if(btnFecharPopupAp) btnFecharPopupAp.addEventListener("click", ()=>{
    const el = document.getElementById("popup-troca");
    if(el) el.classList.remove("show");
  });

  clearInterval(__apitoPublicoTick);
  if(arb.status==="andamento"){
    __apitoPublicoTick = setInterval(()=>{
      const el = document.getElementById("ref-timer-txt");
      if(el) el.textContent = formatTempo(tempoDecorridoMs(__apitoPublicoArb));
    }, 1000);
  }
}

async function apitoPublicoAcao(action, payload){
  const c = __apitoPublicoCtx;
  try{
    const res = await fetch("/api/apito", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ torneio:c.torneio, match:c.match, token:c.token, arbitroNome:c.nome, action, conexao:detectarTipoConexao(), ...(payload||{}) })
    });
    const data = await res.json();
    if(!res.ok){ if(action) alert(data.error||"Não foi possível salvar."); return; }
    if(action){
      __apitoPublicoArb = data.arb;
      renderApitoPublicoTela();
      if(data.trocarLado) mostrarPopupTroca();
      // Mesma regra do app: só verifica em quem soma ponto, e só finaliza se confirmado aqui.
      if(action==="ponto" && (payload?.delta||0)>0 && partidaAtingiuFim(data.arb.placarA, data.arb.placarB)){
        if(confirm(`Placar ${data.arb.placarA} x ${data.arb.placarB}. Finalizar a partida?`)) apitoPublicoAcao("finalizar");
      }
    }
  }catch(e){
    if(action) alert("Sem conexão — tente de novo.");
  }
}

/* ============================================================
   INSCRIÇÃO PÚBLICA DE DUPLAS (link gerado na aba Duplas)
   Mesmo padrão do apito público: página isolada, sem login, só o token do link é suficiente.
   Quem abre só vê o formulário de inscrição e a tela de Pix dessa UMA dupla — nunca o resto
   do torneio (outras duplas, telefones etc).
============================================================ */
let __inscricaoPublicaCtx = null;
let __inscricaoPublicaInfo = null;
let __inscricaoPublicaNomeDuplaEditado = false;
let __inscricaoPublicaResultado = null;
let __inscricaoPublicaPollTimer = null;

function primeiroNome(nomeCompleto){
  return (nomeCompleto||"").trim().split(/\s+/)[0] || "";
}

async function iniciarInscricaoPublica(ctx){
  __inscricaoPublicaCtx = ctx;
  document.body.innerHTML = `<div class="ref-screen"><div class="ref-top"><div class="ref-label">Carregando...</div></div></div>`;
  try{
    const res = await fetch(`/api/inscricao?torneio=${encodeURIComponent(ctx.torneio)}&token=${encodeURIComponent(ctx.token)}`, { cache:"no-store" });
    const data = await res.json();
    if(!res.ok){
      document.body.innerHTML = `<div class="ref-screen"><div class="ref-top"><div class="ref-label">⚠️ ${escapeHtml(data.error||"Link inválido ou expirado.")}</div></div></div>`;
      return;
    }
    __inscricaoPublicaInfo = data;
    renderInscricaoPublicaForm();
  }catch(e){
    document.body.innerHTML = `<div class="ref-screen"><div class="ref-top"><div class="ref-label">⚠️ Sem conexão. Recarregue a página pra tentar de novo.</div></div></div>`;
  }
}

function renderInscricaoPublicaForm(erro){
  const info = __inscricaoPublicaInfo;
  const valorTxt = typeof info.valorInscricao === "number" ? `R$ ${info.valorInscricao.toFixed(2).replace(".", ",")}` : "—";
  document.body.innerHTML = `<div class="ref-screen">
    <div class="ref-top"><div class="ref-label">Inscrição — ${escapeHtml(info.nomeTorneio||"Supremo FTV")}</div></div>
    <div style="padding:16px 20px 40px;max-width:420px;margin:0 auto;">
      <div class="hint" style="margin-bottom:14px;">Inscrição da dupla · ${valorTxt} via Pix${info.vagasRestantes!=null ? ` · ${info.vagasRestantes} vaga(s) restante(s)` : ""}</div>
      ${erro ? `<div class="card" style="border-color:var(--coral);color:var(--coral);font-size:13px;margin-bottom:14px;">⚠️ ${escapeHtml(erro)}</div>` : ""}

      <div style="border:1.5px solid #3a5a44;border-radius:12px;padding:14px;margin-bottom:14px;">
        <div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:10px;">Jogador 1</div>
        <label style="font-size:11px;font-weight:600;display:block;margin-bottom:4px;">Nome completo</label>
        <input type="text" id="input-j1-nome" placeholder="Nome completo" style="width:100%;border:1.5px solid #ccc;border-radius:10px;padding:10px 12px;font-size:14px;margin-bottom:10px;">
        <label style="font-size:11px;font-weight:600;display:block;margin-bottom:4px;">Telefone</label>
        <input type="tel" id="input-j1-tel" placeholder="(11) 90000-0000" style="width:100%;border:1.5px solid #ccc;border-radius:10px;padding:10px 12px;font-size:14px;margin-bottom:10px;">
        <label style="font-size:11px;font-weight:600;display:block;margin-bottom:4px;">E-mail</label>
        <input type="email" id="input-j1-email" placeholder="email@exemplo.com" style="width:100%;border:1.5px solid #ccc;border-radius:10px;padding:10px 12px;font-size:14px;">
      </div>

      <div style="border:1.5px solid #3a5a44;border-radius:12px;padding:14px;margin-bottom:18px;">
        <div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:10px;">Jogador 2</div>
        <label style="font-size:11px;font-weight:600;display:block;margin-bottom:4px;">Nome completo</label>
        <input type="text" id="input-j2-nome" placeholder="Nome completo" style="width:100%;border:1.5px solid #ccc;border-radius:10px;padding:10px 12px;font-size:14px;margin-bottom:10px;">
        <label style="font-size:11px;font-weight:600;display:block;margin-bottom:4px;">Telefone</label>
        <input type="tel" id="input-j2-tel" placeholder="(11) 90000-0000" style="width:100%;border:1.5px solid #ccc;border-radius:10px;padding:10px 12px;font-size:14px;margin-bottom:10px;">
        <label style="font-size:11px;font-weight:600;display:block;margin-bottom:4px;">E-mail</label>
        <input type="email" id="input-j2-email" placeholder="email@exemplo.com" style="width:100%;border:1.5px solid #ccc;border-radius:10px;padding:10px 12px;font-size:14px;">
      </div>

      <label style="font-size:12px;font-weight:600;display:block;margin-bottom:6px;">Nome da dupla</label>
      <input type="text" id="input-nome-dupla" placeholder="Sugerido a partir dos nomes acima" style="width:100%;border:1.5px solid #ccc;border-radius:10px;padding:10px 12px;font-size:14px;margin-bottom:18px;">

      <button class="btn primary" id="btn-inscricao-enviar" style="width:100%;">Continuar pro Pix</button>
    </div>
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-msg" id="loading-msg"></div>
    </div>
  </div>`;

  const sugerirNomeDupla = ()=>{
    if(__inscricaoPublicaNomeDuplaEditado) return;
    const n1 = primeiroNome(document.getElementById("input-j1-nome").value);
    const n2 = primeiroNome(document.getElementById("input-j2-nome").value);
    const campo = document.getElementById("input-nome-dupla");
    if(n1 || n2) campo.value = [n1,n2].filter(Boolean).join(" & ");
  };
  document.getElementById("input-j1-nome").addEventListener("input", sugerirNomeDupla);
  document.getElementById("input-j2-nome").addEventListener("input", sugerirNomeDupla);
  document.getElementById("input-nome-dupla").addEventListener("input", ()=>{ __inscricaoPublicaNomeDuplaEditado = true; });
  ["input-j1-tel","input-j2-tel"].forEach(id=>{
    const el = document.getElementById(id);
    el.addEventListener("input", e=>{
      e.target.value = formatarTelefoneBR(e.target.value);
      const pos = e.target.value.length;
      e.target.setSelectionRange(pos, pos);
    });
  });

  document.getElementById("btn-inscricao-enviar").addEventListener("click", enviarInscricaoPublica);
}

async function enviarInscricaoPublica(){
  const ctx = __inscricaoPublicaCtx;
  const jogador1 = {
    nomeCompleto: (document.getElementById("input-j1-nome").value||"").trim(),
    tel: (document.getElementById("input-j1-tel").value||"").trim(),
    email: (document.getElementById("input-j1-email").value||"").trim()
  };
  const jogador2 = {
    nomeCompleto: (document.getElementById("input-j2-nome").value||"").trim(),
    tel: (document.getElementById("input-j2-tel").value||"").trim(),
    email: (document.getElementById("input-j2-email").value||"").trim()
  };
  const nomeDupla = (document.getElementById("input-nome-dupla").value||"").trim();

  if(!nomeDupla || !jogador1.nomeCompleto || !jogador1.tel || !jogador1.email || !jogador2.nomeCompleto || !jogador2.tel || !jogador2.email){
    renderInscricaoPublicaForm("Preencha todos os campos dos 2 jogadores e o nome da dupla.");
    return;
  }

  const btn = document.getElementById("btn-inscricao-enviar");
  if(btn) btn.disabled = true;
  showLoading("Enviando inscrição...");
  try{
    const res = await fetch("/api/inscricao", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ torneio: ctx.torneio, token: ctx.token, nomeDupla, jogador1, jogador2, conexao: detectarTipoConexao() })
    });
    const data = await res.json();
    if(!res.ok){
      renderInscricaoPublicaForm(data.error || "Não foi possível concluir a inscrição.");
      return;
    }
    __inscricaoPublicaResultado = { duplaId: data.duplaId, inscricao: data.inscricao, status: "pendente" };
    renderInscricaoPublicaPix();
  }catch(e){
    renderInscricaoPublicaForm("Sem conexão — tente de novo.");
  }finally{
    hideLoading();
  }
}

function renderInscricaoPublicaPix(){
  const r = __inscricaoPublicaResultado;
  const pg = r.inscricao;
  document.body.innerHTML = `<div class="ref-screen">
    <div class="ref-top"><div class="ref-label">Pagamento da inscrição</div></div>
    <div style="padding:16px 20px 40px;max-width:420px;margin:0 auto;text-align:center;">
      <div style="font-weight:700;font-size:16px;color:var(--heading,#205527);margin-bottom:10px;">R$ ${pg.valor.toFixed(2).replace(".", ",")}</div>
      ${pg.qrCodeBase64 ? `<img src="data:image/png;base64,${pg.qrCodeBase64}" alt="QR Code Pix" style="width:220px;height:220px;margin:0 auto 14px;display:block;border-radius:10px;border:1px solid #ddd;">` : ""}
      <label style="font-size:12px;font-weight:600;display:block;margin-bottom:6px;text-align:left;">Pix copia e cola</label>
      <textarea readonly style="width:100%;min-height:70px;font-family:'DM Mono',monospace;font-size:11px;padding:8px;border-radius:8px;border:1px solid #ddd;margin-bottom:10px;" onclick="this.select()">${escapeHtml(pg.copiaCola)}</textarea>
      <button class="btn secondary" id="btn-inscricao-copiar" style="width:100%;margin-bottom:8px;">Copiar código</button>
      <button class="btn ghost" id="btn-inscricao-verificar" style="width:100%;">Já paguei, verificar</button>
      <div id="inscricao-status-msg" style="font-size:12px;color:var(--muted,#666);margin-top:12px;">Assim que o pagamento cair, sua dupla já fica confirmada automaticamente.</div>
    </div>
  </div>`;

  document.getElementById("btn-inscricao-copiar").addEventListener("click", async ()=>{
    try{ await navigator.clipboard.writeText(pg.copiaCola); showToastPublico("Código copiado!"); }catch(e){}
  });
  document.getElementById("btn-inscricao-verificar").addEventListener("click", ()=> verificarInscricaoPublica(false));

  clearInterval(__inscricaoPublicaPollTimer);
  __inscricaoPublicaPollTimer = setInterval(()=> verificarInscricaoPublica(true), 20000);
}

// Tela pública não tem o overlay de toast do app principal (document.body foi substituído) —
// versão mínima só pra dar feedback rápido, escrita direto na mensagem de status embaixo do Pix.
function showToastPublico(msg){
  const el = document.getElementById("inscricao-status-msg");
  if(el) el.textContent = msg;
}

async function verificarInscricaoPublica(silencioso){
  const ctx = __inscricaoPublicaCtx;
  const r = __inscricaoPublicaResultado;
  try{
    const res = await fetch("/api/inscricao-verificar", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ torneio: ctx.torneio, token: ctx.token, duplaId: r.duplaId })
    });
    const data = await res.json();
    if(!res.ok){ if(!silencioso) showToastPublico(data.error||"Não foi possível verificar agora."); return; }
    if(data.status==="ativa"){
      clearInterval(__inscricaoPublicaPollTimer);
      renderInscricaoPublicaConfirmada();
    } else if(!silencioso){
      showToastPublico("Ainda não identificamos o pagamento — tente de novo em alguns instantes.");
    }
  }catch(e){
    if(!silencioso) showToastPublico("Sem conexão — tente de novo.");
  }
}

function renderInscricaoPublicaConfirmada(){
  document.body.innerHTML = `<div class="ref-screen">
    <div class="ref-top"><div class="ref-label">Inscrição confirmada!</div></div>
    <div style="padding:30px 20px;text-align:center;">
      <div style="font-size:40px;margin-bottom:14px;">✅</div>
      <div style="font-size:15px;line-height:1.5;">Pagamento confirmado — sua dupla já está inscrita no campeonato. Boa sorte! 🏐</div>
    </div>
  </div>`;
}


const __urlParams = new URLSearchParams(location.search);
const __tvMatchId = __urlParams.get("placarTV");
const __tvMultiIds = __urlParams.get("placarMultiTV");
const __tvTorneioId = __urlParams.get("torneio");
const __apitarFlag = __urlParams.get("apitar");
const __apitarMatch = __urlParams.get("match");
const __apitarToken = __urlParams.get("token");
const __inscreverFlag = __urlParams.get("inscrever");

if(__apitarFlag && __tvTorneioId && __apitarMatch && __apitarToken){
  iniciarApitoPublico({
    torneio: __tvTorneioId,
    match: __apitarMatch,
    token: __apitarToken,
    a: __urlParams.get("a") || "",
    b: __urlParams.get("b") || "",
    label: __urlParams.get("label") || ""
  });
} else if(__inscreverFlag && __tvTorneioId && __apitarToken){
  iniciarInscricaoPublica({ torneio: __tvTorneioId, token: __apitarToken });
} else if(__tvMatchId && __tvTorneioId){
  iniciarPlacarTV(__tvTorneioId, __tvMatchId);
} else if(__tvMultiIds && __tvTorneioId){
  iniciarPlacarMultiploTV(__tvTorneioId, __tvMultiIds.split(","));
} else {
  document.querySelectorAll("#nav-torneio button").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      if(abaBloqueadaAntesDoInicio(btn.dataset.tab)){
        showToast(`Essa aba libera em ${formatarDataBR(state.dataInicio)} — por enquanto só Resumo e Duplas.`);
        return;
      }
      state.tab = btn.dataset.tab;
      save();
      render();
      if(state.tab==="sorteio" && state.drawn) refreshTelegramStatus();
      if(state.tab==="matamata" && state.drawn) checkElimNotifications();
    });
  });
  document.querySelectorAll("#nav-admin button").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      telaAdmin = btn.dataset.telaAdmin;
      render();
    });
  });
  const btnThemeIcon = document.getElementById("btn-theme-icon");
  if(btnThemeIcon){
    btnThemeIcon.textContent = temaAtual()==="dark" ? "☀️" : "🌙";
    btnThemeIcon.addEventListener("click", alternarTema);
  }

  render();
  fetchAndCacheClientId();
  if(auth && state.cloudId){
    refreshTorneioAtual(true);
    if(state.tab==="sorteio" && state.drawn) refreshTelegramStatus();
    if(state.drawn) checkElimNotifications();
    iniciarLiveRefresh();
    iniciarVerificacaoPixBackground();
  }

  if("serviceWorker" in navigator){
    window.addEventListener("load", ()=>{
      navigator.serviceWorker.register("./service-worker.js").catch(()=>{});
    });
  }
}
</script>
</body>
</html>
